name: CI Tests

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  dotnet-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Initialize test diagnostics
        run: |
          mkdir -p "${RUNNER_TEMP}/ci-test-logs"
          : > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/ci-test-logs/restore.log"
          set +e
          dotnet restore FoodDiary.slnx 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Restore"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/ci-test-logs/build.log"
          set +e
          dotnet build FoodDiary.slnx --configuration Release --no-restore 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Build"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Run all test projects
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          projects=(tests/*/*.csproj)
          if [ ${#projects[@]} -eq 0 ]; then
            echo "No test projects found in tests/*/*.csproj"
            exit 1
          fi
          for project in "${projects[@]}"; do
            echo "Running tests: $project"
            safe_name="${project//\//_}"
            safe_name="${safe_name//\\/_}"
            log_file="${RUNNER_TEMP}/ci-test-logs/${safe_name}.log"
            set +e
            dotnet test "$project" --configuration Release --no-restore 2>&1 | tee "$log_file"
            status=${PIPESTATUS[0]}
            set -e
            if [ "$status" -ne 0 ]; then
              {
                echo "FAILED_AREA=dotnet"
                echo "FAILED_TARGET=$project"
                echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
              } > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"
              exit "$status"
            fi
          done

      - name: Upload CI failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-failure-logs-dotnet
          path: ${{ runner.temp }}/ci-test-logs/
          if-no-files-found: ignore

  backend-postgres-critical-flows:
    runs-on: ubuntu-latest

    steps:
      - name: Initialize PostgreSQL critical-flow diagnostics
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/postgres-critical-flow-logs"
          : > "${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Verify Docker availability
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/postgres-critical-flow-logs/docker-version.log"
          set +e
          docker version 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Verify Docker availability for PostgreSQL critical flows"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Restore
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/postgres-critical-flow-logs/restore.log"
          set +e
          dotnet restore FoodDiary.slnx 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Restore PostgreSQL critical flows"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Run PostgreSQL API critical flows
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/postgres-critical-flow-logs/web-api-critical-flows.log"
          set +e
          dotnet test tests/FoodDiary.Web.Api.IntegrationTests/FoodDiary.Web.Api.IntegrationTests.csproj \
            --configuration Release \
            --no-restore \
            --filter "FullyQualifiedName~PostgresCriticalApiFlowTests|FullyQualifiedName~PostgresUserFlowTests" \
            2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Run PostgreSQL API critical flows"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Run PostgreSQL infrastructure critical flows
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/postgres-critical-flow-logs/infrastructure-critical-flows.log"
          set +e
          dotnet test tests/FoodDiary.Infrastructure.Tests/FoodDiary.Infrastructure.Tests.csproj \
            --configuration Release \
            --no-restore \
            --filter "FullyQualifiedName~UserRepositoryIntegrationTests|FullyQualifiedName~UserCleanupServiceIntegrationTests" \
            2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Run PostgreSQL infrastructure critical flows"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Upload PostgreSQL critical-flow failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-failure-logs-postgres-critical-flows
          path: ${{ runner.temp }}/postgres-critical-flow-logs/
          if-no-files-found: ignore

  backend-dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Initialize dependency audit diagnostics
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/dependency-audit-logs"
          : > "${RUNNER_TEMP}/dependency-audit-logs/failure-meta.env"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/dependency-audit-logs/restore.log"
          set +e
          dotnet restore FoodDiary.slnx 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Restore dependency audit"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/dependency-audit-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Audit backend dependencies
        shell: bash
        run: |
          set -euo pipefail
          projects=(
            "FoodDiary.Web.Api/FoodDiary.Web.Api.csproj"
            "FoodDiary.Infrastructure/FoodDiary.Infrastructure.csproj"
            "FoodDiary.Application/FoodDiary.Application.csproj"
          )

          for project in "${projects[@]}"; do
            safe_name="${project//\//_}"
            safe_name="${safe_name//\\/_}"
            log_file="${RUNNER_TEMP}/dependency-audit-logs/${safe_name}.log"
            set +e
            dotnet list "$project" package --vulnerable --include-transitive 2>&1 | tee "$log_file"
            status=${PIPESTATUS[0]}
            set -e
            if [ "$status" -ne 0 ]; then
              {
                echo "FAILED_AREA=dotnet"
                echo "FAILED_TARGET=Audit dependencies for $project"
                echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
              } > "${RUNNER_TEMP}/dependency-audit-logs/failure-meta.env"
              exit "$status"
            fi

            if grep -qE 'has the following vulnerable packages|severity:[[:space:]]*(Critical|High|Moderate|Low)' "$log_file"; then
              {
                echo "FAILED_AREA=dotnet"
                echo "FAILED_TARGET=Vulnerable dependencies detected in $project"
                echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
              } > "${RUNNER_TEMP}/dependency-audit-logs/failure-meta.env"
              exit 1
            fi
          done

      - name: Upload dependency audit failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-failure-logs-dependency-audit
          path: ${{ runner.temp }}/dependency-audit-logs/
          if-no-files-found: ignore

  frontend-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Initialize frontend diagnostics
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/frontend-checks-logs"
          : > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: FoodDiary.Web.Client/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/npm-ci.log"
          set +e
          npm ci 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Install frontend dependencies"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Lint frontend
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/lint.log"
          set +e
          npm run lint 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Lint frontend"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Lint styles
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/stylelint.log"
          set +e
          npm run stylelint 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Lint styles"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Check formatting
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/prettier.log"
          set +e
          npx prettier --check "src/**/*.{ts,html}" "projects/**/*.{ts,html}" 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Check formatting"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Run frontend unit tests
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/unit-tests.log"
          set +e
          npx ng test 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Run frontend unit tests"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Run fd-ui-kit unit tests
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/fd-ui-kit-tests.log"
          set +e
          npx ng test fd-ui-kit 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Run fd-ui-kit unit tests"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Build frontend
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/build-frontend.log"
          set +e
          npm run build:prod 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Build frontend"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Build admin frontend
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/build-admin-frontend.log"
          set +e
          npm run build:admin 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Build admin frontend"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Upload frontend failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-failure-logs-frontend
          path: ${{ runner.temp }}/frontend-checks-logs/
          if-no-files-found: ignore

  notify-ci-failure:
    if: always() && (needs.dotnet-tests.result == 'failure' || needs.backend-postgres-critical-flows.result == 'failure' || needs.backend-dependency-audit.result == 'failure' || needs.frontend-checks.result == 'failure')
    needs:
      - dotnet-tests
      - backend-postgres-critical-flows
      - backend-dependency-audit
      - frontend-checks
    runs-on: ubuntu-latest

    steps:
      - name: Download dotnet failure logs
        if: needs.dotnet-tests.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: ci-failure-logs-dotnet
          path: ${{ runner.temp }}/ci-test-logs
        continue-on-error: true

      - name: Download PostgreSQL critical-flow failure logs
        if: needs.backend-postgres-critical-flows.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: ci-failure-logs-postgres-critical-flows
          path: ${{ runner.temp }}/postgres-critical-flow-logs
        continue-on-error: true

      - name: Download dependency audit failure logs
        if: needs.backend-dependency-audit.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: ci-failure-logs-dependency-audit
          path: ${{ runner.temp }}/dependency-audit-logs
        continue-on-error: true

      - name: Download frontend failure logs
        if: needs.frontend-checks.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: ci-failure-logs-frontend
          path: ${{ runner.temp }}/frontend-checks-logs
        continue-on-error: true

      - name: Notify Telegram (failure)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Skipping Telegram notification: missing secrets."
            exit 0
          fi

          FAILED_AREA="unknown"
          FAILED_TARGET="unknown"
          FAILED_LOG_FILE=""
          FAILED_LOG_FILE_NAME=""
          META_FILE=""

          if [ "${{ needs.dotnet-tests.result }}" = "failure" ] && [ -f "${RUNNER_TEMP}/ci-test-logs/failure-meta.env" ]; then
            META_FILE="${RUNNER_TEMP}/ci-test-logs/failure-meta.env"
          fi

          if [ -z "${META_FILE}" ] && [ "${{ needs.backend-postgres-critical-flows.result }}" = "failure" ] && [ -f "${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env" ]; then
            META_FILE="${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env"
          fi

          if [ -z "${META_FILE}" ] && [ "${{ needs.backend-dependency-audit.result }}" = "failure" ] && [ -f "${RUNNER_TEMP}/dependency-audit-logs/failure-meta.env" ]; then
            META_FILE="${RUNNER_TEMP}/dependency-audit-logs/failure-meta.env"
          fi

          if [ -z "${META_FILE}" ] && [ "${{ needs.frontend-checks.result }}" = "failure" ] && [ -f "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env" ]; then
            META_FILE="${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
          fi

          if [ -n "${META_FILE}" ]; then
            parsed_area=$(grep '^FAILED_AREA=' "${META_FILE}" | head -n 1 | cut -d= -f2-)
            parsed_target=$(grep '^FAILED_TARGET=' "${META_FILE}" | head -n 1 | cut -d= -f2-)
            parsed_log_name=$(grep '^FAILED_LOG_FILE_NAME=' "${META_FILE}" | head -n 1 | cut -d= -f2-)
            if [ -n "${parsed_area}" ]; then
              FAILED_AREA="${parsed_area}"
            fi
            if [ -n "${parsed_target}" ]; then
              FAILED_TARGET="${parsed_target}"
            fi
            if [ -n "${parsed_log_name}" ]; then
              FAILED_LOG_FILE_NAME="${parsed_log_name}"
            fi
          fi

          if [ -n "${FAILED_LOG_FILE_NAME}" ]; then
            dotnet_candidate="${RUNNER_TEMP}/ci-test-logs/${FAILED_LOG_FILE_NAME}"
            postgres_candidate="${RUNNER_TEMP}/postgres-critical-flow-logs/${FAILED_LOG_FILE_NAME}"
            dependency_audit_candidate="${RUNNER_TEMP}/dependency-audit-logs/${FAILED_LOG_FILE_NAME}"
            frontend_candidate="${RUNNER_TEMP}/frontend-checks-logs/${FAILED_LOG_FILE_NAME}"
            if [ -f "${dotnet_candidate}" ]; then
              FAILED_LOG_FILE="${dotnet_candidate}"
            elif [ -f "${postgres_candidate}" ]; then
              FAILED_LOG_FILE="${postgres_candidate}"
            elif [ -f "${dependency_audit_candidate}" ]; then
              FAILED_LOG_FILE="${dependency_audit_candidate}"
            elif [ -f "${frontend_candidate}" ]; then
              FAILED_LOG_FILE="${frontend_candidate}"
            fi
          fi

          if [ -z "${FAILED_LOG_FILE}" ] || [ ! -f "${FAILED_LOG_FILE}" ]; then
            if [ "${FAILED_AREA}" = "frontend" ]; then
              FAILED_LOG_FILE=$(find "${RUNNER_TEMP}/frontend-checks-logs" -maxdepth 1 -type f -name '*.log' | sort | tail -n 1 || true)
            elif [ "${FAILED_AREA}" = "dotnet" ]; then
              FAILED_LOG_FILE=$(find "${RUNNER_TEMP}/ci-test-logs" "${RUNNER_TEMP}/postgres-critical-flow-logs" "${RUNNER_TEMP}/dependency-audit-logs" -maxdepth 1 -type f -name '*.log' | sort | tail -n 1 || true)
            else
              FAILED_LOG_FILE=$(find "${RUNNER_TEMP}" -maxdepth 2 -type f -name '*.log' | sort | tail -n 1 || true)
            fi
          fi

          MESSAGE=$'❌ CI failed\nRepo: '"${GITHUB_REPOSITORY}"$'\nBranch: '"${GITHUB_REF_NAME}"$'\nCommit: '"${GITHUB_SHA::8}"$'\nActor: '"${GITHUB_ACTOR}"$'\nArea: '"${FAILED_AREA}"$'\nTarget: '"${FAILED_TARGET}"$'\nRun: '"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MESSAGE}" >/dev/null

          if [ -n "${FAILED_LOG_FILE}" ] && [ -f "${FAILED_LOG_FILE}" ]; then
            echo "Sending log file: ${FAILED_LOG_FILE}"
            safe_area=$(printf '%s' "${FAILED_AREA}" | tr -cs '[:alnum:]' '-')
            safe_target=$(printf '%s' "${FAILED_TARGET}" | tr -cs '[:alnum:]' '-')
            telegram_log_file="${RUNNER_TEMP}/ci-${safe_area}-${safe_target}.txt"
            cp "${FAILED_LOG_FILE}" "${telegram_log_file}"
            response=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F caption="❌ CI failure log: ${FAILED_AREA} / ${FAILED_TARGET}" \
              -F document=@"${telegram_log_file}")
            if ! echo "${response}" | grep -q '"ok":true'; then
              tail_excerpt=$(tail -n 40 "${FAILED_LOG_FILE}")
              FALLBACK_MESSAGE=$'❌ CI failure log tail\nArea: '"${FAILED_AREA}"$'\nTarget: '"${FAILED_TARGET}"$'\n\n'"${tail_excerpt}"
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode text="${FALLBACK_MESSAGE}" >/dev/null
            fi
          else
            FALLBACK_MESSAGE=$'❌ CI failure log unavailable\nArea: '"${FAILED_AREA}"$'\nTarget: '"${FAILED_TARGET}"$'\nLog file was not found in downloaded artifacts.'
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode text="${FALLBACK_MESSAGE}" >/dev/null
          fi
