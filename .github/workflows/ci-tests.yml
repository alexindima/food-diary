name: CI Tests

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  dotnet-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Initialize test diagnostics
        run: |
          mkdir -p "${RUNNER_TEMP}/ci-test-logs"
          : > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/ci-test-logs/restore.log"
          set +e
          dotnet restore FoodDiary.slnx 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_TEST_PROJECT=Restore"
              echo "FAILED_LOG_FILE=$log_file"
            } > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/ci-test-logs/build.log"
          set +e
          dotnet build FoodDiary.slnx --configuration Release --no-restore 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_TEST_PROJECT=Build"
              echo "FAILED_LOG_FILE=$log_file"
            } > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Run all test projects
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          projects=(tests/*/*.csproj)
          if [ ${#projects[@]} -eq 0 ]; then
            echo "No test projects found in tests/*/*.csproj"
            exit 1
          fi
          for project in "${projects[@]}"; do
            echo "Running tests: $project"
            safe_name="${project//\//_}"
            safe_name="${safe_name//\\/_}"
            log_file="${RUNNER_TEMP}/ci-test-logs/${safe_name}.log"
            set +e
            dotnet test "$project" --configuration Release --no-restore 2>&1 | tee "$log_file"
            status=${PIPESTATUS[0]}
            set -e
            if [ "$status" -ne 0 ]; then
              {
                echo "FAILED_TEST_PROJECT=$project"
                echo "FAILED_LOG_FILE=$log_file"
              } > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"
              exit "$status"
            fi
          done

      - name: Notify Telegram (failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Skipping Telegram notification: missing secrets."
            exit 0
          fi

          FAILED_PROJECT_NAME="unknown"
          FAILED_LOG_FILE=""
          if [ -f "${RUNNER_TEMP}/ci-test-logs/failure-meta.env" ]; then
            parsed_project=$(grep '^FAILED_TEST_PROJECT=' "${RUNNER_TEMP}/ci-test-logs/failure-meta.env" | head -n 1 | cut -d= -f2-)
            parsed_log=$(grep '^FAILED_LOG_FILE=' "${RUNNER_TEMP}/ci-test-logs/failure-meta.env" | head -n 1 | cut -d= -f2-)
            if [ -n "${parsed_project}" ]; then
              FAILED_PROJECT_NAME="${parsed_project}"
            fi
            if [ -n "${parsed_log}" ]; then
              FAILED_LOG_FILE="${parsed_log}"
            fi
          fi
          if [ -z "${FAILED_LOG_FILE}" ]; then
            FAILED_LOG_FILE=$(find "${RUNNER_TEMP}/ci-test-logs" -maxdepth 1 -type f -name '*.log' | sort | tail -n 1)
          fi
          MESSAGE=$'CI tests failed\nRepo: '"${GITHUB_REPOSITORY}"$'\nBranch: '"${GITHUB_REF_NAME}"$'\nCommit: '"${GITHUB_SHA::8}"$'\nActor: '"${GITHUB_ACTOR}"$'\nProject: '"${FAILED_PROJECT_NAME}"$'\nRun: '"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MESSAGE}" >/dev/null
          if [ -n "${FAILED_LOG_FILE}" ] && [ -f "${FAILED_LOG_FILE}" ]; then
            response=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F caption="CI failure log: ${FAILED_PROJECT_NAME}" \
              -F document=@"${FAILED_LOG_FILE};type=text/plain")
            if ! echo "${response}" | grep -q '"ok":true'; then
              tail_excerpt=$(tail -n 40 "${FAILED_LOG_FILE}")
              FALLBACK_MESSAGE=$'CI failure log tail\nProject: '"${FAILED_PROJECT_NAME}"$'\n\n'"${tail_excerpt}"
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode text="${FALLBACK_MESSAGE}" >/dev/null
            fi
          fi

      - name: Upload CI failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-failure-logs
          path: ${{ runner.temp }}/ci-test-logs/
          if-no-files-found: ignore
