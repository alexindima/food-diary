name: CI Tests

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  dotnet-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FoodDiary.slnx

      - name: Build
        run: dotnet build FoodDiary.slnx --configuration Release --no-restore

      - name: Run all test projects
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          projects=(tests/*/*.csproj)
          if [ ${#projects[@]} -eq 0 ]; then
            echo "No test projects found in tests/*/*.csproj"
            exit 1
          fi
          for project in "${projects[@]}"; do
            echo "Running tests: $project"
            dotnet test "$project" --configuration Release --no-restore
          done
