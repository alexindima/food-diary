name: CI Tests

on:
  pull_request:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  dotnet-tests:
    name: Backend .NET tests and formatting
    runs-on: ubuntu-latest

    steps:
      - name: Initialize test diagnostics
        run: |
          mkdir -p "${RUNNER_TEMP}/ci-test-logs"
          : > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/ci-test-logs/restore.log"
          set +e
          dotnet restore FoodDiary.slnx 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Restore"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Check formatting
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/ci-test-logs/dotnet-format.log"
          set +e
          dotnet format FoodDiary.slnx --verify-no-changes --no-restore 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Check formatting"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/ci-test-logs/build.log"
          set +e
          dotnet build FoodDiary.slnx --configuration Release --no-restore 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Build"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Run all test projects
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          projects=(tests/*/*.csproj)
          if [ ${#projects[@]} -eq 0 ]; then
            echo "No test projects found in tests/*/*.csproj"
            exit 1
          fi
          for project in "${projects[@]}"; do
            echo "Running tests: $project"
            safe_name="${project//\//_}"
            safe_name="${safe_name//\\/_}"
            log_file="${RUNNER_TEMP}/ci-test-logs/${safe_name}.log"
            set +e
            dotnet test "$project" --configuration Release --no-restore --no-build 2>&1 | tee "$log_file"
            status=${PIPESTATUS[0]}
            set -e
            if [ "$status" -ne 0 ]; then
              {
                echo "FAILED_AREA=dotnet"
                echo "FAILED_TARGET=$project"
                echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
              } > "${RUNNER_TEMP}/ci-test-logs/failure-meta.env"
              exit "$status"
            fi
          done

      - name: Append backend .NET summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          logs_dir="${RUNNER_TEMP}/ci-test-logs"
          failed_log_name=""
          if [ -f "${logs_dir}/failure-meta.env" ]; then
            failed_log_name=$(grep '^FAILED_LOG_FILE_NAME=' "${logs_dir}/failure-meta.env" | head -n 1 | cut -d= -f2- || true)
          fi

          status_for_log() {
            local log_file="$1"
            if [ ! -f "$log_file" ]; then
              printf 'Not run'
              return
            fi

            if [ -n "$failed_log_name" ] && [ "$(basename "$log_file")" = "$failed_log_name" ]; then
              printf 'Failed'
              return
            fi

            printf 'Passed'
          }

          test_details_for_log() {
            local log_file="$1"
            if [ ! -f "$log_file" ]; then
              printf 'Not run'
              return
            fi

            local summary
            summary=$(grep -E 'Passed!|Failed!' "$log_file" | tail -n 1 | xargs || true)
            if [ -n "$summary" ]; then
              printf '%s' "$summary"
            else
              printf 'dotnet test'
            fi
          }

          {
            echo "## Backend .NET checks"
            echo
            echo "| Area | Check | Status | Details |"
            echo "| --- | --- | --- | --- |"
            echo "| Setup | Restore solution | $(status_for_log "${logs_dir}/restore.log") | dotnet restore FoodDiary.slnx |"
            echo "| Quality | Formatting | $(status_for_log "${logs_dir}/dotnet-format.log") | dotnet format --verify-no-changes |"
            echo "| Build | Solution build | $(status_for_log "${logs_dir}/build.log") | dotnet build Release |"

            shopt -s nullglob
            projects=(tests/*/*.csproj)
            for project in "${projects[@]}"; do
              safe_name="${project//\//_}"
              safe_name="${safe_name//\\/_}"
              log_file="${logs_dir}/${safe_name}.log"
              project_name=$(basename "$project" .csproj)
              echo "| Tests | ${project_name} | $(status_for_log "$log_file") | $(test_details_for_log "$log_file") |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-failure-logs-dotnet
          path: ${{ runner.temp }}/ci-test-logs/
          if-no-files-found: ignore

  backend-postgres-critical-flows:
    name: Backend PostgreSQL critical flows
    runs-on: ubuntu-latest

    steps:
      - name: Initialize PostgreSQL critical-flow diagnostics
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/postgres-critical-flow-logs"
          : > "${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Verify Docker availability
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/postgres-critical-flow-logs/docker-version.log"
          set +e
          docker version 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Verify Docker availability for PostgreSQL critical flows"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Restore
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/postgres-critical-flow-logs/restore.log"
          set +e
          dotnet restore FoodDiary.slnx 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Restore PostgreSQL critical flows"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Run PostgreSQL API critical flows
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/postgres-critical-flow-logs/web-api-critical-flows.log"
          set +e
          dotnet test tests/FoodDiary.Web.Api.IntegrationTests/FoodDiary.Web.Api.IntegrationTests.csproj \
            --configuration Release \
            --no-restore \
            --filter "FullyQualifiedName~PostgresCriticalApiFlowTests|FullyQualifiedName~PostgresUserFlowTests" \
            2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Run PostgreSQL API critical flows"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Run PostgreSQL infrastructure critical flows
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/postgres-critical-flow-logs/infrastructure-critical-flows.log"
          set +e
          dotnet test tests/FoodDiary.Infrastructure.Tests/FoodDiary.Infrastructure.Tests.csproj \
            --configuration Release \
            --no-restore \
            --filter "FullyQualifiedName~UserRepositoryIntegrationTests|FullyQualifiedName~UserCleanupServiceIntegrationTests" \
            2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Run PostgreSQL infrastructure critical flows"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Append PostgreSQL critical-flow summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          logs_dir="${RUNNER_TEMP}/postgres-critical-flow-logs"
          failed_log_name=""
          if [ -f "${logs_dir}/failure-meta.env" ]; then
            failed_log_name=$(grep '^FAILED_LOG_FILE_NAME=' "${logs_dir}/failure-meta.env" | head -n 1 | cut -d= -f2- || true)
          fi

          status_for_log() {
            local log_file="$1"
            if [ ! -f "$log_file" ]; then
              printf 'Not run'
              return
            fi

            if [ -n "$failed_log_name" ] && [ "$(basename "$log_file")" = "$failed_log_name" ]; then
              printf 'Failed'
              return
            fi

            printf 'Passed'
          }

          test_details_for_log() {
            local log_file="$1"
            if [ ! -f "$log_file" ]; then
              printf 'Not run'
              return
            fi

            local summary
            summary=$(grep -E 'Passed!|Failed!' "$log_file" | tail -n 1 | xargs || true)
            if [ -n "$summary" ]; then
              printf '%s' "$summary"
            else
              printf 'dotnet test'
            fi
          }

          {
            echo "## Backend PostgreSQL critical flows"
            echo
            echo "| Area | Check | Status | Details |"
            echo "| --- | --- | --- | --- |"
            echo "| Setup | Docker availability | $(status_for_log "${logs_dir}/docker-version.log") | docker version |"
            echo "| Setup | Restore solution | $(status_for_log "${logs_dir}/restore.log") | dotnet restore FoodDiary.slnx |"
            echo "| Tests | API critical flows | $(status_for_log "${logs_dir}/web-api-critical-flows.log") | $(test_details_for_log "${logs_dir}/web-api-critical-flows.log") |"
            echo "| Tests | Infrastructure critical flows | $(status_for_log "${logs_dir}/infrastructure-critical-flows.log") | $(test_details_for_log "${logs_dir}/infrastructure-critical-flows.log") |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PostgreSQL critical-flow failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-failure-logs-postgres-critical-flows
          path: ${{ runner.temp }}/postgres-critical-flow-logs/
          if-no-files-found: ignore

  backend-dependency-audit:
    name: Backend dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Initialize dependency audit diagnostics
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/dependency-audit-logs"
          : > "${RUNNER_TEMP}/dependency-audit-logs/failure-meta.env"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: bash
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/dependency-audit-logs/restore.log"
          set +e
          dotnet restore FoodDiary.slnx 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=dotnet"
              echo "FAILED_TARGET=Restore dependency audit"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/dependency-audit-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Audit backend dependencies
        shell: bash
        run: |
          set -euo pipefail
          projects=(
            "FoodDiary.Web.Api/FoodDiary.Web.Api.csproj"
            "FoodDiary.Infrastructure/FoodDiary.Infrastructure.csproj"
            "FoodDiary.Application/FoodDiary.Application.csproj"
          )

          for project in "${projects[@]}"; do
            safe_name="${project//\//_}"
            safe_name="${safe_name//\\/_}"
            log_file="${RUNNER_TEMP}/dependency-audit-logs/${safe_name}.log"
            set +e
            dotnet list "$project" package --vulnerable --include-transitive 2>&1 | tee "$log_file"
            status=${PIPESTATUS[0]}
            set -e
            if [ "$status" -ne 0 ]; then
              {
                echo "FAILED_AREA=dotnet"
                echo "FAILED_TARGET=Audit dependencies for $project"
                echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
              } > "${RUNNER_TEMP}/dependency-audit-logs/failure-meta.env"
              exit "$status"
            fi

            if grep -qE 'has the following vulnerable packages|severity:[[:space:]]*(Critical|High|Moderate|Low)' "$log_file"; then
              {
                echo "FAILED_AREA=dotnet"
                echo "FAILED_TARGET=Vulnerable dependencies detected in $project"
                echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
              } > "${RUNNER_TEMP}/dependency-audit-logs/failure-meta.env"
              exit 1
            fi
          done

      - name: Append dependency audit summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          logs_dir="${RUNNER_TEMP}/dependency-audit-logs"
          failed_log_name=""
          if [ -f "${logs_dir}/failure-meta.env" ]; then
            failed_log_name=$(grep '^FAILED_LOG_FILE_NAME=' "${logs_dir}/failure-meta.env" | head -n 1 | cut -d= -f2- || true)
          fi

          status_for_log() {
            local log_file="$1"
            if [ ! -f "$log_file" ]; then
              printf 'Not run'
              return
            fi

            if [ -n "$failed_log_name" ] && [ "$(basename "$log_file")" = "$failed_log_name" ]; then
              printf 'Failed'
              return
            fi

            printf 'Passed'
          }

          audit_details_for_log() {
            local log_file="$1"
            if [ ! -f "$log_file" ]; then
              printf 'Not run'
              return
            fi

            if grep -qE 'has the following vulnerable packages|severity:[[:space:]]*(Critical|High|Moderate|Low)' "$log_file"; then
              printf 'Vulnerable package detected'
              return
            fi

            if grep -q 'has no vulnerable packages' "$log_file"; then
              printf 'No vulnerable packages'
              return
            fi

            printf 'dotnet list package --vulnerable'
          }

          projects=(
            "FoodDiary.Web.Api/FoodDiary.Web.Api.csproj"
            "FoodDiary.Infrastructure/FoodDiary.Infrastructure.csproj"
            "FoodDiary.Application/FoodDiary.Application.csproj"
          )

          {
            echo "## Backend dependency audit"
            echo
            echo "| Area | Check | Status | Details |"
            echo "| --- | --- | --- | --- |"
            echo "| Setup | Restore solution | $(status_for_log "${logs_dir}/restore.log") | dotnet restore FoodDiary.slnx |"
            for project in "${projects[@]}"; do
              safe_name="${project//\//_}"
              safe_name="${safe_name//\\/_}"
              log_file="${logs_dir}/${safe_name}.log"
              project_name=$(basename "$project" .csproj)
              echo "| Security | ${project_name} dependencies | $(status_for_log "$log_file") | $(audit_details_for_log "$log_file") |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dependency audit failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-failure-logs-dependency-audit
          path: ${{ runner.temp }}/dependency-audit-logs/
          if-no-files-found: ignore

  frontend-checks:
    name: Frontend checks, tests, and builds
    runs-on: ubuntu-latest

    steps:
      - name: Initialize frontend diagnostics
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/frontend-checks-logs"
          : > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: FoodDiary.Web.Client/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/npm-ci.log"
          set +e
          npm ci 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Install frontend dependencies"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Check i18n consistency
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/i18n-check.log"
          set +e
          npm run check:i18n 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Check i18n consistency"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Lint frontend
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/lint.log"
          set +e
          npm run lint 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Lint frontend"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Lint frontend dependency graph
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/dependency-graph.log"
          set +e
          npm run lint:deps 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Lint frontend dependency graph"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Lint styles
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/stylelint.log"
          set +e
          npm run stylelint 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Lint styles"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Check formatting
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/prettier.log"
          set +e
          npx prettier --check "src/**/*.{ts,html}" "projects/**/*.{ts,html}" 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Check formatting"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Run frontend app unit tests
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/unit-tests.log"
          set +e
          npx ng test food-diary-web-client --watch=false --reporters=default > "$log_file" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::group::Frontend unit test failure summary"
            failure_summary=$(sed -n '/Failed Suites/,$p' "$log_file" | head -n 240 || true)
            if [ -z "$failure_summary" ]; then
              failure_summary=$(sed -n '/Failed Tests/,$p' "$log_file" | head -n 240 || true)
            fi
            if [ -z "$failure_summary" ]; then
              failure_summary=$(grep -E -A 20 '(^|[[:space:]])FAIL[[:space:]]|Error:|AssertionError' "$log_file" | head -n 240 || true)
            fi
            if [ -n "$failure_summary" ]; then
              printf '%s\n' "$failure_summary"
            else
              tail -n 160 "$log_file"
            fi
            echo "::endgroup::"
            echo "Full frontend unit test log is uploaded as a CI artifact."
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Run frontend unit tests"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi
          grep -E 'Test Files|Tests|Duration' "$log_file" | tail -n 5 || true

      - name: Run admin frontend unit tests
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/admin-unit-tests.log"
          set +e
          npx ng test fooddiary-admin --watch=false --reporters=default > "$log_file" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::group::Admin frontend unit test failure summary"
            failure_summary=$(sed -n '/Failed Suites/,$p' "$log_file" | head -n 240 || true)
            if [ -z "$failure_summary" ]; then
              failure_summary=$(sed -n '/Failed Tests/,$p' "$log_file" | head -n 240 || true)
            fi
            if [ -z "$failure_summary" ]; then
              failure_summary=$(grep -E -A 20 '(^|[[:space:]])FAIL[[:space:]]|Error:|AssertionError' "$log_file" | head -n 240 || true)
            fi
            if [ -n "$failure_summary" ]; then
              printf '%s\n' "$failure_summary"
            else
              tail -n 160 "$log_file"
            fi
            echo "::endgroup::"
            echo "Full admin frontend unit test log is uploaded as a CI artifact."
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Run admin frontend unit tests"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi
          grep -E 'Test Files|Tests|Duration' "$log_file" | tail -n 5 || true

      - name: Run fd-ui-kit unit tests
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/fd-ui-kit-tests.log"
          set +e
          npx ng test fd-ui-kit --watch=false --reporters=default > "$log_file" 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::group::fd-ui-kit unit test failure summary"
            failure_summary=$(sed -n '/Failed Suites/,$p' "$log_file" | head -n 240 || true)
            if [ -z "$failure_summary" ]; then
              failure_summary=$(sed -n '/Failed Tests/,$p' "$log_file" | head -n 240 || true)
            fi
            if [ -z "$failure_summary" ]; then
              failure_summary=$(grep -E -A 20 '(^|[[:space:]])FAIL[[:space:]]|Error:|AssertionError' "$log_file" | head -n 240 || true)
            fi
            if [ -n "$failure_summary" ]; then
              printf '%s\n' "$failure_summary"
            else
              tail -n 160 "$log_file"
            fi
            echo "::endgroup::"
            echo "Full fd-ui-kit unit test log is uploaded as a CI artifact."
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Run fd-ui-kit unit tests"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi
          grep -E 'Test Files|Tests|Duration' "$log_file" | tail -n 5 || true

      - name: Build frontend
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/build-frontend.log"
          set +e
          npm run build:prod 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Build frontend"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Check prerendered SEO HTML
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/seo-prerender-check.log"
          set +e
          npm run check:seo-prerender 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Check prerendered SEO HTML"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Build admin frontend
        shell: bash
        working-directory: FoodDiary.Web.Client
        run: |
          set -euo pipefail
          log_file="${RUNNER_TEMP}/frontend-checks-logs/build-admin-frontend.log"
          set +e
          npm run build:admin 2>&1 | tee "$log_file"
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            {
              echo "FAILED_AREA=frontend"
              echo "FAILED_TARGET=Build admin frontend"
              echo "FAILED_LOG_FILE_NAME=$(basename "$log_file")"
            } > "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
            exit "$status"
          fi

      - name: Append frontend checks summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          logs_dir="${RUNNER_TEMP}/frontend-checks-logs"
          failed_log_name=""
          if [ -f "${logs_dir}/failure-meta.env" ]; then
            failed_log_name=$(grep '^FAILED_LOG_FILE_NAME=' "${logs_dir}/failure-meta.env" | head -n 1 | cut -d= -f2- || true)
          fi

          strip_ansi() {
            sed -E 's/\x1B\[[0-9;]*[A-Za-z]//g'
          }

          status_for_log() {
            local log_file="$1"
            if [ ! -f "$log_file" ]; then
              printf 'Not run'
              return
            fi

            if [ -n "$failed_log_name" ] && [ "$(basename "$log_file")" = "$failed_log_name" ]; then
              printf 'Failed'
              return
            fi

            printf 'Passed'
          }

          test_summary_for_log() {
            local log_file="$1"
            if [ ! -f "$log_file" ]; then
              printf 'Not run'
              return
            fi

            local test_files
            local tests
            test_files=$(grep 'Test Files' "$log_file" | strip_ansi | tail -n 1 | sed -E 's/.*\(([0-9]+)\).*/\1/' || true)
            tests=$(grep 'Tests' "$log_file" | strip_ansi | tail -n 1 | sed -E 's/.*\(([0-9]+)\).*/\1/' || true)
            if [ -n "$test_files" ] && [ -n "$tests" ]; then
              printf '%s files, %s tests' "$test_files" "$tests"
            else
              printf 'See uploaded log'
            fi
          }

          {
            echo "## Frontend checks"
            echo
            echo "| Area | Check | Status | Details |"
            echo "| --- | --- | --- | --- |"
            echo "| Setup | Install dependencies | $(status_for_log "${logs_dir}/npm-ci.log") | npm ci |"
            echo "| Quality | i18n consistency | $(status_for_log "${logs_dir}/i18n-check.log") | npm run check:i18n |"
            echo "| Quality | ESLint | $(status_for_log "${logs_dir}/lint.log") | npm run lint |"
            echo "| Quality | Dependency graph lint | $(status_for_log "${logs_dir}/dependency-graph.log") | npm run lint:deps |"
            echo "| Quality | Stylelint | $(status_for_log "${logs_dir}/stylelint.log") | npm run stylelint |"
            echo "| Quality | Formatting | $(status_for_log "${logs_dir}/prettier.log") | prettier --check |"
            echo "| Tests | Frontend app unit tests | $(status_for_log "${logs_dir}/unit-tests.log") | $(test_summary_for_log "${logs_dir}/unit-tests.log") |"
            echo "| Tests | Admin frontend unit tests | $(status_for_log "${logs_dir}/admin-unit-tests.log") | $(test_summary_for_log "${logs_dir}/admin-unit-tests.log") |"
            echo "| Tests | fd-ui-kit unit tests | $(status_for_log "${logs_dir}/fd-ui-kit-tests.log") | $(test_summary_for_log "${logs_dir}/fd-ui-kit-tests.log") |"
            echo "| Build | Frontend production build | $(status_for_log "${logs_dir}/build-frontend.log") | npm run build:prod |"
            echo "| Build | SEO prerender check | $(status_for_log "${logs_dir}/seo-prerender-check.log") | npm run check:seo-prerender |"
            echo "| Build | Admin frontend build | $(status_for_log "${logs_dir}/build-admin-frontend.log") | npm run build:admin |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload frontend failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-failure-logs-frontend
          path: ${{ runner.temp }}/frontend-checks-logs/
          if-no-files-found: ignore

  notify-ci-failure:
    if: always() && (needs.dotnet-tests.result == 'failure' || needs.backend-postgres-critical-flows.result == 'failure' || needs.backend-dependency-audit.result == 'failure' || needs.frontend-checks.result == 'failure')
    needs:
      - dotnet-tests
      - backend-postgres-critical-flows
      - backend-dependency-audit
      - frontend-checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Capture commit metadata
        id: commit_meta
        shell: bash
        run: |
          set -euo pipefail
          commit_sha=$(git rev-parse --short HEAD)
          commit_subject=$(git log -1 --pretty=%s)
          commit_subject=${commit_subject//$'\r'/}
          commit_subject=${commit_subject//$'\n'/ }
          commit_subject=$(printf '%s' "$commit_subject" | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//')
          if [ "${#commit_subject}" -gt 150 ]; then
            commit_subject="${commit_subject:0:147}..."
          fi
          echo "sha=${commit_sha}" >> "$GITHUB_OUTPUT"
          echo "subject=${commit_subject}" >> "$GITHUB_OUTPUT"

      - name: Download dotnet failure logs
        if: needs.dotnet-tests.result == 'failure'
        uses: actions/download-artifact@v8
        with:
          name: ci-failure-logs-dotnet
          path: ${{ runner.temp }}/ci-test-logs
        continue-on-error: true

      - name: Download PostgreSQL critical-flow failure logs
        if: needs.backend-postgres-critical-flows.result == 'failure'
        uses: actions/download-artifact@v8
        with:
          name: ci-failure-logs-postgres-critical-flows
          path: ${{ runner.temp }}/postgres-critical-flow-logs
        continue-on-error: true

      - name: Download dependency audit failure logs
        if: needs.backend-dependency-audit.result == 'failure'
        uses: actions/download-artifact@v8
        with:
          name: ci-failure-logs-dependency-audit
          path: ${{ runner.temp }}/dependency-audit-logs
        continue-on-error: true

      - name: Download frontend failure logs
        if: needs.frontend-checks.result == 'failure'
        uses: actions/download-artifact@v8
        with:
          name: ci-failure-logs-frontend
          path: ${{ runner.temp }}/frontend-checks-logs
        continue-on-error: true

      - name: Notify Telegram (failure)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_SHA: ${{ steps.commit_meta.outputs.sha }}
          COMMIT_SUBJECT: ${{ steps.commit_meta.outputs.subject }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Skipping Telegram notification: missing secrets."
            exit 0
          fi

          FAILED_AREA="unknown"
          FAILED_TARGET="unknown"
          FAILED_LOG_FILE=""
          FAILED_LOG_FILE_NAME=""
          META_FILE=""

          if [ "${{ needs.dotnet-tests.result }}" = "failure" ] && [ -f "${RUNNER_TEMP}/ci-test-logs/failure-meta.env" ]; then
            META_FILE="${RUNNER_TEMP}/ci-test-logs/failure-meta.env"
          fi

          if [ -z "${META_FILE}" ] && [ "${{ needs.backend-postgres-critical-flows.result }}" = "failure" ] && [ -f "${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env" ]; then
            META_FILE="${RUNNER_TEMP}/postgres-critical-flow-logs/failure-meta.env"
          fi

          if [ -z "${META_FILE}" ] && [ "${{ needs.backend-dependency-audit.result }}" = "failure" ] && [ -f "${RUNNER_TEMP}/dependency-audit-logs/failure-meta.env" ]; then
            META_FILE="${RUNNER_TEMP}/dependency-audit-logs/failure-meta.env"
          fi

          if [ -z "${META_FILE}" ] && [ "${{ needs.frontend-checks.result }}" = "failure" ] && [ -f "${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env" ]; then
            META_FILE="${RUNNER_TEMP}/frontend-checks-logs/failure-meta.env"
          fi

          if [ -n "${META_FILE}" ]; then
            parsed_area=$(grep '^FAILED_AREA=' "${META_FILE}" | head -n 1 | cut -d= -f2-)
            parsed_target=$(grep '^FAILED_TARGET=' "${META_FILE}" | head -n 1 | cut -d= -f2-)
            parsed_log_name=$(grep '^FAILED_LOG_FILE_NAME=' "${META_FILE}" | head -n 1 | cut -d= -f2-)
            if [ -n "${parsed_area}" ]; then
              FAILED_AREA="${parsed_area}"
            fi
            if [ -n "${parsed_target}" ]; then
              FAILED_TARGET="${parsed_target}"
            fi
            if [ -n "${parsed_log_name}" ]; then
              FAILED_LOG_FILE_NAME="${parsed_log_name}"
            fi
          fi

          if [ -n "${FAILED_LOG_FILE_NAME}" ]; then
            dotnet_candidate="${RUNNER_TEMP}/ci-test-logs/${FAILED_LOG_FILE_NAME}"
            postgres_candidate="${RUNNER_TEMP}/postgres-critical-flow-logs/${FAILED_LOG_FILE_NAME}"
            dependency_audit_candidate="${RUNNER_TEMP}/dependency-audit-logs/${FAILED_LOG_FILE_NAME}"
            frontend_candidate="${RUNNER_TEMP}/frontend-checks-logs/${FAILED_LOG_FILE_NAME}"
            if [ -f "${dotnet_candidate}" ]; then
              FAILED_LOG_FILE="${dotnet_candidate}"
            elif [ -f "${postgres_candidate}" ]; then
              FAILED_LOG_FILE="${postgres_candidate}"
            elif [ -f "${dependency_audit_candidate}" ]; then
              FAILED_LOG_FILE="${dependency_audit_candidate}"
            elif [ -f "${frontend_candidate}" ]; then
              FAILED_LOG_FILE="${frontend_candidate}"
            fi
          fi

          if [ -z "${FAILED_LOG_FILE}" ] || [ ! -f "${FAILED_LOG_FILE}" ]; then
            if [ "${FAILED_AREA}" = "frontend" ]; then
              FAILED_LOG_FILE=$(find "${RUNNER_TEMP}/frontend-checks-logs" -maxdepth 1 -type f -name '*.log' | sort | tail -n 1 || true)
            elif [ "${FAILED_AREA}" = "dotnet" ]; then
              FAILED_LOG_FILE=$(find "${RUNNER_TEMP}/ci-test-logs" "${RUNNER_TEMP}/postgres-critical-flow-logs" "${RUNNER_TEMP}/dependency-audit-logs" -maxdepth 1 -type f -name '*.log' | sort | tail -n 1 || true)
            else
              FAILED_LOG_FILE=$(find "${RUNNER_TEMP}" -maxdepth 2 -type f -name '*.log' | sort | tail -n 1 || true)
            fi
          fi

          WORKFLOW_NAME="CI Tests"
          MESSAGE=$'❌ CI failed\nWorkflow: '"${WORKFLOW_NAME}"$'\nRepo: '"${GITHUB_REPOSITORY}"$'\nBranch: '"${GITHUB_REF_NAME}"$'\nCommit: '"${COMMIT_SHA}"$'\nTitle: '"${COMMIT_SUBJECT}"$'\nActor: '"${GITHUB_ACTOR}"$'\nArea: '"${FAILED_AREA}"$'\nStep: '"${FAILED_TARGET}"$'\nRun: '"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MESSAGE}" >/dev/null

          if [ -n "${FAILED_LOG_FILE}" ] && [ -f "${FAILED_LOG_FILE}" ]; then
            echo "Sending log file: ${FAILED_LOG_FILE}"
            safe_area=$(printf '%s' "${FAILED_AREA}" | tr -cs '[:alnum:]' '-')
            safe_target=$(printf '%s' "${FAILED_TARGET}" | tr -cs '[:alnum:]' '-')
            telegram_log_file="${RUNNER_TEMP}/ci-${safe_area}-${safe_target}.txt"
            {
              echo "CI failure summary"
              echo "Workflow: ${WORKFLOW_NAME}"
              echo "Area: ${FAILED_AREA}"
              echo "Step: ${FAILED_TARGET}"
              echo "Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
              echo
              failure_summary=$(sed -n '/Failed Suites/,$p' "${FAILED_LOG_FILE}" | head -n 180 || true)
              if [ -z "${failure_summary}" ]; then
                failure_summary=$(sed -n '/Failed Tests/,$p' "${FAILED_LOG_FILE}" | head -n 180 || true)
              fi
              if [ -z "${failure_summary}" ]; then
                failure_summary=$(grep -E -A 40 '(^|[[:space:]])FAIL[[:space:]]|Error:|AssertionError|error TS|error [A-Z0-9]+|âœ–|FAILED|Failed!' "${FAILED_LOG_FILE}" | head -n 180 || true)
              fi
              if [ -n "${failure_summary}" ]; then
                printf '%s\n' "${failure_summary}"
              else
                tail -n 120 "${FAILED_LOG_FILE}"
              fi
              echo
              echo "Full log is available in the uploaded CI artifact."
            } > "${telegram_log_file}"
            response=$(curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
              -F chat_id="${TELEGRAM_CHAT_ID}" \
              -F caption="❌ CI Tests | ${FAILED_AREA} | ${FAILED_TARGET}" \
              -F document=@"${telegram_log_file}")
            if ! echo "${response}" | grep -q '"ok":true'; then
              tail_excerpt=$(tail -n 40 "${FAILED_LOG_FILE}")
              FALLBACK_MESSAGE=$'❌ CI failure log tail\nWorkflow: '"${WORKFLOW_NAME}"$'\nArea: '"${FAILED_AREA}"$'\nStep: '"${FAILED_TARGET}"$'\n\n'"${tail_excerpt}"
              curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d chat_id="${TELEGRAM_CHAT_ID}" \
                --data-urlencode text="${FALLBACK_MESSAGE}" >/dev/null
            fi
          else
            FALLBACK_MESSAGE=$'❌ CI failure log unavailable\nWorkflow: '"${WORKFLOW_NAME}"$'\nArea: '"${FAILED_AREA}"$'\nStep: '"${FAILED_TARGET}"$'\nLog file was not found in downloaded artifacts.'
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              --data-urlencode text="${FALLBACK_MESSAGE}" >/dev/null
          fi
