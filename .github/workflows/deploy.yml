name: Deploy

on:
  workflow_run:
    workflows:
      - CI Tests
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

env:
  SERVER_IP: 193.109.69.58
  IMAGE_PREFIX: ghcr.io/alexindima/food-diary

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Capture commit metadata
        id: commit_meta
        shell: bash
        run: |
          set -euo pipefail
          commit_sha=$(git rev-parse --short HEAD)
          commit_subject=$(git log -1 --pretty=%s)
          commit_subject=${commit_subject//$'\r'/}
          commit_subject=${commit_subject//$'\n'/ }
          commit_subject=$(printf '%s' "$commit_subject" | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//')
          if [ "${#commit_subject}" -gt 150 ]; then
            commit_subject="${commit_subject:0:147}..."
          fi
          echo "sha=${commit_sha}" >> "$GITHUB_OUTPUT"
          echo "subject=${commit_subject}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: FoodDiary.Web.Api/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:latest
            ${{ env.IMAGE_PREFIX }}/api:sha-${{ github.sha }}

      - name: Build and push Telegram Bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: FoodDiary.Telegram.Bot/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/telegram-bot:latest
            ${{ env.IMAGE_PREFIX }}/telegram-bot:sha-${{ github.sha }}

      - name: Build and push Initializer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: FoodDiary.Initializer/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/initializer:latest
            ${{ env.IMAGE_PREFIX }}/initializer:sha-${{ github.sha }}

      - name: Build and push Client
        uses: docker/build-push-action@v6
        with:
          context: FoodDiary.Web.Client
          file: FoodDiary.Web.Client/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/client:latest
            ${{ env.IMAGE_PREFIX }}/client:sha-${{ github.sha }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to server
        run: |
          SSH_CMD="ssh -T -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@${{ env.SERVER_IP }}"

          echo "${{ secrets.GITHUB_TOKEN }}" | $SSH_CMD "docker login ghcr.io -u ${{ github.actor }} --password-stdin"

          $SSH_CMD << 'DEPLOY_EOF'
            set -e
            cd /opt/fooddiary

            docker compose pull
            docker pull ghcr.io/alexindima/food-diary/client:latest

            docker compose --profile tools run --rm initializer update

            docker compose up -d

            id=$(docker create ghcr.io/alexindima/food-diary/client:latest)
            rm -rf /var/www/fooddiary.club/*
            docker cp $id:/usr/share/nginx/html/. /var/www/fooddiary.club/
            rm -rf /var/www/admin.fooddiary.club/*
            docker cp $id:/usr/share/nginx/html-admin/. /var/www/admin.fooddiary.club/
            docker rm $id

            echo "Deploy completed!"
          DEPLOY_EOF

      - name: Notify Telegram (success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Skipping Telegram notification: missing secrets."
            exit 0
          fi
          MESSAGE=$'✅ Deploy success\nRepo: '"${GITHUB_REPOSITORY}"$'\nBranch: '"${GITHUB_REF_NAME}"$'\nCommit: '"${{ steps.commit_meta.outputs.sha }}"$'\nTitle: '"${{ steps.commit_meta.outputs.subject }}"$'\nActor: '"${GITHUB_ACTOR}"$'\nRun: '"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MESSAGE}" >/dev/null

      - name: Notify Telegram (failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Skipping Telegram notification: missing secrets."
            exit 0
          fi
          REF_NAME="${GITHUB_REF_NAME}"
          if [ -z "${REF_NAME}" ] && [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            REF_NAME="${{ github.event.workflow_run.head_branch }}"
          fi
          MESSAGE=$'❌ Deploy failed\nRepo: '"${GITHUB_REPOSITORY}"$'\nBranch: '"${REF_NAME}"$'\nCommit: '"${{ steps.commit_meta.outputs.sha }}"$'\nTitle: '"${{ steps.commit_meta.outputs.subject }}"$'\nActor: '"${GITHUB_ACTOR}"$'\nRun: '"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MESSAGE}" >/dev/null
