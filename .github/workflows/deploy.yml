name: Deploy

on:
  workflow_run:
    workflows:
      - CI Tests
    types:
      - completed
    branches:
      - master
  workflow_dispatch:

env:
  SERVER_IP: 193.109.69.58
  IMAGE_PREFIX: ghcr.io/alexindima/food-diary

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Initialize deploy diagnostics
        shell: bash
        run: |
          mkdir -p "${RUNNER_TEMP}/deploy-logs"
          : > "${RUNNER_TEMP}/deploy-logs/failure-meta.env"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Capture commit metadata
        id: commit_meta
        shell: bash
        run: |
          set -euo pipefail
          commit_sha=$(git rev-parse --short HEAD)
          commit_subject=$(git log -1 --pretty=%s)
          commit_subject=${commit_subject//$'\r'/}
          commit_subject=${commit_subject//$'\n'/ }
          commit_subject=$(printf '%s' "$commit_subject" | sed -E 's/[[:space:]]+/ /g; s/^ //; s/ $//')
          if [ "${#commit_subject}" -gt 150 ]; then
            commit_subject="${commit_subject:0:147}..."
          fi
          echo "sha=${commit_sha}" >> "$GITHUB_OUTPUT"
          echo "subject=${commit_subject}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        id: login_ghcr
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Record failure step
        if: always() && steps.login_ghcr.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "FAILED_AREA=deploy"
            echo "FAILED_TARGET=Login to GitHub Container Registry"
          } > "${RUNNER_TEMP}/deploy-logs/failure-meta.env"

      - name: Set up Docker Buildx
        id: setup_buildx
        uses: docker/setup-buildx-action@v4

      - name: Record failure step
        if: always() && steps.setup_buildx.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "FAILED_AREA=deploy"
            echo "FAILED_TARGET=Set up Docker Buildx"
          } > "${RUNNER_TEMP}/deploy-logs/failure-meta.env"

      - name: Build and push API
        id: build_api
        uses: docker/build-push-action@v7
        with:
          context: .
          file: FoodDiary.Web.Api/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/api:latest
            ${{ env.IMAGE_PREFIX }}/api:sha-${{ github.sha }}

      - name: Record failure step
        if: always() && steps.build_api.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "FAILED_AREA=deploy"
            echo "FAILED_TARGET=Build and push API"
          } > "${RUNNER_TEMP}/deploy-logs/failure-meta.env"

      - name: Build and push Telegram Bot
        id: build_telegram_bot
        uses: docker/build-push-action@v7
        with:
          context: .
          file: FoodDiary.Telegram.Bot/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/telegram-bot:latest
            ${{ env.IMAGE_PREFIX }}/telegram-bot:sha-${{ github.sha }}

      - name: Record failure step
        if: always() && steps.build_telegram_bot.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "FAILED_AREA=deploy"
            echo "FAILED_TARGET=Build and push Telegram Bot"
          } > "${RUNNER_TEMP}/deploy-logs/failure-meta.env"

      - name: Build and push Initializer
        id: build_initializer
        uses: docker/build-push-action@v7
        with:
          context: .
          file: FoodDiary.Initializer/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/initializer:latest
            ${{ env.IMAGE_PREFIX }}/initializer:sha-${{ github.sha }}

      - name: Record failure step
        if: always() && steps.build_initializer.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "FAILED_AREA=deploy"
            echo "FAILED_TARGET=Build and push Initializer"
          } > "${RUNNER_TEMP}/deploy-logs/failure-meta.env"

      - name: Build and push Client
        id: build_client
        uses: docker/build-push-action@v7
        with:
          context: FoodDiary.Web.Client
          file: FoodDiary.Web.Client/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_PREFIX }}/client:latest
            ${{ env.IMAGE_PREFIX }}/client:sha-${{ github.sha }}
          build-args: |
            BUILD_VERSION=${{ github.sha }}

      - name: Record failure step
        if: always() && steps.build_client.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "FAILED_AREA=deploy"
            echo "FAILED_TARGET=Build and push Client"
          } > "${RUNNER_TEMP}/deploy-logs/failure-meta.env"

      - name: Setup SSH
        id: setup_ssh
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Record failure step
        if: always() && steps.setup_ssh.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "FAILED_AREA=deploy"
            echo "FAILED_TARGET=Setup SSH"
          } > "${RUNNER_TEMP}/deploy-logs/failure-meta.env"

      - name: Verify server env file
        id: verify_server_env
        run: |
          SSH_CMD="ssh -T -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@${{ env.SERVER_IP }}"
          $SSH_CMD "test -f /etc/fooddiary/fooddiary.env"

      - name: Record failure step
        if: always() && steps.verify_server_env.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "FAILED_AREA=deploy"
            echo "FAILED_TARGET=Verify server env file"
          } > "${RUNNER_TEMP}/deploy-logs/failure-meta.env"

      - name: Deploy to server
        id: deploy_server
        run: |
          DEPLOY_IMAGE_TAG="sha-${{ github.sha }}"
          SSH_CMD="ssh -T -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no root@${{ env.SERVER_IP }}"
          SCP_CMD="scp -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no"

          echo "${{ secrets.GITHUB_TOKEN }}" | $SSH_CMD "docker login ghcr.io -u ${{ github.actor }} --password-stdin"
          $SSH_CMD "mkdir -p /opt/fooddiary"
          $SCP_CMD docker-compose.yml root@${{ env.SERVER_IP }}:/opt/fooddiary/docker-compose.yml

          DEPLOY_COMMIT_SHA="${{ github.sha }}"

          cat > "${RUNNER_TEMP}/deploy.sh" << 'SCRIPT_EOF'
          #!/bin/bash
          set -e
          cd /opt/fooddiary

          cp /etc/fooddiary/fooddiary.env .env
          printf '\nAPI_IMAGE_TAG=%s\nINITIALIZER_IMAGE_TAG=%s\nTELEGRAM_BOT_IMAGE_TAG=%s\nCLIENT_IMAGE_TAG=%s\nDEPLOY_COMMIT_SHA=%s\n' \
            "$DEPLOY_IMAGE_TAG" \
            "$DEPLOY_IMAGE_TAG" \
            "$DEPLOY_IMAGE_TAG" \
            "$DEPLOY_IMAGE_TAG" \
            "$DEPLOY_COMMIT_SHA" >> .env

          export API_IMAGE_TAG="$DEPLOY_IMAGE_TAG"
          export INITIALIZER_IMAGE_TAG="$DEPLOY_IMAGE_TAG"
          export TELEGRAM_BOT_IMAGE_TAG="$DEPLOY_IMAGE_TAG"
          export CLIENT_IMAGE_TAG="$DEPLOY_IMAGE_TAG"

          docker compose --profile backend --profile full pull

          docker compose --profile backend run -T --rm db-init update

          docker compose --profile backend up -d --force-recreate --no-deps api
          docker compose --profile full up -d --force-recreate --no-deps telegram-bot

          echo "Checking deployed API version..."
          echo "Expected commit SHA: $DEPLOY_COMMIT_SHA"
          echo "Expected image tag: $DEPLOY_IMAGE_TAG"
          version_json=""
          for _ in $(seq 1 15); do
            if version_json=$(curl -fsS http://127.0.0.1:${API_PORT:-5000}/api/v1/version); then
              break
            fi
            sleep 4
          done

          if [ -z "$version_json" ]; then
            echo "API version endpoint did not respond in time."
            exit 1
          fi

          echo "Actual API version payload: $version_json"
          echo "$version_json" | grep -F "\"commitSha\":\"$DEPLOY_COMMIT_SHA\""
          echo "$version_json" | grep -F "\"imageTag\":\"${DEPLOY_IMAGE_TAG}\""

          id=$(docker create ghcr.io/alexindima/food-diary/client:${DEPLOY_IMAGE_TAG})
          rm -rf /var/www/fooddiary.club/*
          docker cp $id:/usr/share/nginx/html/. /var/www/fooddiary.club/
          rm -rf /var/www/admin.fooddiary.club/*
          docker cp $id:/usr/share/nginx/html-admin/. /var/www/admin.fooddiary.club/
          docker rm $id

          docker image prune -a --force --filter "until=24h"

          echo "Deploy completed!"
          SCRIPT_EOF

          $SCP_CMD "${RUNNER_TEMP}/deploy.sh" root@${{ env.SERVER_IP }}:/tmp/deploy.sh
          $SSH_CMD "DEPLOY_IMAGE_TAG='${DEPLOY_IMAGE_TAG}' DEPLOY_COMMIT_SHA='${DEPLOY_COMMIT_SHA}' bash /tmp/deploy.sh"

      - name: Record failure step
        if: always() && steps.deploy_server.outcome == 'failure'
        shell: bash
        run: |
          {
            echo "FAILED_AREA=deploy"
            echo "FAILED_TARGET=Deploy to server"
          } > "${RUNNER_TEMP}/deploy-logs/failure-meta.env"

      - name: Notify Telegram (success)
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Skipping Telegram notification: missing secrets."
            exit 0
          fi
          MESSAGE=$'✅ Deploy success\nWorkflow: Deploy\nRepo: '"${GITHUB_REPOSITORY}"$'\nBranch: '"${GITHUB_REF_NAME}"$'\nCommit: '"${{ steps.commit_meta.outputs.sha }}"$'\nTitle: '"${{ steps.commit_meta.outputs.subject }}"$'\nActor: '"${GITHUB_ACTOR}"$'\nRun: '"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MESSAGE}" >/dev/null

      - name: Notify Telegram (failure)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          FAILED_AREA="deploy"
          FAILED_TARGET="unknown"

          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Skipping Telegram notification: missing secrets."
            exit 0
          fi

          if [ -f "${RUNNER_TEMP}/deploy-logs/failure-meta.env" ]; then
            parsed_area=$(grep '^FAILED_AREA=' "${RUNNER_TEMP}/deploy-logs/failure-meta.env" | head -n 1 | cut -d= -f2-)
            parsed_target=$(grep '^FAILED_TARGET=' "${RUNNER_TEMP}/deploy-logs/failure-meta.env" | head -n 1 | cut -d= -f2-)
            if [ -n "${parsed_area}" ]; then
              FAILED_AREA="${parsed_area}"
            fi
            if [ -n "${parsed_target}" ]; then
              FAILED_TARGET="${parsed_target}"
            fi
          fi

          REF_NAME="${GITHUB_REF_NAME}"
          if [ -z "${REF_NAME}" ] && [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            REF_NAME="${{ github.event.workflow_run.head_branch }}"
          fi
          MESSAGE=$'❌ Deploy failed\nWorkflow: Deploy\nRepo: '"${GITHUB_REPOSITORY}"$'\nBranch: '"${REF_NAME}"$'\nCommit: '"${{ steps.commit_meta.outputs.sha }}"$'\nTitle: '"${{ steps.commit_meta.outputs.subject }}"$'\nActor: '"${GITHUB_ACTOR}"$'\nArea: '"${FAILED_AREA}"$'\nStep: '"${FAILED_TARGET}"$'\nRun: '"${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="${MESSAGE}" >/dev/null
