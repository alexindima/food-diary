version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/FoodDiary.Web.Client"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "@angular-devkit/*"
          - "@angular-eslint/*"
          - "zone.js"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
      linting:
        patterns:
          - "eslint*"
          - "prettier"
          - "stylelint*"

  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dotnet:
        patterns:
          - "Microsoft.*"
      ef-core:
        patterns:
          - "Npgsql.*"
          - "Microsoft.EntityFrameworkCore*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
