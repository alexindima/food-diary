<a class="fd-skip-nav fd-visually-hidden-focusable" href="#main-content">{{ 'COMMON.SKIP_TO_MAIN_CONTENT' | translate }}</a>
<fd-ui-top-loader [visible]="isTopLoaderVisible()" />
<div
    class="fd-root"
    [class.fd-root--no-sidebar]="!isAuthenticated()"
    [class.fd-root--impersonating]="isImpersonating()"
    [class.fd-root--compact-mobile-nav]="usesCompactMobileNavigation()"
>
    @if (isAuthenticated()) {
        @defer (when isAuthenticated()) {
            <fd-sidebar class="fd-root__sidebar" />
            <fd-quick-consumption-drawer />
        } @placeholder {
            <div class="fd-root__sidebar fd-root__sidebar--placeholder" aria-hidden="true"></div>
        }
    }
    <main class="fd-root__main" id="main-content" tabindex="-1">
        @if (isImpersonating()) {
            <div class="fd-impersonation-banner" role="status" aria-live="polite">
                <span>Impersonation mode</span>
                @if (impersonationReason()) {
                    <span class="fd-impersonation-banner__reason fd-truncate">{{ impersonationReason() }}</span>
                }
                <button type="button" class="fd-impersonation-banner__button" (click)="stopImpersonation()">Exit</button>
            </div>
        }
        <div class="fd-root__viewport">
            <router-outlet class="fd-root__content" />
        </div>
    </main>
</div>
<fd-tour-host />
<fd-ui-toast-host />
