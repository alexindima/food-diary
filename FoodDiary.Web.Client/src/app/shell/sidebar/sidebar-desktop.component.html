<aside class="sidebar fd-stack fd-gap-md">
    <div class="sidebar__brand fd-row fd-gap-xs">
        <div class="sidebar__logo">
            <span class="sidebar__logo-mark" aria-hidden="true"></span>
        </div>
        <div class="sidebar__brand-text fd-grid fd-gap-xxs">
            <span class="sidebar__brand-title fd-ui-action-text">Food Diary</span>
            <span class="sidebar__brand-plan fd-ui-caption">{{ brandStatusKey() | translate }}</span>
        </div>
        <fd-ui-button
            class="sidebar__brand-notifications"
            variant="secondary"
            fill="text"
            icon="notifications"
            [ariaLabel]="'NOTIFICATIONS.TITLE' | translate"
            [fdUiHint]="'NOTIFICATIONS.TITLE' | translate"
            (click)="notificationsOpen.emit()"
        >
            @if (unreadNotificationCount() > 0) {
                <span class="sidebar__brand-notifications-dot" aria-hidden="true"></span>
            }
        </fd-ui-button>
    </div>

    <nav class="sidebar__nav fd-grid fd-gap-xxs">
        <fd-sidebar-route-links
            linkClass="sidebar__link fd-grid fd-gap-xs fd-align-center"
            [items]="primaryRouteItems()"
            [pendingRoute]="pendingRoute()"
            (itemSelected)="routeSelected.emit($event)"
        />
        @for (item of primaryActionItems(); track item.id) {
            <button
                type="button"
                class="sidebar__link sidebar__link--admin fd-grid fd-gap-xs fd-align-center"
                (click)="primaryAction.emit(item.action)"
            >
                <fd-ui-icon [name]="item.icon" />
                <span>{{ item.labelKey | translate }}</span>
            </button>
        }
    </nav>

    <div class="sidebar__section">
        <button class="sidebar__section-header fd-row fd-gap-xs fd-justify-between" type="button" (click)="foodTrackingToggle.emit()">
            <span class="fd-ui-action-text">{{ 'SIDEBAR.FOOD_TRACKING' | translate }}</span>
            <fd-ui-icon name="expand_more" [class.is-open]="isFoodTrackingOpen()" />
        </button>
        @if (isFoodTrackingOpen()) {
            <nav class="sidebar__nav sidebar__nav--secondary fd-grid fd-gap-xxs">
                <fd-sidebar-route-links
                    linkClass="sidebar__link sidebar__link--secondary fd-grid fd-gap-xs fd-align-center"
                    [items]="foodTrackingItems()"
                    [pendingRoute]="pendingRoute()"
                    (itemSelected)="routeSelected.emit($event)"
                />
            </nav>
        }
    </div>

    <div class="sidebar__section">
        <button class="sidebar__section-header fd-row fd-gap-xs fd-justify-between" type="button" (click)="bodyTrackingToggle.emit()">
            <span class="fd-ui-action-text">{{ 'SIDEBAR.BODY_TRACKING' | translate }}</span>
            <fd-ui-icon name="expand_more" [class.is-open]="isBodyTrackingOpen()" />
        </button>
        @if (isBodyTrackingOpen()) {
            <nav class="sidebar__nav sidebar__nav--secondary fd-grid fd-gap-xxs">
                <fd-sidebar-route-links
                    linkClass="sidebar__link sidebar__link--secondary fd-grid fd-gap-xs fd-align-center"
                    [items]="bodyTrackingItems()"
                    [pendingRoute]="pendingRoute()"
                    (itemSelected)="routeSelected.emit($event)"
                />
            </nav>
        }
    </div>

    <div class="sidebar__spacer"></div>

    <nav class="sidebar__nav sidebar__nav--secondary sidebar__nav--bottom fd-grid fd-gap-xxs">
        <fd-sidebar-route-links
            linkClass="sidebar__link sidebar__link--secondary fd-grid fd-gap-xs fd-align-center"
            [items]="desktopBottomItems()"
            [pendingRoute]="pendingRoute()"
            (itemSelected)="routeSelected.emit($event)"
        />
    </nav>

    @if (currentUser(); as user) {
        <fd-sidebar-user-menu
            [user]="user"
            [userPlanLabelKey]="userPlanLabelKey()"
            [isOpen]="isUserMenuOpen()"
            [pendingRoute]="pendingRoute()"
            (toggleMenu)="userMenuToggle.emit($event)"
            (directRouteClick)="directRouteClick.emit($event)"
            (logout)="logout.emit()"
        />
    }
</aside>
