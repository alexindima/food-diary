<div class="fasting-controls__active-actions">
    @if (canManageCurrentCyclicDay()) {
        <div class="fasting-controls__active-action-cluster">
            <fd-ui-button
                variant="secondary"
                fill="outline"
                size="sm"
                [disabled]="cyclicActionDisabled()"
                [disabledReason]="cyclicActionDisabled() ? ('DISABLED_HINTS.FASTING_BUSY' | translate) : null"
                (click)="skip.emit()"
            >
                {{ skipCycleActionLabelKey() | translate }}
            </fd-ui-button>
            <fd-ui-button
                variant="secondary"
                fill="outline"
                size="sm"
                [disabled]="cyclicActionDisabled()"
                [disabledReason]="cyclicActionDisabled() ? ('DISABLED_HINTS.FASTING_BUSY' | translate) : null"
                (click)="postpone.emit()"
            >
                {{ postponeCycleActionLabelKey() | translate }}
            </fd-ui-button>
        </div>
    }

    <fd-ui-button
        size="sm"
        [loading]="isEnding()"
        [disabled]="isEnding() || isUpdatingCycle()"
        [disabledReason]="isUpdatingCycle() ? ('DISABLED_HINTS.FASTING_BUSY' | translate) : null"
        (click)="end.emit()"
    >
        {{ endActionLabelKey() | translate }}
    </fd-ui-button>
</div>
