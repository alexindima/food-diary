<fd-ui-dialog-shell size="sm" [title]="data.title">
    <div class="fasting-end-confirm-dialog__body">
        <p class="fasting-end-confirm-dialog__message fd-ui-body-sm">{{ data.message }}</p>
    </div>

    <div fdUiDialogFooter class="fasting-end-confirm-dialog__footer fd-stack fd-gap-sm">
        <fd-ui-button variant="primary" [fullWidth]="true" (click)="onConfirm()">
            {{ data.confirmLabel }}
        </fd-ui-button>
        <fd-ui-button variant="secondary" fill="outline" [fullWidth]="true" (click)="onCancel()">
            {{ data.cancelLabel }}
        </fd-ui-button>
    </div>
</fd-ui-dialog-shell>
