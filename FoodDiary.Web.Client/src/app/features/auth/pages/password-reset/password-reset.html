<section class="password-reset" aria-labelledby="password-reset-title">
    <fd-ui-card appearance="entry" density="relaxed" class="password-reset__card">
        <header class="password-reset__header">
            <p class="password-reset__brand">Food Diary</p>
            <h1 id="password-reset-title" class="password-reset__title fd-page-title">{{ 'AUTH.RESET.TITLE' | translate }}</h1>
            <p class="fd-ui-body-sm">{{ 'AUTH.RESET.SUBTITLE' | translate }}</p>
        </header>

        @if (state() === 'ready') {
            <form class="password-reset__form fd-stack fd-gap-md" [formRoot]="form">
                @let errors = fieldErrors();
                <fd-ui-input
                    type="password"
                    autocomplete="new-password"
                    [formField]="form.password"
                    [label]="'AUTH.RESET.PASSWORD' | translate"
                    [placeholder]="'AUTH.RESET.PASSWORD_PLACEHOLDER' | translate"
                    [error]="errors.password"
                />

                <fd-ui-input
                    type="password"
                    autocomplete="new-password"
                    [formField]="form.confirmPassword"
                    [label]="'AUTH.RESET.CONFIRM_PASSWORD' | translate"
                    [placeholder]="'AUTH.RESET.CONFIRM_PASSWORD_PLACEHOLDER' | translate"
                    [error]="errors.confirmPassword"
                />

                <fd-ui-form-error [error]="errorMessage()" />

                <fd-ui-button
                    type="submit"
                    variant="primary"
                    [fullWidth]="true"
                    [disabled]="form().invalid() || isSubmitting()"
                    [disabledReason]="form().invalid() ? ('DISABLED_HINTS.FORM_INVALID' | translate) : null"
                    [loading]="isSubmitting()"
                >
                    {{ 'AUTH.RESET.SAVE' | translate }}
                </fd-ui-button>
            </form>
        } @else {
            <div class="password-reset__state fd-stack fd-gap-md" role="status" aria-live="polite">
                <p class="password-reset__error fd-ui-body-sm">{{ errorMessage() }}</p>
                <fd-ui-button type="button" variant="secondary" fill="outline" [fullWidth]="true" (click)="onBackToLogin()">
                    {{ 'AUTH.RESET.BACK_TO_LOGIN' | translate }}
                </fd-ui-button>
            </div>
        }
    </fd-ui-card>
</section>
