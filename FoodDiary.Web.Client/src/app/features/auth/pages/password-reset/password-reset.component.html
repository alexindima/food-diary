<section class="password-reset">
    <fd-ui-card appearance="entry" class="password-reset__card">
        <div class="password-reset__header fd-stack fd-gap-xxs">
            <h1 class="fd-page-title">{{ 'AUTH.RESET.TITLE' | translate }}</h1>
            <p class="fd-ui-body-sm">{{ 'AUTH.RESET.SUBTITLE' | translate }}</p>
        </div>

        @if (state() === 'ready') {
            <form class="password-reset__form fd-stack fd-gap-md" [formGroup]="form" (ngSubmit)="onSubmit()">
                @let errors = fieldErrors();
                <fd-ui-input
                    formControlName="password"
                    type="password"
                    autocomplete="new-password"
                    [label]="'AUTH.RESET.PASSWORD' | translate"
                    [placeholder]="'AUTH.RESET.PASSWORD_PLACEHOLDER' | translate"
                    [error]="errors.password"
                />

                <fd-ui-input
                    formControlName="confirmPassword"
                    type="password"
                    autocomplete="new-password"
                    [label]="'AUTH.RESET.CONFIRM_PASSWORD' | translate"
                    [placeholder]="'AUTH.RESET.CONFIRM_PASSWORD_PLACEHOLDER' | translate"
                    [error]="errors.confirmPassword"
                />

                <fd-ui-form-error [error]="errorMessage()" />

                <fd-ui-button
                    type="submit"
                    variant="primary"
                    [fullWidth]="true"
                    [disabled]="form.invalid || isSubmitting()"
                    [loading]="isSubmitting()"
                >
                    {{ 'AUTH.RESET.SAVE' | translate }}
                </fd-ui-button>
            </form>
        } @else {
            <div class="password-reset__state fd-stack fd-gap-md">
                <p class="password-reset__error fd-ui-body-sm">{{ errorMessage() }}</p>
                <fd-ui-button type="button" variant="secondary" fill="outline" [fullWidth]="true" (click)="onBackToLogin()">
                    {{ 'AUTH.RESET.BACK_TO_LOGIN' | translate }}
                </fd-ui-button>
            </div>
        }
    </fd-ui-card>
</section>
