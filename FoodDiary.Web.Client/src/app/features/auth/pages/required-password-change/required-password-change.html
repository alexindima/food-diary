<section class="required-password-change">
    <fd-ui-card class="required-password-change__card">
        <div class="required-password-change__header fd-stack fd-gap-xs">
            <span class="required-password-change__brand">Food Diary</span>
            <h1>{{ 'AUTH.REQUIRED_PASSWORD_CHANGE.TITLE' | translate }}</h1>
            <p>{{ 'AUTH.REQUIRED_PASSWORD_CHANGE.SUBTITLE' | translate }}</p>
        </div>

        <form class="fd-stack fd-gap-md" [formRoot]="form" (submit)="submit()">
            <fd-ui-input
                type="password"
                floatLabel="always"
                [formField]="form.currentPassword"
                [label]="'AUTH.REQUIRED_PASSWORD_CHANGE.CURRENT_PASSWORD' | translate"
            />
            <fd-ui-input
                type="password"
                floatLabel="always"
                [formField]="form.newPassword"
                [label]="'AUTH.REQUIRED_PASSWORD_CHANGE.NEW_PASSWORD' | translate"
            />
            <fd-ui-input
                type="password"
                floatLabel="always"
                [formField]="form.confirmPassword"
                [label]="'AUTH.REQUIRED_PASSWORD_CHANGE.CONFIRM_PASSWORD' | translate"
            />

            @if (errorMessage()) {
                <p class="required-password-change__error" role="alert">{{ errorMessage() }}</p>
            }

            <fd-ui-button
                type="submit"
                [fullWidth]="true"
                [loading]="isSubmitting()"
                [disabled]="form().invalid()"
                [disabledReason]="form().invalid() ? ('FORM_ERRORS.REQUIRED' | translate) : null"
            >
                {{ 'AUTH.REQUIRED_PASSWORD_CHANGE.SAVE' | translate }}
            </fd-ui-button>
            <fd-ui-button type="button" variant="secondary" fill="outline" [fullWidth]="true" (click)="logout()">
                {{ 'AUTH.REQUIRED_PASSWORD_CHANGE.LOGOUT' | translate }}
            </fd-ui-button>
        </form>
    </fd-ui-card>
</section>
