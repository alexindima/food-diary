<div class="fd-stack fd-gap-md">
    <div class="auth__field fd-stack fd-gap-xs">
        <fd-ui-input
            appearance="auth"
            type="email"
            autocomplete="email"
            id="auth-register-email"
            [formField]="form().email"
            [label]="'AUTH.REGISTER.EMAIL' | translate"
            [placeholder]="'AUTH.REGISTER.EMAIL_PLACEHOLDER' | translate"
            [error]="errors().email"
        />
    </div>
    <div class="auth__field fd-stack fd-gap-xs">
        <fd-ui-input
            appearance="auth"
            type="password"
            autocomplete="new-password"
            [formField]="form().password"
            [label]="'AUTH.REGISTER.PASSWORD' | translate"
            [placeholder]="'AUTH.REGISTER.PASSWORD_PLACEHOLDER' | translate"
            [error]="errors().password"
        />
    </div>
    <div class="auth__field fd-stack fd-gap-xs">
        <fd-ui-input
            appearance="auth"
            type="password"
            autocomplete="new-password"
            [formField]="form().confirmPassword"
            [label]="'AUTH.REGISTER.CONFIRM_PASSWORD' | translate"
            [placeholder]="'AUTH.REGISTER.CONFIRM_PASSWORD_PLACEHOLDER' | translate"
            [error]="errors().confirmPassword"
        />
    </div>

    <fd-ui-checkbox class="auth__terms" label="" [formField]="form().agreeTerms">
        <span
            class="auth__checkbox-text fd-ui-body-sm"
            [innerHTML]="'AUTH.REGISTER.AGREE_TO_TERMS' | translate: { privacyUrl: '/privacy-policy' }"
        ></span>
    </fd-ui-checkbox>
    <fd-ui-form-error [error]="errors().agreeTerms" />
</div>
