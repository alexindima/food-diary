<div class="auth fd-stack fd-gap-md">
    <fd-ui-tabs class="auth__tabs" [tabs]="authTabs" [selectedValue]="authMode" (selectedValueChange)="handleTabChange($event)" />

    <p class="auth__subtitle fd-ui-body-sm">
        @if (authMode === 'login') {
            {{ 'AUTH.LOGIN.SUBTITLE' | translate }}
        } @else {
            {{ 'AUTH.REGISTER.SUBTITLE' | translate }}
        }
    </p>

    <div class="auth__content fd-stack fd-gap-md">
        @if (authMode === 'login') {
            @if (showPasswordReset()) {
                <fd-auth-password-reset-form
                    [form]="passwordResetForm"
                    [errors]="passwordResetFieldErrors()"
                    [globalError]="globalError()"
                    [isPasswordResetting]="isPasswordResetting()"
                    [passwordResetSent]="passwordResetSent()"
                    [passwordResetCooldownSeconds]="passwordResetCooldownSeconds()"
                    (passwordResetSubmit)="onPasswordResetSubmit()"
                    (passwordResetClose)="onPasswordResetClose()"
                />
            } @else {
                <fd-auth-login-form
                    [form]="loginForm"
                    [errors]="loginFieldErrors()"
                    [globalError]="globalError()"
                    [isSubmitting]="isSubmitting()"
                    [isRestoring]="isRestoring()"
                    [showRestoreAction]="showRestoreAction()"
                    [googleReady]="googleReady()"
                    [loginSubmitLabelKey]="loginSubmitLabelKey()"
                    [isSubmitDisabled]="isLoginSubmitDisabled()"
                    (loginSubmit)="onLoginSubmit()"
                    (loginNativeInput)="onLoginNativeInput()"
                    (passwordResetOpen)="onPasswordResetOpen()"
                    (restoreSubmit)="onRestoreSubmit()"
                />
            }
        } @else {
            <fd-auth-register-form
                [form]="registerForm"
                [errors]="registerFieldErrors()"
                [globalError]="globalError()"
                [isSubmitting]="isSubmitting()"
                [googleReady]="googleReady()"
                (registerSubmit)="onRegisterSubmit()"
            />
        }
    </div>
</div>
