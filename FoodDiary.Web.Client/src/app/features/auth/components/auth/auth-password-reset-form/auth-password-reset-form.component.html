<form
    class="auth__form fd-stack fd-gap-md"
    [formGroup]="form()"
    [attr.aria-busy]="isPasswordResetting()"
    (ngSubmit)="passwordResetSubmit.emit()"
>
    <div class="auth__field fd-stack fd-gap-xs">
        <fd-ui-input
            appearance="auth"
            formControlName="email"
            type="email"
            autocomplete="email"
            [label]="'AUTH.RESET.EMAIL' | translate"
            [placeholder]="'AUTH.RESET.EMAIL_PLACEHOLDER' | translate"
            [error]="errors().email"
        />
    </div>

    <div class="auth__actions fd-stack fd-gap-sm">
        <fd-ui-button
            type="submit"
            appearance="brand-action"
            size="lg"
            variant="primary"
            [disabled]="form().invalid || isPasswordResetting() || passwordResetCooldownSeconds() > 0"
            [loading]="isPasswordResetting()"
            [fullWidth]="true"
        >
            {{ 'AUTH.RESET.SEND' | translate }}
        </fd-ui-button>
        <fd-ui-form-error [error]="globalError()" />
        @if (passwordResetSent()) {
            <p class="auth__hint fd-ui-body-sm" role="status" aria-live="polite">{{ 'AUTH.RESET.SENT' | translate }}</p>
        }
        @if (passwordResetCooldownSeconds() > 0) {
            <p class="auth__hint fd-ui-body-sm" role="status" aria-live="polite">
                {{ 'AUTH.RESET.RESEND_COOLDOWN' | translate: { seconds: passwordResetCooldownSeconds() } }}
            </p>
        }
        <fd-ui-button type="button" size="lg" variant="secondary" fill="outline" [fullWidth]="true" (click)="passwordResetClose.emit()">
            {{ 'AUTH.RESET.BACK' | translate }}
        </fd-ui-button>
    </div>
</form>
