<fd-ui-dialog-shell class="auth-dialog__shell" size="md" [dismissible]="false">
    <button type="button" class="auth-dialog__close" [attr.aria-label]="'COMMON.CLOSE' | translate" (click)="close()">
        <fd-ui-icon name="close" />
    </button>
    <fd-auth
        class="auth-dialog__auth"
        [useRouting]="false"
        [initialMode]="data.mode"
        [initialReturnUrl]="data.returnUrl ?? null"
        [initialAdminReturnUrl]="data.adminReturnUrl ?? null"
    />
</fd-ui-dialog-shell>
