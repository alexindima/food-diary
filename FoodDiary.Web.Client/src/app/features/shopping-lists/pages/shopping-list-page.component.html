<div class="shopping-list" fdPageContainer>
    <fd-page-header
        class="shopping-list__header"
        [title]="'SHOPPING_LIST.TITLE' | translate"
        [subtitle]="'SHOPPING_LIST.SUBTITLE' | translate"
    >
        <ng-container fdPageHeaderActions>
            @if (isMobileView()) {
                <div class="shopping-list__mobile-toolbar">
                    <fd-ui-button
                        class="shopping-list__icon-button shopping-list__manage-button"
                        appearance="toolbar"
                        variant="secondary"
                        fill="outline"
                        icon="tune"
                        [fdUiHint]="'SHOPPING_LIST.LISTS_LABEL' | translate"
                        [ariaLabel]="'SHOPPING_LIST.LISTS_LABEL' | translate"
                        (click)="toggleMobileManage()"
                    />
                    <fd-ui-button
                        class="shopping-list__icon-button shopping-list__icon-button--primary"
                        appearance="toolbar"
                        variant="primary"
                        fill="solid"
                        icon="add"
                        [fdUiHint]="'SHOPPING_LIST.NEW_LIST_BUTTON' | translate"
                        [ariaLabel]="'SHOPPING_LIST.NEW_LIST_BUTTON' | translate"
                        [disabled]="isLoading()"
                        (click)="createNewList()"
                    />
                </div>
            } @else {
                <fd-shopping-list-manage-controls
                    [listSelectControl]="listSelectControl"
                    [listNameControl]="listNameControl"
                    [listOptions]="listOptions()"
                    [listsCount]="lists().length"
                    [isLoading]="isLoading()"
                    [canDeleteList]="canDeleteList()"
                    [canClearList]="canClearList()"
                    (createList)="createNewList()"
                    (deleteList)="deleteCurrentList()"
                    (clearList)="clearCurrentList()"
                />
            }
        </ng-container>

        @if (isMobileView()) {
            <div
                fdPageHeaderExtra
                class="shopping-list__mobile-manage"
                [class.shopping-list__mobile-manage--open]="isMobileManageVisible()"
            >
                <fd-shopping-list-manage-controls
                    [listSelectControl]="listSelectControl"
                    [listNameControl]="listNameControl"
                    [listOptions]="listOptions()"
                    [listsCount]="lists().length"
                    [isLoading]="isLoading()"
                    [canDeleteList]="canDeleteList()"
                    [canClearList]="canClearList()"
                    [isMobile]="true"
                    (deleteList)="deleteCurrentList()"
                    (clearList)="clearCurrentList()"
                />
            </div>
        }
    </fd-page-header>

    <fd-page-body>
        @if (isLoading()) {
            <fd-ui-loader class="shopping-list__loader" />
        } @else {
            <fd-shopping-list-items-panel
                [itemForm]="itemForm"
                [unitOptions]="unitOptions"
                [items]="itemViewModels()"
                (itemAdd)="addItem()"
                (itemRemove)="removeItem($event)"
                (itemCheckedChange)="toggleItemChecked($event.item, $event.checked)"
            />
        }
    </fd-page-body>
</div>
