<div class="weight-history-page fd-stack fd-gap-page-header" fdPageContainer>
    <fd-page-header
        class="weight-history-page__header"
        [title]="'WEIGHT_HISTORY.TITLE' | translate"
        [subtitle]="'WEIGHT_HISTORY.SUBTITLE' | translate"
    >
        <fd-ui-button
            data-tour-id="weight-history-tour-help"
            appearance="toolbar"
            variant="secondary"
            fill="outline"
            icon="help_outline"
            [fdUiHint]="'WEIGHT_HISTORY.TOUR.START_TOUR' | translate"
            [ariaLabel]="'WEIGHT_HISTORY.TOUR.START_TOUR' | translate"
            (click)="startWeightHistoryTour()"
        />
    </fd-page-header>

    <fd-page-body>
        <fd-period-filter
            class="weight-history-page__period"
            data-tour-id="weight-history-period"
            [tabs]="rangeTabs"
            [selectedValue]="selectedRange()"
            [rangeField]="customRangeForm.range"
            [displayRange]="currentRange()"
            [startLabel]="'WEIGHT_HISTORY.CUSTOM_RANGE_FROM_LABEL' | translate"
            [endLabel]="'WEIGHT_HISTORY.CUSTOM_RANGE_TO_LABEL' | translate"
            [startPlaceholder]="'WEIGHT_HISTORY.CUSTOM_RANGE_PLACEHOLDER' | translate"
            [endPlaceholder]="'WEIGHT_HISTORY.CUSTOM_RANGE_PLACEHOLDER' | translate"
            (rangeChange)="changeRange($event)"
        />

        <fd-weight-history-chart-card data-tour-id="weight-history-chart" [isLoading]="isSummaryLoading()" [chartPoints]="chartPoints()" />

        @defer (on viewport) {
            <fd-weight-history-bmi-card [viewModel]="bmiViewModel()" />
        } @placeholder {
            <div class="weight-history-page__placeholder" aria-hidden="true"></div>
        }

        <div class="weight-history-page__content weight-history-page__content--form fd-grid fd-gap-card-content">
            <fd-weight-history-form-card
                data-tour-id="weight-history-entry-form"
                [form]="form"
                [isSaving]="isSaving()"
                [isEditing]="isEditing()"
                [error]="entryError()"
                (editCancel)="cancelEdit()"
            />

            <fd-weight-history-goal-card
                data-tour-id="weight-history-goal"
                [weightField]="desiredWeightForm.weight"
                [isSaving]="isDesiredWeightSaving()"
                (saveGoal)="saveDesiredWeight()"
            />
        </div>

        @defer (on viewport) {
            <div class="weight-history-page__content weight-history-page__content--full fd-grid fd-gap-card-content">
                <fd-weight-history-entries-card
                    data-tour-id="weight-history-entries"
                    [isLoading]="isLoading()"
                    [entries]="entriesDescending()"
                    (editEntry)="startEdit($event)"
                    (removeEntry)="deleteEntry($event)"
                />
            </div>
        } @placeholder {
            <div class="weight-history-page__placeholder" aria-hidden="true"></div>
        }
    </fd-page-body>
</div>
