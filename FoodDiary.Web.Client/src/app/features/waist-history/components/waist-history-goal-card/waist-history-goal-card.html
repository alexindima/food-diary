<fd-ui-card class="waist-history-page__card waist-history-page__card--goal" [title]="'WAIST_HISTORY.GOAL_CARD_TITLE' | translate">
    <div class="waist-history-page__goal-body">
        <fd-ui-input
            class="waist-history-page__goal-input"
            type="number"
            [step]="0.1"
            [ariaLabel]="'WAIST_HISTORY.GOAL_CARD_TITLE' | translate"
            [placeholder]="'WAIST_HISTORY.GOAL_PLACEHOLDER' | translate"
            [suffixButtonIcon]="circumferenceField()().value() ? 'backspace' : undefined"
            [formField]="circumferenceField()"
            (suffixButtonClicked)="circumferenceField()().value.set('')"
        />
        <div class="waist-history-page__goal-actions">
            <fd-ui-button type="button" [disabled]="isSaving()" [loading]="isSaving()" (click)="saveGoal.emit()">
                {{ 'WAIST_HISTORY.SAVE_GOAL' | translate }}
            </fd-ui-button>
        </div>
    </div>
</fd-ui-card>
