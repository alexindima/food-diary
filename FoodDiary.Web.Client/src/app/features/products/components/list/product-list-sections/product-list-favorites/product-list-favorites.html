<fd-favorites-section
    class="product-list__favorites"
    [title]="'PRODUCT_LIST.FAVORITES_TITLE' | translate"
    [count]="count()"
    [isOpen]="isOpen()"
    [showLoadMore]="showLoadMore()"
    [isLoadingMore]="isLoadingMore()"
    [loadMoreLabel]="'PRODUCT_LIST.FAVORITES_LOAD_MORE' | translate"
    (toggleRequested)="favoritesToggle.emit()"
    (loadMore)="loadMore.emit()"
>
    <div class="product-list__favorites-grid fd-grid fd-gap-card-profile">
        @for (favorite of favorites(); track favorite.id) {
            <div class="product-list__favorite-card fd-stack">
                <fd-product-card
                    [product]="toProductCardItem(favorite)"
                    [imageUrl]="favorite.imageUrl"
                    [favoriteLoading]="favoriteLoadingIds().has(favorite.productId)"
                    [showOwnership]="false"
                    (open)="openProduct.emit(favorite)"
                    (addToMeal)="addToMeal.emit(favorite)"
                    (favoriteToggle)="favoriteRemove.emit(favorite)"
                />
                <div class="product-list__favorite-portion-row fd-row fd-justify-between fd-gap-xs">
                    <div class="product-list__favorite-portion-summary fd-stack fd-gap-micro">
                        <span class="product-list__favorite-portion-label fd-ui-caption">
                            {{ 'PRODUCT_LIST.FAVORITE_PORTION_AMOUNT' | translate }}
                        </span>
                    </div>
                    <div class="product-list__favorite-portion-actions fd-row fd-gap-xxs">
                        <div class="product-list__favorite-portion">
                            <label class="product-list__favorite-portion-input-label" [attr.for]="`favorite-portion-${favorite.id}`">
                                {{ 'PRODUCT_LIST.FAVORITE_PORTION_AMOUNT' | translate }}
                            </label>
                            <input
                                class="product-list__favorite-portion-input"
                                type="number"
                                min="0.001"
                                step="0.1"
                                [id]="`favorite-portion-${favorite.id}`"
                                [value]="portionDraftValue(favorite)"
                                [disabled]="portionSavingIds().has(favorite.id)"
                                [attr.aria-label]="'PRODUCT_LIST.FAVORITE_PORTION_AMOUNT' | translate"
                                (input)="onPortionInput(favorite, $event)"
                                (blur)="onPortionBlur(favorite)"
                                (keydown)="onPortionKeydown(favorite, $event)"
                            />
                            <span class="product-list__favorite-portion-unit fd-ui-caption">{{ favorite.baseUnit }}</span>
                        </div>
                        <fd-ui-button
                            class="product-list__favorite-btn"
                            variant="secondary"
                            fill="text"
                            icon="save"
                            [disabled]="portionSavingIds().has(favorite.id)"
                            [fdUiHint]="'PRODUCT_LIST.FAVORITE_SAVE_PORTION' | translate"
                            [ariaLabel]="'PRODUCT_LIST.FAVORITE_SAVE_PORTION' | translate"
                            (click)="onPortionSave(favorite)"
                        />
                    </div>
                </div>
            </div>
        }
    </div>
</fd-favorites-section>
