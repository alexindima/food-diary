<div class="product-list" fdPageContainer>
    <fd-page-header
        class="product-list__header"
        [title]="'PRODUCT_LIST.TITLE' | translate"
        [subtitle]="'PRODUCT_LIST.SUBTITLE' | translate"
        [compactActions]="true"
    >
        <ng-container fdPageHeaderActions>
            @if (isMobileView()) {
                <div class="product-list__mobile-toolbar">
                    <fd-ui-button
                        class="product-list__icon-button product-list__filter-button"
                        appearance="toolbar"
                        variant="secondary"
                        fill="outline"
                        icon="filter_alt"
                        [fdUiHint]="'PRODUCT_LIST.FILTERS_BUTTON' | translate"
                        [ariaLabel]="'PRODUCT_LIST.FILTERS_BUTTON' | translate"
                        [class.product-list__filter-button--active]="hasActiveFilters()"
                        (click)="openFilters()"
                    />
                    <fd-ui-button
                        class="product-list__icon-button"
                        appearance="toolbar"
                        variant="secondary"
                        fill="outline"
                        icon="search"
                        [fdUiHint]="'PRODUCT_LIST.SEARCH_LABEL' | translate"
                        [ariaLabel]="'PRODUCT_LIST.SEARCH_LABEL' | translate"
                        (click)="toggleMobileSearch()"
                    />
                    <fd-ui-button
                        class="product-list__icon-button product-list__icon-button--primary"
                        appearance="toolbar"
                        variant="primary"
                        fill="solid"
                        icon="add"
                        [fdUiHint]="'PRODUCT_LIST.ADD_PRODUCT_BUTTON' | translate"
                        [ariaLabel]="'PRODUCT_LIST.ADD_PRODUCT_BUTTON' | translate"
                        (click)="onAddProductClick()"
                    />
                </div>
            } @else {
                <div class="product-list__header-actions">
                    <fd-ui-button
                        class="product-list__icon-button product-list__filter-button"
                        appearance="toolbar"
                        variant="secondary"
                        fill="outline"
                        icon="filter_alt"
                        [fdUiHint]="'PRODUCT_LIST.FILTERS_BUTTON' | translate"
                        [ariaLabel]="'PRODUCT_LIST.FILTERS_BUTTON' | translate"
                        [class.product-list__filter-button--active]="hasActiveFilters()"
                        (click)="openFilters()"
                    />
                    <fd-ui-button
                        class="product-list__add-button"
                        appearance="brand-action"
                        variant="primary"
                        fill="solid"
                        icon="add"
                        [ariaLabel]="'PRODUCT_LIST.ADD_PRODUCT_BUTTON' | translate"
                        (click)="onAddProductClick()"
                    >
                        {{ 'PRODUCT_LIST.ADD_PRODUCT_BUTTON' | translate }}
                    </fd-ui-button>
                </div>
            }
        </ng-container>
        @if (!isMobileView()) {
            <div fdPageHeaderExtra class="product-list__desktop-search">
                <form class="product-list__search-form product-list__search-form--desktop" [formGroup]="searchForm">
                    <fd-ui-input
                        class="product-list__search-input"
                        formControlName="search"
                        size="md"
                        prefixIcon="search"
                        suffixButtonIcon="qr_code_scanner"
                        [label]="'PRODUCT_LIST.SEARCH_LABEL' | translate"
                        [placeholder]="'PRODUCT_LIST.SEARCH_PLACEHOLDER' | translate"
                        [suffixButtonAriaLabel]="'PRODUCT_LIST.SCAN_BARCODE' | translate"
                        (suffixButtonClicked)="openBarcodeScanner()"
                    />
                </form>
            </div>
        } @else {
            <div fdPageHeaderExtra class="product-list__mobile-search" [class.product-list__mobile-search--open]="isMobileSearchVisible()">
                <form class="product-list__search-form product-list__search-form--mobile" [formGroup]="searchForm">
                    <fd-ui-input
                        class="product-list__search-input"
                        formControlName="search"
                        size="md"
                        prefixIcon="search"
                        suffixButtonIcon="qr_code_scanner"
                        [label]="'PRODUCT_LIST.SEARCH_LABEL' | translate"
                        [placeholder]="'PRODUCT_LIST.SEARCH_PLACEHOLDER' | translate"
                        [suffixButtonAriaLabel]="'PRODUCT_LIST.SCAN_BARCODE' | translate"
                        (suffixButtonClicked)="openBarcodeScanner()"
                    />
                </form>
            </div>
        }
    </fd-page-header>

    <fd-page-body>
        @if (errorKey()) {
            <fd-error-state (retry)="retryLoad()" />
        } @else if (productData.isLoading()) {
            <div class="product-list__section-grid fd-grid fd-gap-card-profile">
                <fd-skeleton-card />
                <fd-skeleton-card />
                <fd-skeleton-card />
            </div>
        } @else {
            @if (favorites().length > 0) {
                <fd-product-list-favorites
                    [favorites]="favorites()"
                    [count]="favoriteTotalCount()"
                    [isOpen]="isFavoritesOpen()"
                    [showLoadMore]="hasMoreFavorites()"
                    [isLoadingMore]="isFavoritesLoadingMore()"
                    (favoritesToggle)="toggleFavorites()"
                    (loadMore)="loadFavorites()"
                    (openProduct)="openFavoriteProduct($event)"
                    (addToMeal)="addFavoriteProductToMeal($event)"
                    (favoriteRemove)="removeFavorite($event)"
                />
            }

            @if (hasVisibleProducts()) {
                <fd-product-list-groups
                    [showRecentSection]="showRecentSection()"
                    [recentItems]="recentProductItems()"
                    [allItems]="allProductItems()"
                    [allProductsSectionLabelKey]="allProductsSectionLabelKey()"
                    (openProduct)="onProductClick($event)"
                    (addToMeal)="onAddToMeal($event)"
                    (favoriteChanged)="onProductFavoriteChanged($event.product, $event.change)"
                />
            } @else if (isEmptyState()) {
                <fd-product-list-empty-state state="empty" (addProduct)="onAddProductClick()" />
            } @else {
                <fd-product-list-empty-state state="no-results" />
            }

            <fd-product-list-off-section [products]="offProducts()" [isLoading]="offLoading()" (productOpen)="onOffProductClick($event)" />
        }

        <fd-product-list-pagination
            [totalPages]="productData.totalPages"
            [length]="productData.totalItems"
            [pageSize]="pageSize"
            [pageIndex]="currentPageIndex"
            (pageChange)="onPageChange($event)"
        />
    </fd-page-body>
</div>
