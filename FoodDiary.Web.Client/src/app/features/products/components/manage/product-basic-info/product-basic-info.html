@let errors = fieldErrors();

<fd-ui-card
    class="product-manage__card product-manage__card--basic"
    appearance="entry"
    tone="editor-white"
    density="relaxed"
    headerAlign="center"
    accent="primary"
    data-tour-id="product-manage-basic"
    [title]="'PRODUCT_MANAGE.BASIC_INFO' | translate"
>
    <div class="product-manage__hero fd-grid fd-gap-lg">
        <div class="product-manage__image fd-row">
            <fd-image-upload-field
                appearance="compact"
                recommendedSize="512 x 512"
                [formField]="form().imageUrl"
                [description]="'PRODUCT_MANAGE.IMAGE_DESCRIPTION' | translate"
                [cropEnabled]="true"
                [cropSize]="512"
                [cropAspectRatio]="1"
            />
        </div>
        <div class="product-manage__hero-field fd-stack fd-gap-xs">
            <fd-ui-autocomplete
                size="lg"
                [formField]="form().name"
                [label]="'PRODUCT_MANAGE.NAME' | translate"
                [placeholder]="'PRODUCT_MANAGE.NAME_PLACEHOLDER' | translate"
                [error]="errors.name"
                [maximumLength]="nameMaxLength"
                [options]="nameOptions()"
                [loading]="isNameSearchLoading()"
                [emptyText]="'PRODUCT_MANAGE.NAME_NO_SUGGESTIONS' | translate"
                [showEmptyState]="false"
                [displayWith]="displayNameValue"
                (queryChange)="nameQueryChange.emit($event)"
                (optionSelected)="onNameOptionSelected($event)"
            />
        </div>
        <div class="product-manage__hero-field fd-stack fd-gap-xs">
            <fd-ui-input
                size="lg"
                [formField]="form().brand"
                [label]="'PRODUCT_MANAGE.BRAND' | translate"
                [placeholder]="'PRODUCT_MANAGE.BRAND_PLACEHOLDER' | translate"
                [error]="errors.brand"
                [maximumLength]="brandMaxLength"
            />
        </div>
        <div class="product-manage__hero-field fd-stack fd-gap-xs">
            <fd-ui-input
                size="lg"
                suffixButtonIcon="qr_code_scanner"
                [formField]="form().barcode"
                [label]="'PRODUCT_MANAGE.BARCODE' | translate"
                [placeholder]="'PRODUCT_MANAGE.BARCODE_PLACEHOLDER' | translate"
                [error]="errors.barcode"
                [maximumLength]="barcodeMaxLength"
                [suffixButtonAriaLabel]="'PRODUCT_MANAGE.SCAN_BARCODE' | translate"
                (suffixButtonClicked)="openBarcodeScanner.emit()"
            />
        </div>
    </div>
    <div class="product-manage__basic-grid fd-grid fd-gap-lg">
        <div class="product-manage__field product-manage__field--full fd-stack fd-gap-xs">
            <fd-ui-select
                size="lg"
                [formField]="form().productType"
                [label]="'PRODUCT_MANAGE.PRODUCT_TYPE' | translate"
                [placeholder]="'PRODUCT_MANAGE.PRODUCT_TYPE_PLACEHOLDER' | translate"
                [options]="productTypeOptions()"
                [error]="errors.productType"
            />
        </div>
        <div class="product-manage__field product-manage__field--full fd-stack fd-gap-xs">
            <fd-ui-textarea
                [formField]="form().description"
                [label]="'PRODUCT_MANAGE.DESCRIPTION' | translate"
                [placeholder]="'PRODUCT_MANAGE.DESCRIPTION_PLACEHOLDER' | translate"
                [error]="errors.description"
                [maximumLength]="descriptionMaxLength"
                [rows]="3"
            />
        </div>
        <div class="product-manage__serving-row product-manage__field--full fd-row fd-wrap fd-gap-lg">
            <div class="product-manage__serving-part fd-stack fd-gap-xs">
                <fd-ui-input
                    size="lg"
                    type="number"
                    [formField]="form().defaultPortionAmount"
                    [label]="'PRODUCT_MANAGE.DEFAULT_PORTION_AMOUNT' | translate"
                    [placeholder]="'PRODUCT_MANAGE.DEFAULT_PORTION_PLACEHOLDER' | translate"
                    [error]="errors.defaultPortionAmount"
                    [maximum]="maxAmount()"
                />
            </div>
            <div class="product-manage__serving-part fd-stack fd-gap-xs">
                <fd-ui-select
                    size="lg"
                    [formField]="form().baseUnit"
                    [label]="'PRODUCT_MANAGE.DEFAULT_SERVING_UNIT' | translate"
                    [options]="unitOptions()"
                    [error]="errors.baseUnit"
                />
            </div>
        </div>
    </div>
</fd-ui-card>

<fd-ui-card
    class="product-manage__card product-manage__card--basic product-manage__card--tracking"
    appearance="entry"
    tone="editor-white"
    density="relaxed"
    headerAlign="center"
    data-tour-id="product-manage-tracking"
    [title]="'PRODUCT_MANAGE.TRACKING_PREFERENCES' | translate"
>
    <div class="product-manage__basic-grid fd-grid fd-gap-lg">
        <div class="product-manage__field product-manage__field--full fd-stack fd-gap-xs">
            <fd-ui-select
                size="lg"
                [formField]="form().visibility"
                [label]="'PRODUCT_MANAGE.VISIBILITY' | translate"
                [options]="visibilityOptions()"
                [error]="errors.visibility"
            />
        </div>
        <div class="product-manage__field product-manage__field--full fd-stack fd-gap-xs">
            <fd-ui-textarea
                [formField]="form().comment"
                [label]="'PRODUCT_MANAGE.COMMENT' | translate"
                [placeholder]="'PRODUCT_MANAGE.COMMENT_PLACEHOLDER' | translate"
                [error]="errors.comment"
                [maximumLength]="commentMaxLength"
                [rows]="4"
            />
        </div>
    </div>
</fd-ui-card>
