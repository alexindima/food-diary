<section fdPageContainer class="premium-access-page fd-stack">
    <fd-page-header [title]="'PREMIUM_PAGE.TITLE' | translate" [subtitle]="'PREMIUM_PAGE.SUBTITLE' | translate">
        <fd-ui-button
            data-tour-id="premium-tour-help"
            appearance="toolbar"
            variant="secondary"
            fill="outline"
            icon="help_outline"
            [fdUiHint]="'PREMIUM_PAGE.TOUR.START_TOUR' | translate"
            [ariaLabel]="'PREMIUM_PAGE.TOUR.START_TOUR' | translate"
            (click)="startPremiumTour()"
        />
    </fd-page-header>

    <fd-page-body>
        <fd-premium-access-banners
            [checkoutReturnState]="checkoutReturnState()"
            [overviewCopyState]="overviewViewModel().copyState"
            [errorMessage]="errorMessage()"
            (retry)="reloadOverviewAsync()"
        />

        <fd-premium-overview-card
            data-tour-id="premium-overview"
            [viewModel]="overviewViewModel()"
            [portalLoading]="portalLoading()"
            [trialLoading]="trialLoading()"
            [isLoading]="isLoading()"
            [overview]="overview()"
            (manageBilling)="openPortalAsync()"
            (startTrial)="startTrialAsync()"
        />

        @if (showPlans()) {
            <fd-premium-plans-card data-tour-id="premium-plans" [cards]="planCards()" (checkout)="startCheckoutFromViewAsync($event)" />
        }

        <fd-premium-benefits-card data-tour-id="premium-benefits" />
    </fd-page-body>
</section>
