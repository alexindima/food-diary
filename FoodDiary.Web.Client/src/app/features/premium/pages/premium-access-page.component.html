<section fdPageContainer class="premium-access-page fd-stack">
    <fd-page-header [title]="'PREMIUM_PAGE.TITLE' | translate" [subtitle]="'PREMIUM_PAGE.SUBTITLE' | translate" />

    <fd-premium-access-banners
        [checkoutReturnState]="checkoutReturnState()"
        [overviewCopyState]="overviewCopyState()"
        [errorMessage]="errorMessage()"
        (retry)="reloadOverviewAsync()"
    />

    <fd-premium-overview-card
        [overviewCopyState]="overviewCopyState()"
        [showManageBilling]="showManageBilling()"
        [portalLoading]="portalLoading()"
        [isLoading]="isLoading()"
        [overview]="overview()"
        [overviewBadges]="overviewBadges()"
        [currentPeriodEndLabel]="currentPeriodEndLabel()"
        [overviewHintKey]="overviewHintKey()"
        (manageBilling)="openPortalAsync()"
    />

    @if (showPlans()) {
        <fd-premium-plans-card
            [cards]="planCards()"
            [showProviderChoices]="showProviderChoices()"
            [checkoutLoadingPlan]="checkoutLoadingPlan()"
            (checkout)="startCheckoutFromViewAsync($event)"
        />
    }

    <fd-premium-benefits-card />
</section>
