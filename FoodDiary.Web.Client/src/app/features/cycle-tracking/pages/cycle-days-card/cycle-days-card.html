<fd-ui-card class="cycle-tracking__card" [title]="'CYCLE_TRACKING.DAYS_TITLE' | translate">
    @if (isLoading()) {
        <div class="cycle-tracking__loader fd-ui-body-sm">{{ 'CYCLE_TRACKING.LOADING' | translate }}</div>
    } @else if (items().length === 0) {
        <p class="cycle-tracking__empty fd-ui-body-sm">{{ 'CYCLE_TRACKING.NO_DAYS' | translate }}</p>
    } @else {
        <div class="cycle-tracking__days fd-stack fd-gap-card-header">
            @for (item of items(); track item.date) {
                <fd-cycle-day-item [item]="item" />
            }
        </div>
    }
</fd-ui-card>
