<div class="cycle-tracking fd-stack fd-gap-page-header" fdPageContainer>
    <fd-page-header
        class="cycle-tracking__header"
        [title]="'CYCLE_TRACKING.TITLE' | translate"
        [subtitle]="'CYCLE_TRACKING.SUBTITLE' | translate"
    />

    <fd-page-body>
        <div class="cycle-tracking__grid fd-grid fd-gap-card-content">
            <fd-ui-card class="cycle-tracking__card" [title]="'CYCLE_TRACKING.CREATE_CYCLE_TITLE' | translate">
                <form class="cycle-tracking__form fd-stack fd-gap-card-header" [formGroup]="startCycleForm" (ngSubmit)="startCycle()">
                    <div class="cycle-tracking__form-row fd-grid fd-gap-card-header">
                        <fd-ui-date-input
                            class="cycle-tracking__form-control"
                            formControlName="startDate"
                            [label]="'CYCLE_TRACKING.START_DATE' | translate"
                        />
                        <fd-ui-input
                            class="cycle-tracking__form-control"
                            type="number"
                            formControlName="averageLength"
                            [label]="'CYCLE_TRACKING.AVG_LENGTH' | translate"
                        />
                        <fd-ui-input
                            class="cycle-tracking__form-control"
                            type="number"
                            formControlName="lutealLength"
                            [label]="'CYCLE_TRACKING.LUTEAL_LENGTH' | translate"
                        />
                    </div>
                    <div class="cycle-tracking__actions fd-ui-actions">
                        <fd-ui-button type="submit" [disabled]="isSavingCycle()" [loading]="isSavingCycle()">
                            {{ 'CYCLE_TRACKING.SAVE_CYCLE' | translate }}
                        </fd-ui-button>
                    </div>
                </form>
            </fd-ui-card>

            <fd-cycle-current-card
                [titleKey]="currentCycleTitle()"
                [isLoading]="isLoading()"
                [current]="currentCycleView()"
                [prediction]="predictionView()"
            />
        </div>

        <div class="cycle-tracking__grid cycle-tracking__grid--log fd-grid fd-gap-card-content">
            <fd-ui-card class="cycle-tracking__card" [title]="'CYCLE_TRACKING.LOG_DAY_TITLE' | translate">
                @if (!cycle()) {
                    <p class="cycle-tracking__empty fd-ui-body-sm">{{ 'CYCLE_TRACKING.NO_CYCLE_SHORT' | translate }}</p>
                } @else {
                    <form class="cycle-tracking__form fd-stack fd-gap-card-header" [formGroup]="dayForm" (ngSubmit)="saveDay()">
                        <div class="cycle-tracking__form-row cycle-tracking__form-row--wide fd-grid fd-gap-card-header fd-align-center">
                            <fd-ui-date-input
                                class="cycle-tracking__form-control"
                                formControlName="date"
                                [label]="'CYCLE_TRACKING.DAY_DATE' | translate"
                            />
                            <fd-ui-checkbox class="cycle-tracking__form-control cycle-tracking__checkbox" formControlName="isPeriod">
                                {{ 'CYCLE_TRACKING.IS_PERIOD' | translate }}
                            </fd-ui-checkbox>
                        </div>

                        <div class="cycle-tracking__symptom-grid fd-grid fd-gap-card-header">
                            @for (field of symptomFields; track field.key) {
                                <fd-ui-input
                                    class="cycle-tracking__form-control"
                                    type="number"
                                    [step]="1"
                                    [label]="field.labelKey | translate"
                                    [formControlName]="field.key"
                                />
                            }
                        </div>

                        <fd-ui-input
                            class="cycle-tracking__form-control"
                            formControlName="notes"
                            [label]="'CYCLE_TRACKING.NOTES' | translate"
                            [placeholder]="'CYCLE_TRACKING.NOTES_PLACEHOLDER' | translate"
                        />

                        <div class="cycle-tracking__actions fd-ui-actions">
                            <fd-ui-button type="submit" [disabled]="isSavingDay()" [loading]="isSavingDay()">
                                {{ 'CYCLE_TRACKING.SAVE_DAY' | translate }}
                            </fd-ui-button>
                        </div>
                    </form>
                }
            </fd-ui-card>

            <fd-cycle-days-card [isLoading]="isLoading()" [items]="dayItems()" />
        </div>
    </fd-page-body>
</div>
