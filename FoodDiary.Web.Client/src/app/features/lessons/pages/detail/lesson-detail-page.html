<div class="lesson-detail" fdPageContainer>
    <fd-page-header
        [title]="'LESSONS.TITLE' | translate"
        [backVisible]="true"
        [backAriaLabel]="'LESSONS.BACK' | translate"
        (back)="goBack()"
    />

    <fd-page-body>
        <fd-lesson-detail-content [isLoading]="facade.isDetailLoading()" [lesson]="lesson()" (markRead)="markRead()" />
    </fd-page-body>
</div>
