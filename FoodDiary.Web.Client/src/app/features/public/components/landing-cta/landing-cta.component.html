<section class="landing-section landing-section--cta">
    <div class="landing-section__inner landing-section__inner--cta fd-row fd-justify-between fd-gap-md">
        <div>
            <h2 class="landing-section__title">{{ 'LANDING_CTA.TITLE' | translate }}</h2>
            <p class="landing-section__subtitle">{{ 'LANDING_CTA.SUBTITLE' | translate }}</p>
        </div>
        <div class="landing-section__actions fd-row fd-wrap fd-gap-sm">
            <fd-ui-button size="lg" variant="primary" (click)="openAuthAsync('register')">{{
                'LANDING_CTA.REGISTER' | translate
            }}</fd-ui-button>
            <fd-ui-button size="lg" variant="secondary" fill="outline" (click)="openAuthAsync('login')">{{
                'LANDING_CTA.LOGIN' | translate
            }}</fd-ui-button>
        </div>
    </div>
</section>
