<fd-ui-card class="user-manage__card user-manage__card--dietologist fd-stack fd-gap-card-profile" tone="profile" density="profile">
    <div class="user-manage__card-header fd-row fd-gap-sm">
        <div class="user-manage__card-icon user-manage__card-icon--dietologist"></div>
        <div class="user-manage__card-text fd-stack fd-gap-xxs">
            <div class="user-manage__card-title">{{ 'USER_MANAGE.DIETOLOGIST_SECTION' | translate }}</div>
            <div class="user-manage__card-subtitle">{{ 'USER_MANAGE.DIETOLOGIST_DESC' | translate }}</div>
        </div>
    </div>

    <div class="user-manage__dietologist fd-stack fd-gap-md" [formGroup]="dietologistForm()">
        @if (isLoadingDietologist()) {
            <div class="user-manage__dietologist-empty fd-ui-surface fd-ui-surface--dashed">
                {{ 'USER_MANAGE.DIETOLOGIST_LOADING' | translate }}
            </div>
        } @else {
            <fd-user-manage-dietologist-summary
                [dietologistForm]="dietologistForm()"
                [dietologistRelationship]="dietologistRelationship()"
                [dietologistInviteEmailError]="dietologistInviteEmailError()"
                [isSavingDietologist]="isSavingDietologist()"
                (dietologistInvite)="dietologistInvite.emit()"
                (dietologistRevoke)="dietologistRevoke.emit()"
            />

            <fd-user-manage-dietologist-permissions
                [permissions]="dietologistPermissions()"
                [isSavingDietologist]="isSavingDietologist()"
                (permissionChange)="handleDietologistPermissionChange($event)"
            />

            <fd-ui-form-error class="user-manage__error user-manage__error--dietologist" [error]="dietologistError()" />
        }
    </div>
</fd-ui-card>
