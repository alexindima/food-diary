<fd-ui-card class="user-manage__card user-manage__card--body fd-stack fd-gap-card-profile" tone="profile" density="profile">
    <div class="user-manage__card-header fd-row fd-gap-sm">
        <div class="user-manage__card-icon user-manage__card-icon--body"></div>
        <div class="user-manage__card-text fd-stack fd-gap-xxs">
            <div class="user-manage__card-title">{{ 'USER_MANAGE.BODY_SECTION' | translate }}</div>
        </div>
    </div>
    <div class="user-manage__body fd-grid fd-gap-lg fd-align-start">
        <fd-ui-input
            type="number"
            size="lg"
            [formField]="userForm().height"
            [label]="'USER_MANAGE.HEIGHT' | translate"
            [placeholder]="'USER_MANAGE.HEIGHT_PLACEHOLDER' | translate"
        />
        <fd-ui-select
            size="lg"
            [formField]="userForm().activityLevel"
            [label]="'USER_MANAGE.ACTIVITY_LEVEL' | translate"
            [placeholder]="'USER_MANAGE.SELECT_ACTIVITY_LEVEL' | translate"
            [options]="activityLevelOptions()"
        />
    </div>
</fd-ui-card>
