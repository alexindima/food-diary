<div class="user-manage fd-stack fd-gap-md" fdPageContainer>
    <fd-page-header
        class="user-manage__header"
        [title]="'USER_MANAGE.EDIT_TITLE' | translate"
        [subtitle]="'USER_MANAGE.EDIT_SUBTITLE' | translate"
    />

    <fd-page-body>
        <form
            #userFormElement
            class="user-manage__form fd-stack fd-gap-card-profile"
            [formRoot]="userForm"
            [attr.aria-busy]="isSurfaceBusy()"
        >
            <div class="user-manage__stack fd-stack fd-gap-card-profile">
                <fd-user-manage-account-card
                    [userForm]="userForm"
                    [profileStatus]="profileStatus()"
                    [passwordActionState]="passwordActionState()"
                    [genderOptions]="genderOptions"
                    [languageOptions]="languageOptions"
                    [themeOptions]="themeOptions"
                    [uiStyleOptions]="uiStyleOptions"
                    (passwordChange)="openChangePasswordDialog()"
                    (userFormPatch)="onUserFormPatch($event)"
                />

                <fd-user-manage-billing-card
                    [isLoadingBilling]="isLoadingBilling()"
                    [billingError]="billingError()"
                    [billingView]="billingView()"
                    [isOpeningBillingPortal]="isOpeningBillingPortal()"
                    (billingReload)="reloadBillingOverview()"
                    (billingPortalOpen)="openBillingPortal()"
                    (premiumPageOpen)="openPremiumPage()"
                />

                <fd-user-manage-body-card
                    [userForm]="userForm"
                    [activityLevelOptions]="activityLevelOptions"
                    (userFormPatch)="onUserFormPatch($event)"
                />

                <fd-user-manage-notifications-card
                    [pushNotificationsEnabled]="notifications.pushNotificationsEnabled()"
                    [isUpdatingNotifications]="notifications.isUpdatingNotifications()"
                    [pushNotificationsBusy]="notifications.pushNotificationsBusy()"
                    [pushNotificationsSubscribed]="notifications.pushNotificationsSubscribed()"
                    [pushNotificationsSupported]="notifications.pushNotificationsSupported()"
                    [notificationPermission]="notifications.notificationPermission()"
                    [fastingPushNotificationsEnabled]="notifications.fastingPushNotificationsEnabled()"
                    [socialPushNotificationsEnabled]="notifications.socialPushNotificationsEnabled()"
                    [fastingReminderPresets]="notifications.fastingReminderPresets"
                    [fastingCheckInReminderHours]="notifications.fastingCheckInReminderHours()"
                    [fastingCheckInFollowUpReminderHours]="notifications.fastingCheckInFollowUpReminderHours()"
                    [isSchedulingTestNotification]="notifications.isSchedulingTestNotification()"
                    [isLoadingConnectedDevices]="notifications.isLoadingConnectedDevices()"
                    [connectedDeviceItems]="notifications.connectedDeviceItems()"
                    [removingConnectedDeviceEndpoint]="notifications.removingConnectedDeviceEndpoint()"
                    (pushNotificationsToggle)="notifications.togglePushNotificationsAsync()"
                    (fastingPushNotificationsToggle)="notifications.toggleFastingPushNotificationsAsync()"
                    (socialPushNotificationsToggle)="notifications.toggleSocialPushNotificationsAsync()"
                    (fastingReminderPresetApply)="notifications.applyFastingReminderPreset($event)"
                    (fastingReminderHoursChange)="notifications.onFastingReminderHoursChange($event.value, $event.field)"
                    (fastingReminderHoursSave)="notifications.saveFastingReminderHoursAsync()"
                    (testNotificationSchedule)="notifications.scheduleTestNotification()"
                    (connectedDeviceRemove)="notifications.removeConnectedDeviceAsync($event)"
                />

                <fd-user-manage-dietologist-card
                    [dietologistForm]="dietologistForm"
                    [dietologistRelationship]="dietologistRelationship()"
                    [dietologistPermissions]="dietologistPermissions()"
                    [dietologistError]="dietologistError()"
                    [dietologistInviteEmailError]="dietologistInviteEmailError()"
                    [isLoadingDietologist]="isLoadingDietologist()"
                    [isSavingDietologist]="isSavingDietologist()"
                    (dietologistInvite)="inviteDietologist()"
                    (dietologistRevoke)="revokeDietologistRelationship()"
                    (dietologistProfileToggle)="onDietologistProfileToggle($event)"
                    (dietologistPermissionChange)="onDietologistPermissionChangeRequest($event)"
                />
            </div>

            <fd-user-manage-privacy-card
                [hasAiConsent]="hasAiConsent()"
                [isRevokingAiConsent]="isRevokingAiConsent()"
                [isDeleting]="isDeleting()"
                [isAccountActionBusy]="isSurfaceBusy()"
                (aiConsentRevoke)="onRevokeAiConsent()"
                (accountDelete)="onDeleteAccount()"
            />

            <fd-ui-form-error class="user-manage__error" [error]="globalError()" />
        </form>
    </fd-page-body>
</div>
