@if (shouldRender()) {
    <div
        fdDashboardBlockHost
        class="dashboard__block"
        data-tour-id="dashboard-hydration"
        [state]="state()"
        (blockActivated)="blockToggle.emit()"
    >
        @defer (on viewport) {
            <fd-dashboard-card-shell fdDashboardBlockContent [state]="state()">
                <fd-hydration-card
                    class="dashboard__card dashboard__card--hydration"
                    [total]="cardState().total"
                    [goal]="cardState().goal"
                    [isLoading]="isLoading()"
                    [canAdd]="canAdd()"
                    (addClick)="addClick.emit($event)"
                    (goalAction)="goalAction.emit()"
                />
            </fd-dashboard-card-shell>
        } @placeholder {
            <fd-ui-loader />
        } @loading (minimum 300ms) {
            <fd-ui-loader />
        }
    </div>
}
