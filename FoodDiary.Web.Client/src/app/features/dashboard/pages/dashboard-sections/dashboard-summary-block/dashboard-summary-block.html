@if (shouldRender()) {
    <div fdDashboardBlockHost class="dashboard__block dashboard__block--locked" [state]="state()" (blockActivated)="blockToggle.emit()">
        @if (isEditingLayout()) {
            <div class="dashboard__block-label dashboard__block-label--locked fd-ui-pill fd-ui-pill--compact fd-ui-overline">
                {{ 'DASHBOARD.SETTINGS.LOCKED' | translate }}
            </div>
        }
        <fd-dashboard-card-shell fdDashboardBlockContent [state]="state()">
            <fd-dashboard-summary-card
                class="dashboard__card dashboard__card--ring"
                [dailyGoal]="data().dailyGoal"
                [dailyConsumed]="data().dailyConsumed"
                [weeklyConsumed]="data().weeklyConsumed"
                [weeklyGoal]="data().weeklyGoal"
                [nutrientBars]="data().nutrientBars"
                [caloriesBurned]="caloriesBurned()"
                (goalAction)="goalAction.emit()"
            />
        </fd-dashboard-card-shell>
    </div>
}
