@if (shouldRender()) {
<div fdDashboardBlockHost class="dashboard__block" [state]="state()" (blockActivated)="blockToggle.emit()">
    @defer (on viewport) {
    <fd-dashboard-card-shell fdDashboardBlockContent [state]="state()">
        <fd-cycle-summary-card
            class="dashboard__card dashboard__card--cycle"
            [startDate]="cardState().startDate"
            [predictions]="cardState().predictions"
            [referenceDate]="referenceDate()"
            [isLoading]="isLoading()"
            (setupAction)="setupAction.emit()"
        />
    </fd-dashboard-card-shell>
    } @placeholder {
    <fd-ui-loader />
    } @loading (minimum 300ms) {
    <fd-ui-loader />
    }
</div>
}
