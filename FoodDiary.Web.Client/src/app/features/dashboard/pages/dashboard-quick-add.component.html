<section class="dashboard__quick-add fd-stack fd-gap-card-profile" aria-label="Quick meal add">
    @defer (on idle) {
        <fd-ai-input-bar mode="create" (mealCreateRequested)="mealCreateRequested.emit($event)" />
    } @placeholder {
        <div class="dashboard__quick-add-placeholder" aria-hidden="true"></div>
    }
    <div class="dashboard__manual-add fd-row fd-wrap fd-gap-xs">
        <span class="dashboard__manual-add-label fd-ui-action-text">{{ 'CONSUMPTION_LIST.MANUAL_ADD_OR' | translate }}</span>
        <fd-ui-button
            type="button"
            class="dashboard__manual-add-button fd-ui-action-text"
            variant="secondary"
            fill="text"
            icon="add"
            (click)="manualAdd.emit()"
        >
            {{ 'CONSUMPTION_LIST.ADD_MANUALLY_BUTTON' | translate }}
        </fd-ui-button>
    </div>
</section>
