@if (shouldRender()) {
    <div
        class="dashboard__block"
        [class.dashboard__block--hidden]="state().hidden"
        [attr.role]="state().role"
        [attr.tabindex]="state().tabIndex"
        [attr.aria-pressed]="state().ariaPressed"
        (click)="blockToggle.emit()"
        (keydown.enter)="blockToggle.emit()"
    >
        @defer (on viewport) {
            <fd-dashboard-card-shell [attr.inert]="state().inert">
                <fd-hydration-card
                    class="dashboard__card dashboard__card--hydration"
                    [total]="cardState().total"
                    [goal]="cardState().goal"
                    [isLoading]="isLoading()"
                    [canAdd]="canAdd()"
                    (addClick)="addClick.emit($event)"
                    (goalAction)="goalAction.emit()"
                />
            </fd-dashboard-card-shell>
        } @placeholder {
            <fd-ui-loader />
        } @loading (minimum 300ms) {
            <fd-ui-loader />
        }
    </div>
}
