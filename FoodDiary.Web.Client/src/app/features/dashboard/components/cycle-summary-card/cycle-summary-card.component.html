<div class="cycle-summary-card fd-stack fd-gap-sm" [class.cycle-summary-card--loading]="isLoading()">
    <fd-dashboard-widget-frame [title]="title() | translate" iconName="autorenew" iconTone="neutral">
        @if (hasCycle()) {
            <div class="cycle-summary-card__day fd-ui-metric-lg">
                {{ 'CYCLE_CARD.DAY_LABEL' | translate: { day: cycleDay() } }}
            </div>
            @if (statusKey()) {
                <div class="cycle-summary-card__status fd-ui-body-sm fd-ui-text-muted">
                    @if (statusDays() !== null) {
                        {{ statusKey() | translate: { days: statusDays() } }}
                    } @else {
                        {{ statusKey() | translate }}
                    }
                </div>
            }
        } @else {
            <fd-notice-banner
                type="info"
                [title]="'CYCLE_CARD.NO_DATA_TITLE' | translate"
                [message]="'CYCLE_CARD.NO_DATA_BODY' | translate"
                [actionLabel]="'CYCLE_CARD.NO_DATA_ACTION' | translate"
                (action)="onSetup()"
            />
        }
    </fd-dashboard-widget-frame>
</div>
