<div class="daily-advice-card fd-stack fd-gap-sm" [class.daily-advice-card--loading]="isLoading()">
    <fd-dashboard-widget-frame iconName="tips_and_updates" iconTone="info" [title]="'DASHBOARD.ADVICE_TITLE' | translate">
        <div class="daily-advice-card__body">
            @if (isLoading()) {
                <div class="daily-advice-card__loading fd-row fd-gap-xs fd-ui-action-text fd-ui-text-muted">
                    <fd-ui-icon name="hourglass_empty"></fd-ui-icon>
                    <span>{{ 'DASHBOARD.ADVICE_LOADING' | translate }}</span>
                </div>
            } @else if (adviceState(); as advice) {
                <div class="daily-advice-card__content fd-stack fd-gap-xs">
                    @if (advice.tagKey) {
                        <div class="daily-advice-card__chip fd-row fd-gap-xxs fd-ui-overline">
                            <fd-ui-icon name="tips_and_updates"></fd-ui-icon>
                            <span>{{ advice.tagKey | translate }}</span>
                        </div>
                    }
                    <p class="daily-advice-card__text fd-ui-body">
                        {{ advice.value }}
                    </p>
                </div>
            } @else {
                <div class="daily-advice-card__empty fd-row fd-gap-xs fd-ui-action-text fd-ui-text-muted">
                    <fd-ui-icon name="lightbulb"></fd-ui-icon>
                    <span>{{ 'DASHBOARD.ADVICE_EMPTY' | translate }}</span>
                </div>
            }
        </div>
    </fd-dashboard-widget-frame>
</div>
