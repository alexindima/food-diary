@if (loading()) {
    <p class="fd-ui-body-sm">Loading...</p>
} @else if (items().length === 0) {
    <p class="dietologist-clients__empty fd-ui-body-sm">No clients yet. Clients can invite you by email.</p>
} @else {
    <div class="dietologist-clients__list fd-stack fd-gap-sm">
        @for (item of items(); track item.client.userId) {
            <fd-dietologist-client-card [item]="item" (clientOpen)="clientOpen.emit($event)" />
        }
    </div>
}
