<div class="meal-plans-list" fdPageContainer>
    <fd-page-header [title]="'MEAL_PLANS.TITLE' | translate" [subtitle]="'MEAL_PLANS.SUBTITLE' | translate" />

    <fd-page-body>
        <fd-meal-plan-list-filters [selectedType]="facade.dietTypeFilter()" (filterChange)="filterByDiet($event)" />
        <fd-meal-plan-list-content [isLoading]="facade.isLoading()" [plans]="planCards()" (planOpen)="openPlan($event)" />
    </fd-page-body>
</div>
