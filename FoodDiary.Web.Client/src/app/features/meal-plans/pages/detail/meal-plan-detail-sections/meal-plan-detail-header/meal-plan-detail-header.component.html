<header class="meal-plan-detail__header fd-stack fd-gap-xs">
    <div class="meal-plan-detail__badge fd-ui-pill fd-ui-pill--compact fd-ui-overline">
        {{ plan().dietTypeKey | translate }}
    </div>
    <h1 class="meal-plan-detail__title fd-ui-display-sm">{{ plan().name }}</h1>
    <p class="meal-plan-detail__desc fd-ui-body" [hidden]="!plan().description">{{ plan().description }}</p>
    <div class="meal-plan-detail__actions fd-row fd-wrap fd-gap-sm">
        @if (plan().isCurated) {
            <fd-ui-button icon="content_copy" (click)="adoptPlan.emit()">
                {{ 'MEAL_PLANS.ADOPT' | translate }}
            </fd-ui-button>
        }
        <fd-ui-button variant="secondary" icon="shopping_cart" (click)="generateShoppingList.emit()">
            {{ 'MEAL_PLANS.GENERATE_SHOPPING_LIST' | translate }}
        </fd-ui-button>
    </div>
</header>
