<div class="meal-plan-detail" fdPageContainer>
    <fd-page-header
        [title]="'MEAL_PLANS.TITLE' | translate"
        [backVisible]="true"
        [backAriaLabel]="'MEAL_PLANS.BACK' | translate"
        (back)="goBack()"
    />

    <fd-page-body>
        @if (facade.isDetailLoading()) {
            <fd-ui-loader />
        } @else if (selectedPlanView(); as plan) {
            <fd-meal-plan-detail-header [plan]="plan.header" (adoptPlan)="adopt()" (generateShoppingList)="generateShoppingList()" />

            <fd-meal-plan-detail-days [days]="plan.days" />
        }
    </fd-page-body>
</div>
