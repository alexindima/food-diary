<div #container class="recipe-list" fdPageContainer>
    <fd-page-header
        class="recipe-list__header"
        [title]="'RECIPE_LIST.TITLE' | translate"
        [subtitle]="'RECIPE_LIST.SUBTITLE' | translate"
        [compactActions]="true"
    >
        <ng-container fdPageHeaderActions>
            @if (isMobileView()) {
                <div class="recipe-list__mobile-toolbar">
                    <fd-ui-button
                        class="recipe-list__icon-button recipe-list__filter-button"
                        appearance="toolbar"
                        variant="secondary"
                        fill="outline"
                        icon="filter_alt"
                        [fdUiHint]="'RECIPE_LIST.FILTERS_BUTTON' | translate"
                        [ariaLabel]="'RECIPE_LIST.FILTERS_BUTTON' | translate"
                        [class.recipe-list__filter-button--active]="hasActiveFilters()"
                        (click)="openFilters()"
                    />
                    <fd-ui-button
                        class="recipe-list__icon-button"
                        appearance="toolbar"
                        variant="secondary"
                        fill="outline"
                        icon="search"
                        [fdUiHint]="'RECIPE_LIST.SEARCH_LABEL' | translate"
                        [ariaLabel]="'RECIPE_LIST.SEARCH_LABEL' | translate"
                        (click)="toggleMobileSearch()"
                    />
                    <fd-ui-button
                        class="recipe-list__icon-button recipe-list__icon-button--primary"
                        appearance="toolbar"
                        variant="primary"
                        fill="solid"
                        icon="add"
                        [fdUiHint]="'RECIPE_LIST.ADD_RECIPE_BUTTON' | translate"
                        [ariaLabel]="'RECIPE_LIST.ADD_RECIPE_BUTTON' | translate"
                        (click)="onAddRecipeClickAsync()"
                    />
                </div>
            } @else {
                <div class="recipe-list__header-actions">
                    <fd-ui-button
                        class="recipe-list__icon-button recipe-list__filter-button"
                        appearance="toolbar"
                        variant="secondary"
                        fill="outline"
                        icon="filter_alt"
                        [fdUiHint]="'RECIPE_LIST.FILTERS_BUTTON' | translate"
                        [ariaLabel]="'RECIPE_LIST.FILTERS_BUTTON' | translate"
                        [class.recipe-list__filter-button--active]="hasActiveFilters()"
                        (click)="openFilters()"
                    />
                    <fd-ui-button
                        class="recipe-list__add-button"
                        appearance="brand-action"
                        variant="primary"
                        fill="solid"
                        icon="add"
                        [ariaLabel]="'RECIPE_LIST.ADD_RECIPE_BUTTON' | translate"
                        (click)="onAddRecipeClickAsync()"
                    >
                        {{ 'RECIPE_LIST.ADD_RECIPE_BUTTON' | translate }}
                    </fd-ui-button>
                </div>
            }
        </ng-container>
        @if (!isMobileView()) {
            <div fdPageHeaderExtra class="recipe-list__desktop-search">
                <form class="recipe-list__search-form recipe-list__search-form--desktop" [formGroup]="searchForm">
                    <fd-ui-input
                        class="recipe-list__search-input"
                        formControlName="search"
                        prefixIcon="search"
                        suffixButtonIcon="close"
                        [label]="'RECIPE_LIST.SEARCH_LABEL' | translate"
                        [suffixButtonAriaLabel]="'COMMON.CLEAR' | translate"
                        [placeholder]="'RECIPE_LIST.SEARCH_PLACEHOLDER' | translate"
                        (suffixButtonClicked)="clearSearch()"
                    />
                </form>
            </div>
        } @else {
            <div fdPageHeaderExtra class="recipe-list__mobile-search" [class.recipe-list__mobile-search--open]="isMobileSearchVisible()">
                <form class="recipe-list__search-form recipe-list__search-form--mobile" [formGroup]="searchForm">
                    <fd-ui-input
                        class="recipe-list__search-input"
                        formControlName="search"
                        prefixIcon="search"
                        suffixButtonIcon="close"
                        [label]="'RECIPE_LIST.SEARCH_LABEL' | translate"
                        [suffixButtonAriaLabel]="'COMMON.CLEAR' | translate"
                        [placeholder]="'RECIPE_LIST.SEARCH_PLACEHOLDER' | translate"
                        (suffixButtonClicked)="clearSearch()"
                    />
                </form>
            </div>
        }
    </fd-page-header>

    <fd-page-body>
        @if (errorKey()) {
            <fd-error-state (retry)="retryLoad()" />
        } @else if (recipeData.isLoading()) {
            <div class="recipe-list__section-grid fd-grid fd-gap-card-profile fd-align-start">
                <fd-skeleton-card />
                <fd-skeleton-card />
                <fd-skeleton-card />
            </div>
        } @else {
            <fd-recipe-list-favorites
                [favorites]="favorites()"
                [favoriteTotalCount]="favoriteTotalCount()"
                [isFavoritesOpen]="isFavoritesOpen()"
                [hasMoreFavorites]="hasMoreFavorites()"
                [isFavoritesLoadingMore]="isFavoritesLoadingMore()"
                (favoritesToggle)="toggleFavorites()"
                (favoritesLoadMore)="loadFavorites()"
                (favoriteOpen)="openFavoriteRecipe($event)"
                (favoriteAddToMeal)="addFavoriteRecipeToMeal($event)"
                (favoriteRemove)="removeFavorite($event)"
            />

            <fd-recipe-list-results
                [hasVisibleRecipes]="hasVisibleRecipes()"
                [showRecentSection]="showRecentSection()"
                [recentRecipeItems]="recentRecipeItems()"
                [allRecipeItems]="allRecipeItems()"
                [allRecipesSectionLabelKey]="allRecipesSectionLabelKey()"
                [isEmptyState]="isEmptyState()"
                [favoriteLoadingIds]="favoriteLoadingIds()"
                (recipeOpen)="onRecipeClick($event)"
                (recipeAddToMeal)="onAddToMeal($event)"
                (recipeFavoriteToggle)="onRecipeFavoriteToggle($event)"
                (recipeAdd)="onAddRecipeClickAsync()"
            />
        }

        @if (recipeData.totalPages > 1) {
            <fd-ui-pagination
                class="recipe-list__pagination"
                [length]="recipeData.totalItems"
                [pageSize]="pageSize"
                [pageIndex]="pageIndex()"
                (pageIndexChange)="onPageChange($event)"
            />
        }
    </fd-page-body>
</div>
