@if (isLoading()) {
    <fd-ui-loader class="recipe-select__loader" />
} @else {
    @if (items().length > 0) {
        <div class="recipe-select__list fd-stack fd-gap-sm">
            @for (item of items(); track item.recipe.id) {
                <button
                    type="button"
                    class="recipe-select__item fd-grid fd-gap-sm fd-align-center"
                    (click)="recipeSelected.emit(item.recipe)"
                >
                    <div class="recipe-select__thumb fd-place-center">
                        @if (item.imageUrl) {
                            <img width="64" height="64" [ngSrc]="item.imageUrl" [alt]="item.recipe.name" />
                        } @else {
                            <fd-ui-icon name="restaurant" />
                        }
                    </div>
                    <div class="recipe-select__info fd-min-w-0">
                        <div class="recipe-select__name fd-ui-action-text fd-truncate">{{ item.recipe.name }}</div>
                        <div class="recipe-select__meta fd-ui-caption fd-truncate">
                            @if (item.recipe.category) {
                                {{ item.recipe.category }} ·
                            }
                            {{ item.recipe.totalCalories ?? 0 }} {{ 'SHARED.NUTRIENTS_SUMMARY.KKAL' | translate }} ·
                            {{ item.recipe.servings }} {{ 'RECIPE_SELECT_DIALOG.SERVINGS' | translate }}
                        </div>
                    </div>
                    <span class="recipe-select__action fd-inline-center">
                        <fd-ui-button
                            icon="add"
                            variant="primary"
                            fill="solid"
                            size="sm"
                            [ariaLabel]="'COMMON.ADD' | translate"
                            [fdUiHint]="'COMMON.ADD' | translate"
                        />
                    </span>
                </button>
            }
        </div>
    } @else {
        <div class="recipe-select__no-results fd-grid fd-gap-xs">
            <fd-ui-icon class="recipe-select__no-results-icon" name="search_off" size="lg" />
            {{ 'RECIPE_SELECT_DIALOG.NO_RECIPES_FOUND' | translate }}
        </div>
    }
}
