<div #container class="recipe-select fd-stack fd-gap-md">
    @if (!embedded()) {
        <div class="recipe-select__header fd-row fd-justify-between">
            <div>
                <h2 class="recipe-select__title fd-ui-section-title">{{ 'RECIPE_SELECT_DIALOG.TITLE' | translate }}</h2>
            </div>
        </div>
    }

    <div class="recipe-select__controls fd-grid fd-gap-sm fd-align-center">
        <form class="recipe-select__search-form" [formGroup]="searchForm">
            <fd-ui-input
                class="recipe-select__search-input"
                appearance="search"
                formControlName="search"
                prefixIcon="search"
                [label]="'RECIPE_SELECT_DIALOG.SEARCH_PLACEHOLDER' | translate"
                [suffixButtonIcon]="searchSuffixIcon()"
                [suffixButtonAriaLabel]="'RECIPE_SELECT_DIALOG.SEARCH_CLEAR' | translate"
                (suffixButtonClicked)="clearSearch()"
            />
        </form>
        <fd-ui-button
            class="recipe-select__filter-button"
            appearance="chip"
            variant="secondary"
            fill="outline"
            [icon]="filterIcon()"
            [fdUiHint]="'RECIPE_SELECT_DIALOG.ONLY_MY_RECIPES' | translate"
            [ariaLabel]="'RECIPE_SELECT_DIALOG.ONLY_MY_RECIPES' | translate"
            [class.recipe-select__filter-button--active]="onlyMineFilter()"
            (click)="toggleOnlyMine()"
        />
    </div>

    <fd-recipe-select-dialog-content
        [isLoading]="recipeData.isLoading()"
        [items]="recipeItems()"
        (recipeSelected)="onRecipeClick($event)"
    />

    @if (recipeData.totalPages > 1) {
        <fd-ui-pagination
            class="recipe-select__pagination"
            [length]="recipeData.totalItems"
            [pageSize]="10"
            [pageIndex]="currentPageIndex"
            (pageIndexChange)="onPageChange($event)"
        />
    }

    @if (!embedded()) {
        <div class="recipe-select__footer fd-row fd-justify-end">
            <fd-ui-button variant="primary" fill="solid" icon="add" (click)="onCreateRecipeClick()">
                {{ 'RECIPE_SELECT_DIALOG.ADD_RECIPE_BUTTON' | translate }}
            </fd-ui-button>
        </div>
    }
</div>
