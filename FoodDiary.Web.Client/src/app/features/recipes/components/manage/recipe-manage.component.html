<div class="recipe-manage fd-stack" fdPageContainer>
    <fd-manage-header
        class="recipe-manage__header"
        [title]="recipe() ? ('RECIPE_MANAGE.EDIT_TITLE' | translate) : ('RECIPE_MANAGE.ADD_TITLE' | translate)"
        [subtitle]="'RECIPE_MANAGE.SUBTITLE' | translate"
        [backAriaLabel]="'PRODUCT_MANAGE.CANCEL_BUTTON' | translate"
        (back)="onCancelAsync()"
    />

    <form class="recipe-manage__form fd-stack fd-gap-lg" [formGroup]="recipeForm" (ngSubmit)="onSubmit()" [attr.aria-busy]="isSubmitting()">
        @if (globalError()) {
            <div class="recipe-manage__error fd-ui-notice-surface fd-ui-notice-surface--danger fd-ui-body-sm" role="alert">
                {{ globalError() }}
            </div>
        }

        <div class="recipe-manage__grid fd-grid fd-gap-lg">
            <div class="recipe-manage__column recipe-manage__column--primary fd-stack">
                <fd-recipe-basic-info [formGroup]="recipeForm" [visibilitySelectOptions]="visibilitySelectOptions" />

                <fd-recipe-steps-list
                    [stepsFormArray]="steps"
                    [expandedSteps]="expandedStepsSet"
                    (addStep)="addStep()"
                    (removeStep)="removeStep($event)"
                    (addIngredient)="addIngredientToStep($event)"
                    (removeIngredient)="removeIngredientFromStep($event)"
                    (selectProduct)="onProductSelectClick($event)"
                />
            </div>

            <div class="recipe-manage__column recipe-manage__column--secondary fd-stack">
                <div class="recipe-manage__sticky-stack fd-stack fd-gap-lg">
                    <fd-ui-card
                        class="recipe-manage__card recipe-manage__card--facts"
                        appearance="entry"
                        tone="editor-gradient"
                        density="relaxed"
                        headerAlign="center"
                        [title]="'RECIPE_MANAGE.NUTRITION_GROUP_TITLE' | translate"
                    >
                        <div class="recipe-manage__nutrition fd-stack fd-gap-md">
                            <fd-nutrition-editor
                                [formGroup]="recipeForm"
                                [controlNames]="nutritionControlNames"
                                [macroState]="macroBarState()"
                                [readonly]="isNutritionReadonly()"
                                [caloriesError]="caloriesError()"
                                [macrosError]="macrosError()"
                                [showManualHint]="showManualNutritionHint()"
                                [manualHintKey]="'RECIPE_MANAGE.MANUAL_NUTRITION_HINT'"
                                [warning]="nutritionWarning()"
                            >
                                <fd-ui-segmented-toggle
                                    nutrition-before
                                    class="recipe-manage__nutrition-toggle"
                                    appearance="soft"
                                    [fullWidth]="true"
                                    [options]="nutritionModeOptions"
                                    [selectedValue]="nutritionMode()"
                                    (selectedValueChange)="onNutritionModeChange($event)"
                                    [fdUiHint]="'RECIPE_MANAGE.NUTRITION_MODE.ARIA' | translate"
                                    [ariaLabel]="'RECIPE_MANAGE.NUTRITION_MODE.ARIA' | translate"
                                />
                                <fd-ui-segmented-toggle
                                    nutrition-before
                                    class="recipe-manage__nutrition-toggle"
                                    appearance="soft"
                                    [fullWidth]="true"
                                    [options]="nutritionScaleModeOptions"
                                    [selectedValue]="nutritionScaleMode"
                                    (selectedValueChange)="onNutritionScaleModeChange($event)"
                                    [fdUiHint]="'RECIPE_MANAGE.NUTRITION_SCALE_MODE.ARIA' | translate"
                                    [ariaLabel]="'RECIPE_MANAGE.NUTRITION_SCALE_MODE.ARIA' | translate"
                                />
                            </fd-nutrition-editor>
                        </div>
                    </fd-ui-card>

                    <div class="recipe-manage__actions-panel">
                        <div class="recipe-manage__footer-actions fd-ui-actions fd-ui-actions--split">
                            <fd-ui-button
                                type="button"
                                class="recipe-manage__cancel-button"
                                variant="secondary"
                                fill="outline"
                                icon="arrow_back"
                                (click)="onCancelAsync()"
                            >
                                {{ 'PRODUCT_MANAGE.CANCEL_BUTTON' | translate }}
                            </fd-ui-button>
                            <fd-ui-button
                                type="submit"
                                class="recipe-manage__action-button"
                                appearance="brand-action"
                                icon="save"
                                [fullWidth]="true"
                                [disabled]="recipeForm.invalid || isSubmitting()"
                                [loading]="isSubmitting()"
                            >
                                {{ recipe() ? ('RECIPE_MANAGE.SAVE_BUTTON' | translate) : ('RECIPE_MANAGE.ADD_BUTTON' | translate) }}
                            </fd-ui-button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>
