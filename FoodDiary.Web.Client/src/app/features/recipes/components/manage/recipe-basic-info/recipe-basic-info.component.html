<ng-container [formGroup]="formGroup()">
    @let errors = fieldErrors();
    <fd-ui-card
        class="recipe-basic-info__card recipe-basic-info__card--basic"
        appearance="entry"
        tone="editor-gradient"
        density="relaxed"
        headerAlign="center"
        accent="primary"
        [title]="'RECIPE_MANAGE.GENERAL_GROUP_TITLE' | translate"
    >
        <div class="recipe-basic-info__hero fd-grid fd-gap-lg">
            <div class="recipe-basic-info__image">
                <fd-image-upload-field
                    appearance="compact"
                    formControlName="imageUrl"
                    [description]="'RECIPE_MANAGE.IMAGE_HINT' | translate"
                    [recommendedSize]="'512 x 512'"
                    [maxSizeMb]="10"
                    [acceptedTypes]="'image/png,image/jpeg,image/webp'"
                    [cropEnabled]="true"
                    [cropSize]="512"
                    [cropAspectRatio]="1"
                />
            </div>
            <div class="recipe-basic-info__hero-field fd-stack fd-gap-xs">
                <fd-ui-input
                    formControlName="name"
                    size="lg"
                    [label]="'RECIPE_MANAGE.NAME' | translate"
                    [placeholder]="'RECIPE_MANAGE.NAME_PLACEHOLDER' | translate"
                    [required]="true"
                    [error]="errors.name"
                />
            </div>
            <div class="recipe-basic-info__hero-field fd-stack fd-gap-xs">
                <fd-ui-input
                    formControlName="category"
                    size="lg"
                    [label]="'RECIPE_MANAGE.CATEGORY' | translate"
                    [placeholder]="'RECIPE_MANAGE.CATEGORY_PLACEHOLDER' | translate"
                />
            </div>
            <div class="recipe-basic-info__hero-field fd-stack fd-gap-xs">
                <fd-ui-input
                    formControlName="cookTime"
                    type="number"
                    size="lg"
                    [step]="1"
                    [label]="'RECIPE_MANAGE.COOK_TIME' | translate"
                    [required]="true"
                    [error]="errors.cookTime"
                />
            </div>
        </div>

        <div class="recipe-basic-info__basic-grid fd-grid fd-gap-lg">
            <fd-ui-input
                formControlName="prepTime"
                size="lg"
                type="number"
                [step]="1"
                [label]="'RECIPE_MANAGE.PREP_TIME' | translate"
                [error]="errors.prepTime"
            />

            <fd-ui-input
                formControlName="servings"
                size="lg"
                type="number"
                [step]="1"
                [label]="'RECIPE_MANAGE.SERVINGS' | translate"
                [required]="true"
                [error]="errors.servings"
            />

            <fd-ui-textarea
                class="recipe-basic-info__field--full"
                formControlName="description"
                [label]="'RECIPE_MANAGE.DESCRIPTION' | translate"
                [placeholder]="'RECIPE_MANAGE.DESCRIPTION_PLACEHOLDER' | translate"
                [rows]="3"
                [maxlength]="1000"
                [error]="errors.description"
            />
        </div>
    </fd-ui-card>

    <fd-ui-card
        class="recipe-basic-info__card recipe-basic-info__card--basic recipe-basic-info__card--tracking"
        appearance="entry"
        tone="editor-gradient"
        density="relaxed"
        headerAlign="center"
        [title]="'RECIPE_MANAGE.TRACKING_PREFERENCES' | translate"
    >
        <div class="recipe-basic-info__basic-grid fd-grid fd-gap-lg">
            <div class="recipe-basic-info__field recipe-basic-info__field--full fd-stack fd-gap-xs">
                <fd-ui-select
                    formControlName="visibility"
                    size="lg"
                    [label]="'RECIPE_MANAGE.VISIBILITY' | translate"
                    [required]="true"
                    [options]="visibilitySelectOptions()"
                    [error]="errors.visibility"
                />
            </div>
            <div class="recipe-basic-info__field recipe-basic-info__field--full fd-stack fd-gap-xs">
                <fd-ui-textarea
                    formControlName="comment"
                    [label]="'RECIPE_MANAGE.COMMENT' | translate"
                    [placeholder]="'RECIPE_MANAGE.COMMENT_PLACEHOLDER' | translate"
                    [rows]="4"
                    [maxlength]="1000"
                    [error]="errors.comment"
                />
            </div>
        </div>
    </fd-ui-card>
</ng-container>
