<div class="recipe-manage fd-stack" fdPageContainer>
    <fd-page-header
        class="recipe-manage__header"
        [title]="manageHeaderState().titleKey | translate"
        [subtitle]="'RECIPE_MANAGE.SUBTITLE' | translate"
        [backVisible]="true"
        [backAriaLabel]="'PRODUCT_MANAGE.CANCEL_BUTTON' | translate"
        (back)="onCancelAsync()"
    />

    <fd-page-body>
        <form
            class="recipe-manage__form fd-stack fd-gap-lg"
            [attr.aria-busy]="isSubmitting()"
            (submit)="onSubmit(); $event.preventDefault()"
        >
            @if (globalError()) {
                <div class="recipe-manage__error fd-ui-notice-surface fd-ui-notice-surface--danger fd-ui-body-sm" role="alert">
                    {{ globalError() }}
                </div>
            }

            <div class="recipe-manage__grid fd-grid fd-gap-lg">
                <div class="recipe-manage__column recipe-manage__column--primary fd-stack">
                    <fd-recipe-basic-info [form]="recipeSignalForm" />

                    <fd-recipe-steps-list
                        [steps]="stepListItems()"
                        [expandedSteps]="expandedStepsSet"
                        [stepsError]="stepsError()"
                        (stepExpandedToggle)="toggleStepExpanded($event)"
                        (stepDrop)="onStepDrop($event)"
                        (addStep)="addStep()"
                        (removeStep)="removeStep($event)"
                        (addIngredient)="addIngredientToStep($event)"
                        (removeIngredient)="removeIngredientFromStep($event)"
                        (selectProduct)="onProductSelectClick($event)"
                        (stepTitleChange)="onStepTitleChange($event)"
                        (stepImageChange)="onStepImageChange($event)"
                        (stepDescriptionChange)="onStepDescriptionChange($event)"
                        (ingredientAmountChange)="onIngredientAmountChange($event)"
                    />
                </div>

                <div class="recipe-manage__column recipe-manage__column--secondary fd-stack">
                    <div class="recipe-manage__sticky-stack fd-stack fd-gap-lg">
                        <fd-recipe-nutrition-editor
                            [form]="recipeSignalForm"
                            [nutritionMode]="nutritionMode()"
                            [nutritionScaleMode]="nutritionScaleMode"
                            (nutritionModeChange)="onNutritionModeChange($event)"
                            (nutritionScaleModeChange)="onNutritionScaleModeChange($event)"
                        />

                        <div class="recipe-manage__actions-panel">
                            <div class="recipe-manage__footer-actions fd-ui-actions fd-ui-actions--split">
                                <fd-ui-button
                                    type="button"
                                    class="recipe-manage__cancel-button"
                                    variant="secondary"
                                    fill="outline"
                                    icon="arrow_back"
                                    (click)="onCancelAsync()"
                                >
                                    {{ 'PRODUCT_MANAGE.CANCEL_BUTTON' | translate }}
                                </fd-ui-button>
                                <fd-ui-button
                                    type="submit"
                                    class="recipe-manage__action-button"
                                    appearance="brand-action"
                                    icon="save"
                                    [fullWidth]="true"
                                    [disabled]="recipeSignalForm().invalid() || !areStepsValid() || isSubmitting()"
                                    [loading]="isSubmitting()"
                                >
                                    {{ manageHeaderState().submitLabelKey | translate }}
                                </fd-ui-button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </fd-page-body>
</div>
