@if (nutrients().length > 0) {
    <div class="section">
        <h4 class="section-title fd-ui-overline">{{ titleKey() | translate }}</h4>
        @for (nutrient of nutrients(); track nutrient.nutrientId) {
            <div class="nutrient-row fd-grid fd-gap-xs fd-align-center">
                <span class="nutrient-name fd-ui-stat-label">{{ nutrient.name }}</span>
                <span class="nutrient-amount fd-ui-caption">{{ nutrient.amountPer100g | number: '1.1-1' }} {{ nutrient.unit }}</span>
                @if (nutrient.percentDailyValue !== null) {
                    <div class="dv-bar-container">
                        <div
                            class="dv-bar"
                            [style.width.%]="nutrient.percentDailyValueWidth"
                            [class.dv-low]="nutrient.percentDailyValue < 15"
                            [class.dv-good]="nutrient.percentDailyValue >= 15 && nutrient.percentDailyValue <= 100"
                            [class.dv-high]="nutrient.percentDailyValue > 100"
                        ></div>
                    </div>
                    <span class="dv-percent fd-ui-caption">{{ nutrient.percentDailyValue }}%</span>
                }
            </div>
        }
    </div>
}
