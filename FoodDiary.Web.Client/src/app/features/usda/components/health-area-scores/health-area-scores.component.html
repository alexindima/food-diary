<div class="health-scores">
    <h3 class="title fd-ui-card-title">{{ 'HEALTH_SCORES.TITLE' | translate }}</h3>
    <div class="areas-grid fd-grid fd-gap-sm">
        @for (area of areas(); track area.key) {
            <div [class]="`area-card fd-ui-stat-tile fd-ui-stat-tile--compact fd-ui-stat-tile--centered ${area.gradeClass}`">
                <span class="area-icon">{{ area.icon }}</span>
                <span class="area-name fd-ui-stat-tile__label fd-ui-overline">{{ area.labelKey | translate }}</span>
                <div class="area-score-ring">
                    <svg viewBox="0 0 36 36" class="ring-svg">
                        <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path
                            class="ring-fill"
                            d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831"
                            [attr.stroke-dasharray]="area.strokeDasharray"
                        />
                    </svg>
                    <span class="score-text fd-center fd-ui-stat-value">{{ area.score }}</span>
                </div>
                <span class="area-grade fd-ui-stat-tile__meta fd-ui-overline">{{ area.gradeKey | translate }}</span>
            </div>
        }
    </div>
</div>
