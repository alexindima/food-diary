<fd-ui-dialog size="lg" [title]="data.titleKey | translate" [subtitle]="subtitle()">
    <fd-ui-satiety-scale layout="vertical" [value]="selectedValue()" (valueChange)="onControlValueSelected($event)" />

    <div fdUiDialogFooter>
        <fd-ui-button variant="secondary" fill="outline" (click)="close()">
            {{ 'CONSUMPTION_MANAGE.SATIETY_DIALOG_CANCEL' | translate }}
        </fd-ui-button>
        <fd-ui-button
            variant="primary"
            [disabled]="selectedValue() === null"
            [attr.title]="selectedValue() === null ? ('DISABLED_HINTS.SELECT_VALUE' | translate) : null"
            (click)="closeWithValue()"
        >
            {{ 'CONSUMPTION_MANAGE.SATIETY_DIALOG_APPLY' | translate }}
        </fd-ui-button>
    </div>
</fd-ui-dialog>
