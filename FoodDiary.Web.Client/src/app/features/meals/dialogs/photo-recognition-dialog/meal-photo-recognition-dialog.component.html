<fd-ui-dialog
    size="lg"
    [title]="'CONSUMPTION_MANAGE.PHOTO_AI_DIALOG.TITLE' | translate"
    [subtitle]="'CONSUMPTION_MANAGE.PHOTO_AI_DIALOG.SUBTITLE' | translate"
>
    <div class="photo-ai-dialog fd-stack fd-gap-lg">
        <fd-meal-photo-upload-panel
            [initialSelection]="initialSelection"
            [statusKey]="statusKey()"
            [isLoading]="isLoading()"
            [isNutritionLoading]="isNutritionLoading()"
            (imageChanged)="onImageChanged($event)"
        />

        @if (!isLoading()) {
            @if (errorKey(); as currentErrorKey) {
                <div class="photo-ai-dialog__error fd-ui-notice-surface fd-ui-notice-surface--danger fd-ui-body-sm">
                    {{ currentErrorKey | translate }}
                </div>
            }

            @if (results().length) {
                <div class="photo-ai-dialog__results fd-stack fd-gap-sm">
                    <fd-meal-photo-result-actions
                        [isLoading]="isLoading()"
                        [hasSelectionAsset]="hasSelectionAsset()"
                        [isEditing]="isEditing()"
                        [editActionState]="editActionState()"
                        (reanalyze)="onReanalyze()"
                        (editAction)="handleEditAction()"
                    />

                    @if (isEditing()) {
                        <fd-meal-photo-edit-list
                            [items]="editItems()"
                            [unitOptions]="unitOptions"
                            (itemDropped)="onEditItemDrop($event)"
                            (itemUpdated)="updateEditItemFromView($event)"
                            (itemRemoved)="removeEditItem($event)"
                            (itemAdded)="addEditItem()"
                        />
                    } @else {
                        <fd-meal-photo-result-table [resultViews]="resultViews()" />
                    }

                    <fd-meal-photo-nutrition-summary
                        [isNutritionLoading]="isNutritionLoading()"
                        [items]="macroSummaryItems()"
                        [errorKey]="nutritionErrorKey()"
                    />
                </div>
            }
        }
    </div>

    <div fdUiDialogFooter class="photo-ai-dialog__actions fd-ui-actions fd-ui-actions--end">
        <fd-ui-button fill="outline" variant="secondary" (click)="close()">
            {{ 'COMMON.CANCEL' | translate }}
        </fd-ui-button>
        @if (!isEditing()) {
            <fd-ui-button
                variant="primary"
                fill="solid"
                [disabled]="!nutrition() || isLoading() || isNutritionLoading()"
                (click)="addToMeal()"
            >
                {{ submitLabelKey() | translate }}
            </fd-ui-button>
        }
    </div>
</fd-ui-dialog>
