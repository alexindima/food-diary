<div class="photo-ai-dialog__edit-list fd-stack fd-gap-xs" cdkDropList (cdkDropListDropped)="onDrop($event)">
    @for (item of items(); track item.id; let i = $index) {
        <div class="photo-ai-dialog__edit-row fd-grid fd-gap-xs fd-align-center" cdkDrag>
            <div class="photo-ai-dialog__edit-handle fd-inline-center" cdkDragHandle>
                <fd-ui-icon name="drag_indicator" />
            </div>
            <input
                #nameInput
                class="photo-ai-dialog__edit-input photo-ai-dialog__edit-input--name"
                type="text"
                [value]="item.name"
                (input)="updateItem(i, 'name', nameInput.value)"
            />
            <input
                #amountInput
                class="photo-ai-dialog__edit-input photo-ai-dialog__edit-input--amount"
                type="number"
                [value]="item.amount"
                (input)="updateItem(i, 'amount', amountInput.value)"
            />
            <select #unitSelect class="photo-ai-dialog__edit-select" [value]="item.unit" (change)="updateItem(i, 'unit', unitSelect.value)">
                @for (unit of unitOptions(); track unit.value) {
                    <option [value]="unit.value">{{ unit.labelKey | translate }}</option>
                }
            </select>
            <fd-ui-button
                class="photo-ai-dialog__edit-remove"
                variant="danger"
                fill="text"
                icon="delete"
                [fdUiHint]="'COMMON.DELETE' | translate"
                [ariaLabel]="'COMMON.DELETE' | translate"
                (click)="itemRemoved.emit(i)"
            />
        </div>
    }
</div>
<fd-ui-button
    type="button"
    class="photo-ai-dialog__edit-add"
    appearance="dashed"
    variant="secondary"
    fill="outline"
    icon="add"
    (click)="itemAdded.emit()"
>
    {{ 'CONSUMPTION_MANAGE.PHOTO_AI_DIALOG.ADD_ITEM' | translate }}
</fd-ui-button>
