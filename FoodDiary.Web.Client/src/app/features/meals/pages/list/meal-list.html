<div #container class="consumption-list" fdPageContainer>
    <fd-page-header
        class="consumption-list__header"
        [title]="'CONSUMPTION_LIST.TITLE' | translate"
        [subtitle]="'CONSUMPTION_LIST.SUBTITLE' | translate"
        [compactActions]="true"
    >
        @if (isMobileView()) {
            <div class="consumption-list__mobile-toolbar">
                <fd-ui-button
                    class="consumption-list__icon-button consumption-list__filter-button"
                    appearance="toolbar"
                    variant="secondary"
                    fill="outline"
                    icon="filter_alt"
                    [fdUiHint]="'CONSUMPTION_LIST.DATE_FILTER_BUTTON' | translate"
                    [ariaLabel]="'CONSUMPTION_LIST.DATE_FILTER_BUTTON' | translate"
                    [class.consumption-list__filter-button--active]="hasDateFilter()"
                    (click)="openFilters()"
                />
            </div>
        } @else {
            <div class="consumption-list__header-actions">
                <fd-ui-button
                    class="consumption-list__icon-button consumption-list__filter-button"
                    appearance="toolbar"
                    variant="secondary"
                    fill="outline"
                    icon="filter_alt"
                    [fdUiHint]="'CONSUMPTION_LIST.DATE_FILTER_BUTTON' | translate"
                    [ariaLabel]="'CONSUMPTION_LIST.DATE_FILTER_BUTTON' | translate"
                    [class.consumption-list__filter-button--active]="hasDateFilter()"
                    (click)="openFilters()"
                />
            </div>
        }
    </fd-page-header>

    <fd-page-body>
        @defer (on idle) {
            <fd-ai-input-action-bar
                mode="create"
                [isProcessing]="isAiMealSaving()"
                [clearToken]="aiMealClearToken()"
                (mealCreateRequested)="onAiMealCreateRequested($event)"
                (manualAction)="goToMealAddAsync()"
            />
        } @placeholder {
            <div class="consumption-list__ai-placeholder" aria-hidden="true"></div>
        }

        <fd-meal-list-favorites
            [favoriteViews]="favoriteViews()"
            [count]="favoriteTotalCount()"
            [isOpen]="isFavoritesOpen()"
            [showLoadMore]="hasMoreFavorites()"
            [isLoadingMore]="isFavoritesLoadingMore()"
            (toggleRequested)="toggleFavorites()"
            (loadMore)="loadFavorites()"
            (favoriteRepeated)="repeatFavorite($event)"
            (favoriteRemoved)="removeFavorite($event)"
        />

        <fd-meal-list-content
            [errorKey]="errorKey()"
            [isLoading]="consumptionData.isLoading()"
            [emptyState]="emptyState()"
            [plannedGroups]="plannedGroups()"
            [isPlannedOpen]="isPlannedOpen()"
            [groups]="groupedConsumptions()"
            [totalPages]="consumptionData.totalPages"
            [totalItems]="consumptionData.totalItems"
            [currentPageIndex]="currentPageIndex()"
            [favoriteLoadingIds]="favoriteLoadingIds()"
            (retry)="retryLoad()"
            (mealAdd)="goToMealAddAsync()"
            (plannedToggle)="togglePlanned()"
            (mealOpened)="openMealDetailsAsync($event)"
            (mealFavoriteToggle)="onMealFavoriteToggle($event)"
            (pageIndexChange)="onPageChange($event)"
        />
    </fd-page-body>
</div>
