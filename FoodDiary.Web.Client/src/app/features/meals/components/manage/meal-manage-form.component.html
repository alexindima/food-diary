<div class="consumption-manage fd-stack" fdPageContainer>
    <fd-manage-header
        class="consumption-manage__header"
        [title]="manageHeaderState().titleKey | translate"
        [subtitle]="'CONSUMPTION_MANAGE.SUBTITLE' | translate"
        [backAriaLabel]="'PRODUCT_MANAGE.CANCEL_BUTTON' | translate"
        (back)="onCancelAsync()"
    />

    <form class="consumption-manage__form fd-stack fd-gap-lg" [formGroup]="consumptionForm" (ngSubmit)="onSubmit()">
        @let generalErrors = generalFieldErrors();
        <div class="consumption-manage__grid fd-grid fd-gap-xl">
            <div class="consumption-manage__column consumption-manage__column--primary fd-stack fd-gap-lg">
                <fd-meal-general-info
                    [consumptionForm]="consumptionForm"
                    [mealTypeSelectOptions]="mealTypeSelectOptions"
                    [generalErrors]="generalErrors"
                />

                <fd-ui-card
                    class="consumption-manage__card"
                    tone="editor"
                    density="relaxed"
                    headerAlign="center"
                    [title]="'CONSUMPTION_MANAGE.SATIETY_SECTION_TITLE' | translate"
                >
                    <p class="consumption-manage__satiety-note fd-ui-body-sm">
                        {{ 'CONSUMPTION_MANAGE.SATIETY_SECTION_HINT' | translate }}
                    </p>
                    <fd-meal-satiety-fields
                        layout="compactColumns"
                        pickerSize="md"
                        labelBeforeKey="CONSUMPTION_MANAGE.HUNGER_BEFORE_LABEL"
                        labelAfterKey="CONSUMPTION_MANAGE.HUNGER_AFTER_LABEL"
                        [preMealSatietyLevel]="preMealSatietyLevel()"
                        [postMealSatietyLevel]="postMealSatietyLevel()"
                        (preMealSatietyLevelChange)="onSatietyLevelChange('preMealSatietyLevel', $event)"
                        (postMealSatietyLevelChange)="onSatietyLevelChange('postMealSatietyLevel', $event)"
                    />
                </fd-ui-card>

                <fd-meal-items-section
                    [items]="items"
                    [aiSessions]="aiSessions()"
                    [selectedMealType]="selectedMealType()"
                    [isProcessing]="consumptionForm.disabled"
                    [renderVersion]="itemsRenderVersion()"
                    (mealRecognized)="onAiMealRecognized($event)"
                    (addItem)="addConsumptionItem()"
                    (editItem)="openManualItemDialog($event)"
                    (removeItem)="removeItem($event)"
                    (openItemSelect)="onItemSourceClick($event)"
                    (editSession)="onEditAiSession($event)"
                    (deleteSession)="onDeleteAiSession($event)"
                />
            </div>

            <div class="consumption-manage__column consumption-manage__column--secondary fd-stack fd-gap-lg">
                <fd-meal-nutrition-sidebar
                    [consumptionForm]="consumptionForm"
                    [nutritionControlNames]="nutritionControlNames"
                    [macroBarState]="macroBarState()"
                    [nutritionMode]="nutritionMode()"
                    [nutritionModeOptions]="nutritionModeOptions"
                    [nutritionWarning]="nutritionWarning()"
                    [caloriesError]="caloriesError()"
                    [macrosError]="macrosError()"
                    [consumption]="consumption() ?? null"
                    [globalError]="globalError()"
                    (nutritionModeChange)="onNutritionModeChange($event)"
                    (cancelRequested)="onCancelAsync()"
                />
            </div>
        </div>
    </form>
</div>
