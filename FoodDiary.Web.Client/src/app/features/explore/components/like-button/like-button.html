<fd-ui-button
    class="like-button"
    variant="secondary"
    fill="outline"
    iconSize="md"
    [class.like-button--liked]="isLiked()"
    [icon]="icon()"
    [disabled]="isToggling()"
    [disabledReason]="isToggling() ? ('DISABLED_HINTS.OPERATION_BUSY' | translate) : null"
    (click)="onToggle()"
>
    {{ totalLikes() }}
</fd-ui-button>
