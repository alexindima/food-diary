<div class="statistics" fdPageContainer>
    <fd-page-header class="statistics__header" [title]="'STATISTICS.TITLE' | translate" [subtitle]="'STATISTICS.SUBTITLE' | translate">
        <fd-ui-button
            data-tour-id="statistics-tour-help"
            appearance="toolbar"
            variant="secondary"
            fill="outline"
            icon="help_outline"
            [fdUiHint]="'STATISTICS.TOUR.START_TOUR' | translate"
            [ariaLabel]="'STATISTICS.TOUR.START_TOUR' | translate"
            (click)="startStatisticsTour()"
        />
    </fd-page-header>

    <fd-page-body>
        @if (hasLoadError()) {
            <fd-error-state (retry)="reload()" />
        } @else {
            <fd-period-filter
                class="statistics__period"
                data-tour-id="statistics-period"
                [tabs]="rangeTabs"
                [selectedValue]="selectedRange()"
                [rangeField]="customRangeForm.range"
                [displayRange]="currentRange()"
                [startLabel]="'STATISTICS.CUSTOM_RANGE_FROM_LABEL' | translate"
                [endLabel]="'STATISTICS.CUSTOM_RANGE_TO_LABEL' | translate"
                [startPlaceholder]="'STATISTICS.CUSTOM_RANGE_PLACEHOLDER' | translate"
                [endPlaceholder]="'STATISTICS.CUSTOM_RANGE_PLACEHOLDER' | translate"
                (rangeChange)="changeRange($event)"
            />
        }
        @if (!hasLoadError() && isLoading()) {
            <div class="statistics__skeleton-grid">
                <fd-skeleton-card class="statistics__skeleton statistics__skeleton--summary" />
                <fd-skeleton-card class="statistics__skeleton statistics__skeleton--chart" />
                <fd-skeleton-card class="statistics__skeleton statistics__skeleton--chart" />
            </div>
        } @else if (!hasLoadError()) {
            @if (!hasStatisticsData() && !hasBodyData() && !isBodyLoading() && !hasBodyLoadError()) {
                <fd-ui-empty-state icon="monitoring" [message]="'STATISTICS.NO_DATA' | translate" />
            }

            <fd-statistics-summary
                data-tour-id="statistics-summary"
                [summary]="summaryMetrics()"
                [summarySparklinePoints]="summarySparklinePoints()"
                [macroSparklinePoints]="macroSparklinePoints()"
                [exportingFormat]="exportingFormat()"
                (exportRequested)="exportDiary($event)"
            />

            <fd-statistics-nutrition
                class="statistics__card statistics__card--charts"
                data-tour-id="statistics-nutrition"
                [tabs]="nutritionTabs"
                [selectedTab]="selectedNutritionTab()"
                [hasData]="hasStatisticsData()"
                [caloriesTrendPoints]="caloriesTrendPoints()"
                [nutrientTrendGroups]="nutrientTrendGroups()"
                [nutrientPieSegments]="nutrientPieSegments()"
                [nutrientBarItems]="nutrientBarItems()"
                (selectedTabChange)="changeNutritionTab($event)"
            />

            <fd-statistics-body
                class="statistics__card statistics__card--body"
                data-tour-id="statistics-body"
                [tabs]="bodyTabs"
                [selectedTab]="selectedBodyTab()"
                [isLoading]="isBodyLoading()"
                [hasLoadError]="hasBodyLoadError()"
                [bodyChartPoints]="bodyChartPoints()"
                [hasBodyData]="hasBodyData()"
                (retry)="reload()"
                (selectedTabChange)="changeBodyTab($event)"
            />
        }
    </fd-page-body>
</div>
