<div class="card">
    <h3 class="card-title fd-ui-card-title">{{ 'WEARABLES.DAILY_TITLE' | translate }}</h3>

    @if (metrics().length === 0) {
        <p class="empty-state fd-ui-caption">{{ 'WEARABLES.NO_DATA' | translate }}</p>
    } @else {
        <div class="metrics-grid">
            @for (metric of metrics(); track metric.key) {
                <div class="metric-item fd-ui-stat-tile fd-ui-stat-tile--compact fd-ui-stat-tile--centered">
                    <span class="metric-icon">{{ metric.icon }}</span>
                    <span class="metric-value fd-ui-stat-tile__value fd-ui-metric-lg">{{
                        metric.value | number: metric.numberFormat
                    }}</span>
                    <span class="metric-unit fd-ui-stat-tile__meta fd-ui-helper-text">{{ metric.unit }}</span>
                    <span class="metric-label fd-ui-stat-tile__label fd-ui-overline">{{ metric.labelKey | translate }}</span>
                </div>
            }
        </div>
    }
</div>
