<fd-media-card class="entity-card" (click)="openCard()">
    <button fdMediaCardContent type="button" class="entity-card__open-button" [attr.aria-label]="title()"></button>
    @let previewInteraction = previewInteractionState();
    <div fdMediaCardMedia class="entity-card__media-shell">
        <fd-entity-card-thumb
            [imageUrl]="normalizedImageUrl()"
            [imageAlt]="imageAlt()"
            [imageIcon]="imageIcon()"
            [collage]="collageState()"
            [hasPreviewImage]="hasPreviewImage()"
            [previewInteraction]="previewInteraction"
            (preview)="previewCardImage()"
        />

        @if (ownershipIcon(); as icon) {
            <span class="entity-card__ownership-badge fd-inline-center" aria-hidden="true">
                <fd-ui-icon class="entity-card__ownership-badge-icon" [name]="icon" />
            </span>
        }

        @if (showFavorite()) {
            <button
                type="button"
                class="entity-card__favorite-button fd-favorite-button fd-inline-center"
                [class.entity-card__favorite-button--active]="isFavorite()"
                [class.fd-favorite-button--active]="isFavorite()"
                [fdUiHint]="favoriteAriaLabel()"
                [attr.aria-label]="favoriteAriaLabel()"
                [disabled]="favoriteLoading()"
                (click)="toggleFavorite($event)"
                (keydown.enter)="stopCardKeyboardEvent($event)"
                (keydown.space)="stopCardKeyboardEvent($event)"
            >
                <fd-ui-icon class="entity-card__favorite-button-icon" [name]="favoriteIcon()" />
            </button>
        }
    </div>

    <fd-entity-card-body
        fdMediaCardContent
        [title]="title()"
        [titleMuted]="titleMuted()"
        [description]="description()"
        [comment]="normalizedComment()"
        [nutrition]="nutrition()"
        [calories]="calories()"
        [quality]="normalizedQuality()"
    />

    @if (showAction()) {
        <fd-entity-card-actions
            fdMediaCardActions
            [actionIcon]="actionIcon()"
            [actionAriaLabel]="actionAriaLabel()"
            (action)="emitCardAction()"
        />
    }
</fd-media-card>
