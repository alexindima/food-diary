<fd-media-card
    class="entity-card"
    role="button"
    tabindex="0"
    (click)="handleOpen()"
    (keydown.enter)="handleOpen()"
    (keydown.space)="handleOpen(); $event.preventDefault()"
>
    @let previewInteraction = previewInteractionState();
    <fd-entity-card-thumb
        fdMediaCardMedia
        [imageUrl]="imageUrl()"
        [imageAlt]="imageAlt()"
        [imageIcon]="imageIcon()"
        [collage]="collageState()"
        [hasPreviewImage]="hasPreviewImage()"
        [previewInteraction]="previewInteraction"
        (preview)="handlePreview()"
    />

    <fd-entity-card-body
        fdMediaCardContent
        [showFavorite]="showFavorite()"
        [isFavorite]="isFavorite()"
        [favoriteLoading]="favoriteLoading()"
        [favoriteIcon]="favoriteIcon()"
        [favoriteAriaLabel]="favoriteAriaLabel()"
        [ownershipIcon]="ownershipIcon()"
        [title]="title()"
        [titleMuted]="titleMuted()"
        [description]="description()"
        [nutrition]="nutrition()"
        [quality]="normalizedQuality()"
        (favoriteToggle)="handleFavoriteToggle()"
    />

    <fd-entity-card-actions
        fdMediaCardActions
        [calories]="calories()"
        [showAction]="showAction()"
        [actionIcon]="actionIcon()"
        [actionAriaLabel]="actionAriaLabel()"
        (action)="handleAction()"
    />
</fd-media-card>
