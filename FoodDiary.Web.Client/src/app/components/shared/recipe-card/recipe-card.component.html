<fd-entity-card
    imageIcon="restaurant_menu"
    [imageUrl]="imageUrl()"
    [imageAlt]="recipe().name"
    [previewable]="hasPreviewImage()"
    [showFavorite]="canToggleFavorite()"
    [isFavorite]="isFavorite()"
    [favoriteLoading]="favoriteLoading()"
    [favoriteAriaLabel]="favoriteAriaLabelKey() | translate"
    [ownershipIcon]="ownershipIcon()"
    [title]="recipe().name"
    [description]="description()"
    [nutrition]="nutrition()"
    [quality]="quality()"
    [calories]="recipe().totalCalories ?? 0"
    [showAction]="true"
    [actionAriaLabel]="'RECIPE_CARD.ADD_TO_MEAL' | translate"
    (open)="handleOpen()"
    (preview)="handlePreview()"
    (favoriteToggle)="toggleFavorite()"
    (action)="handleAdd()"
/>
