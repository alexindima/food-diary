<fd-entity-card
    [imageUrl]="imageUrl()"
    [imageAlt]="recipe().name"
    imageIcon="restaurant_menu"
    [previewable]="hasPreviewImage()"
    [showFavorite]="canToggleFavorite()"
    [isFavorite]="isFavorite()"
    [favoriteLoading]="isFavoriteLoading()"
    [favoriteAriaLabel]="(isFavorite() ? 'RECIPE_DETAIL.REMOVE_FAVORITE' : 'RECIPE_DETAIL.ADD_FAVORITE') | translate"
    [ownershipIcon]="recipe().isOwnedByCurrentUser ? 'person' : 'groups'"
    [title]="recipe().name"
    [description]="
        ('RECIPE_LIST.INGREDIENTS_COUNT' | translate) +
        ': ' +
        ingredientCount() +
        (totalTime() ? ' - ' + totalTime() + ' ' + ('RECIPE_DETAIL.MIN' | translate) : '')
    "
    [nutrition]="nutrition()"
    [quality]="quality()"
    [calories]="recipe().totalCalories ?? 0"
    [showAction]="true"
    [actionAriaLabel]="'RECIPE_CARD.ADD_TO_MEAL' | translate"
    (open)="handleOpen()"
    (preview)="handlePreview()"
    (favoriteToggle)="toggleFavorite()"
    (action)="handleAdd()"
/>
