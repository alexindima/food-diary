<div
    class="meal-details-fields fd-grid fd-gap-sm"
    [class.meal-details-fields--surface]="surface()"
    [class.meal-details-fields--regular]="density() === 'regular'"
>
    <div class="meal-details-fields__date-time fd-grid fd-gap-xs">
        <label class="meal-details-fields__field fd-grid fd-gap-xxs" for="meal-details-date">
            <span class="meal-details-fields__label fd-ui-field-label fd-ui-field-label--floating">
                {{ 'MEAL_DETAILS.DATE' | translate }}
            </span>
            <input
                #dateInput
                id="meal-details-date"
                class="meal-details-fields__input fd-ui-body-sm"
                type="date"
                [value]="date()"
                (input)="dateChange.emit(dateInput.value)"
            />
        </label>
        <label class="meal-details-fields__field fd-grid fd-gap-xxs" for="meal-details-time">
            <span class="meal-details-fields__label fd-ui-field-label fd-ui-field-label--floating">
                {{ 'MEAL_DETAILS.TIME' | translate }}
            </span>
            <input
                #timeInput
                id="meal-details-time"
                class="meal-details-fields__input fd-ui-body-sm"
                type="time"
                [value]="time()"
                (input)="timeChange.emit(timeInput.value)"
            />
        </label>
    </div>

    <label class="meal-details-fields__field fd-grid fd-gap-xxs" for="meal-details-comment">
        <span class="meal-details-fields__label fd-ui-field-label fd-ui-field-label--floating">
            {{ 'MEAL_DETAILS.COMMENT' | translate }}
        </span>
        <textarea
            #commentInput
            id="meal-details-comment"
            class="meal-details-fields__textarea fd-ui-body-sm"
            [rows]="textareaRows()"
            [value]="comment()"
            (input)="commentChange.emit(commentInput.value)"
        ></textarea>
    </label>

    <fd-meal-satiety-fields
        [layout]="satietyLayout() === 'columns' ? 'columns' : 'stacked'"
        [preMealSatietyLevel]="preMealSatietyLevel()"
        [postMealSatietyLevel]="postMealSatietyLevel()"
        (preMealSatietyLevelChange)="onPreMealSatietyLevelChange($event)"
        (postMealSatietyLevelChange)="onPostMealSatietyLevelChange($event)"
    />
</div>
