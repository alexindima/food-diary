<fd-ui-dialog size="lg" bodyScrollInset="edge" [title]="'NOTIFICATIONS.TITLE' | translate">
    <div class="notifications-dialog__body" [attr.aria-busy]="isLoading()">
        @if (isLoading()) {
            <div class="notifications-dialog__state fd-place-center fd-gap-sm" role="status" aria-live="polite">
                <fd-ui-icon name="hourglass_top" />
                <p class="fd-ui-body-sm">{{ 'COMMON.LOADING' | translate }}</p>
            </div>
        } @else if (notifications().length === 0) {
            <div
                class="notifications-dialog__state notifications-dialog__state--empty fd-place-center fd-gap-sm"
                role="status"
                aria-live="polite"
            >
                <fd-ui-icon name="notifications_none" />
                <p class="notifications-dialog__state-title fd-ui-card-title">{{ 'NOTIFICATIONS.EMPTY_TITLE' | translate }}</p>
                <p class="notifications-dialog__state-text fd-ui-body-sm">{{ 'NOTIFICATIONS.EMPTY_TEXT' | translate }}</p>
            </div>
        } @else {
            <fd-notifications-dialog-list [items]="notificationItems()" (notificationOpen)="openNotification($event)" />
        }
    </div>

    <div fdUiDialogFooter class="notifications-dialog__footer fd-ui-actions fd-ui-actions--end">
        <fd-ui-button
            variant="secondary"
            fill="outline"
            [disabled]="!hasUnreadNotifications() || isMarkingAllRead()"
            [loading]="isMarkingAllRead()"
            (click)="markAllAsRead()"
        >
            {{ 'NOTIFICATIONS.MARK_ALL_READ' | translate }}
        </fd-ui-button>
    </div>
</fd-ui-dialog>
