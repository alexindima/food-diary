<div class="fd-error-state">
    <fd-ui-icon class="fd-error-state__icon" [name]="icon()"></fd-ui-icon>
    <div class="fd-error-state__title fd-ui-card-title">{{ titleKey() | translate }}</div>
    <div class="fd-error-state__message fd-ui-body-sm">{{ messageKey() | translate }}</div>
    @if (showRetry()) {
        <fd-ui-button (click)="onRetry()">
            {{ retryKey() | translate }}
        </fd-ui-button>
    }
</div>
