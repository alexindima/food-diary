<div class="ai-input-bar fd-row fd-gap-control" [class.ai-input-bar--attached]="hasAttachedResult()">
    <fd-image-upload-field
        class="ai-input-bar__hidden-upload"
        appearance="hidden"
        [cropEnabled]="false"
        [resizeMaxDimension]="1536"
        [deleteOnClear]="true"
        (imageChanged)="onPhotoSelected($event)"
    />
    <fd-ui-icon class="ai-input-bar__icon" name="auto_awesome" />
    <input
        type="text"
        class="ai-input-bar__input fd-ui-body-sm"
        [placeholder]="'CONSUMPTION_LIST.VOICE_PLACEHOLDER' | translate"
        [value]="voiceText()"
        [disabled]="isDisabled()"
        (input)="onTextInput($event)"
        (keydown.enter)="submitTextAsync(); $event.preventDefault()"
    />
    @if (!voiceText()) {
        <fd-ui-button
            class="ai-input-bar__action-btn"
            variant="secondary"
            fill="solid"
            icon="photo_camera"
            iconSize="lg"
            fdUiHintPosition="bottom"
            [disabled]="isDisabled()"
            [fdUiHint]="'AI_INPUT_BAR.PHOTO_TITLE' | translate"
            [ariaLabel]="'AI_INPUT_BAR.PHOTO_TITLE' | translate"
            (click)="onPhotoClickAsync()"
        />
        @if (isSpeechSupported) {
            <fd-ui-button
                class="ai-input-bar__action-btn"
                variant="secondary"
                fill="solid"
                iconSize="lg"
                fdUiHintPosition="bottom"
                [icon]="microphoneIcon()"
                [class.ai-input-bar__action-btn--mic-active]="isListening()"
                [disabled]="isDisabled()"
                [fdUiHint]="'CONSUMPTION_LIST.VOICE_MIC_TITLE' | translate"
                [ariaLabel]="'CONSUMPTION_LIST.VOICE_MIC_TITLE' | translate"
                (click)="toggleMicAsync()"
            />
        }
    } @else {
        <fd-ui-button
            class="ai-input-bar__submit"
            variant="primary"
            fill="solid"
            iconSize="lg"
            [icon]="textSubmitIcon()"
            [disabled]="isDisabled()"
            [ariaLabel]="'AI_INPUT_BAR.ADD_ACTION' | translate"
            (click)="submitTextAsync()"
        />
    }
</div>

@if (hasTextResult()) {
    <fd-ai-photo-result
        class="ai-input-bar__result-panel"
        [titleKey]="'CONSUMPTION_LIST.VOICE_RESULT_TITLE'"
        [sourceText]="textSubmittedQuery()"
        [sourceTextLabelKey]="'AI_INPUT_BAR.TEXT_PREVIEW_LABEL'"
        [submitLabelKey]="submitLabelKey()"
        [showDetails]="showDetails()"
        [results]="textResults()"
        [isAnalyzing]="textIsAnalyzing()"
        [isNutritionLoading]="textIsNutritionLoading()"
        [nutrition]="textNutrition()"
        [errorKey]="textErrorKey()"
        [nutritionErrorKey]="textNutritionErrorKey()"
        [isProcessing]="isProcessing()"
        (dismissed)="dismissTextResult()"
        (addToMeal)="onTextAddToMeal($event)"
        (editApplied)="onTextEditApplied($event)"
        (reanalyzeRequested)="onTextReanalyze()"
    />
}

@if (hasPhotoResult()) {
    <fd-ai-photo-result
        class="ai-input-bar__result-panel"
        [imageUrl]="photoSelection()?.url ?? null"
        [submitLabelKey]="submitLabelKey()"
        [showDetails]="showDetails()"
        [results]="photoResults()"
        [isAnalyzing]="photoIsAnalyzing()"
        [isNutritionLoading]="photoIsNutritionLoading()"
        [nutrition]="photoNutrition()"
        [errorKey]="photoErrorKey()"
        [nutritionErrorKey]="photoNutritionErrorKey()"
        [isProcessing]="isProcessing()"
        (dismissed)="dismissPhotoResult()"
        (addToMeal)="onPhotoAddToMeal($event)"
        (editApplied)="onPhotoEditApplied($event)"
        (reanalyzeRequested)="onPhotoReanalyze()"
    />
}
