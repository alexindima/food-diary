<fd-entity-card
    [imageUrl]="coverImage()"
    [collageImages]="collageImages()"
    [imageAlt]="mealTitle()"
    [previewable]="hasPreviewImage()"
    [showFavorite]="canToggleFavorite()"
    [isFavorite]="isFavorite()"
    [favoriteLoading]="favoriteLoading()"
    [favoriteAriaLabel]="favoriteAriaLabelKey() | translate"
    [ownershipIcon]="null"
    [title]="mealTime()"
    [titleMuted]="mealTitle()"
    [description]="description()"
    [comment]="meal().comment"
    [nutrition]="nutrition()"
    [quality]="quality()"
    [calories]="meal().totalCalories"
    [showAction]="showAction()"
    [actionIcon]="actionIcon()"
    [actionAriaLabel]="actionAriaLabel()"
    (open)="openCard()"
    (preview)="previewCardImage()"
    (favoriteToggle)="toggleFavorite()"
    (action)="emitAction()"
/>
