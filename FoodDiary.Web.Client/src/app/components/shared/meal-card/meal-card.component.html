<fd-entity-card
    [imageUrl]="coverImage()"
    [collageImages]="collageImages()"
    [imageAlt]="mealTitle()"
    [previewable]="hasPreviewImage()"
    [showFavorite]="canToggleFavorite()"
    [isFavorite]="isFavorite()"
    [favoriteLoading]="isFavoriteLoading()"
    [favoriteAriaLabel]="(isFavorite() ? 'CONSUMPTION_DETAIL.REMOVE_FAVORITE' : 'CONSUMPTION_DETAIL.ADD_FAVORITE') | translate"
    [ownershipIcon]="null"
    [title]="mealTime()"
    [titleMuted]="mealTitle()"
    [description]="('MEAL_CARD.ITEM_COUNT' | translate) + ': ' + itemCount()"
    [nutrition]="nutrition()"
    [quality]="quality()"
    [calories]="meal().totalCalories"
    [showAction]="false"
    (open)="handleOpen()"
    (preview)="handlePreview()"
    (favoriteToggle)="toggleFavorite()"
/>
