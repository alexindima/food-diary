<fd-entity-card
    [imageUrl]="imageUrl()"
    [imageAlt]="product().name"
    imageIcon="restaurant"
    [previewable]="hasPreviewImage()"
    [showFavorite]="canToggleFavorite()"
    [isFavorite]="isFavorite()"
    [favoriteLoading]="isFavoriteLoading()"
    [favoriteAriaLabel]="(isFavorite() ? 'PRODUCT_DETAIL.REMOVE_FAVORITE' : 'PRODUCT_DETAIL.ADD_FAVORITE') | translate"
    [ownershipIcon]="product().isOwnedByCurrentUser ? 'person' : 'groups'"
    [title]="product().name"
    [description]="product().brand || product().barcode || ('PRODUCT_CARD.NO_BARCODE' | translate)"
    [nutrition]="nutrition()"
    [quality]="quality()"
    [calories]="product().caloriesPerBase"
    [showAction]="true"
    [actionAriaLabel]="'PRODUCT_CARD.ADD_TO_CONSUMPTION' | translate"
    (open)="handleOpen()"
    (preview)="handlePreview()"
    (favoriteToggle)="toggleFavorite()"
    (action)="handleAdd()"
/>
