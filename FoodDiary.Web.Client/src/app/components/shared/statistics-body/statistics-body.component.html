<fd-ui-card class="stats-body-card fd-stack fd-gap-md" [title]="'STATISTICS.BODY_CHARTS_TITLE' | translate">
    <fd-ui-tabs
        class="stats-body-card__tabs"
        appearance="wrap-compact"
        [tabs]="tabs()"
        [selectedValue]="selectedTab()"
        (selectedValueChange)="onTabChange($event)"
    />

    <fd-ui-section-state
        class="stats-body-card__state"
        emptyIcon="monitoring"
        [state]="sectionState()"
        [loadingLabel]="'STATISTICS.LOADING' | translate"
        [emptyMessage]="noDataKey() | translate"
        [errorTitle]="'ERRORS.LOAD_FAILED_TITLE' | translate"
        [errorMessage]="loadErrorKey() | translate"
        [retryLabel]="'ERRORS.RETRY' | translate"
        (retry)="onRetry()"
    >
        @if (bodyChartData(); as bodyData) {
            <div class="stats-body-card__chart-area">
                <canvas baseChart [type]="'line'" [data]="bodyData" [options]="bodyChartOptions() || {}" [legend]="false"></canvas>
            </div>
        }
    </fd-ui-section-state>
</fd-ui-card>
