<header class="fd-page-header">
    @if (backVisible()) {
        <fd-ui-button
            type="button"
            class="fd-page-header__back"
            appearance="plain-icon"
            variant="secondary"
            fill="outline"
            icon="arrow_back"
            [fdUiHint]="backAriaLabel()"
            [ariaLabel]="backAriaLabel()"
            (click)="onBackClick()"
        />
    }
    <div class="fd-page-header__title-block">
        <h1 class="fd-page-title">{{ title() }}</h1>
        @if (subtitle()) {
            <p class="fd-page-subtitle">{{ subtitle() }}</p>
        }
    </div>
    <div class="fd-page-header__actions">
        <fd-header-actions-overflow>
            <ng-content />
        </fd-header-actions-overflow>
    </div>
</header>
