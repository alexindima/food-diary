<fd-ui-card
    class="waist-summary-card"
    role="button"
    tabindex="0"
    [subtle]="false"
    [title]="'WAIST_CARD.TITLE' | translate"
    [meta]="metaText()"
    (click)="cardClick.emit()"
>
    <div class="waist-summary-card__content fd-stack fd-gap-xxs">
        <strong class="waist-summary-card__value fd-ui-metric-lg">
            @if (latest()) {
                {{ latest() | number: '1.0-1' }} {{ 'WAIST_CARD.CM' | translate }}
            } @else {
                {{ 'WAIST_CARD.NO_DATA' | translate }}
            }
        </strong>
        <span
            class="waist-summary-card__trend fd-ui-body-sm fd-ui-text-muted"
            [class.waist-summary-card__trend--positive]="trend().status === 'positive'"
            [class.waist-summary-card__trend--negative]="trend().status === 'negative'"
            [class.waist-summary-card__trend--neutral]="trend().status === 'neutral'"
        >
            {{ trend().label }}
        </span>
    </div>
</fd-ui-card>
