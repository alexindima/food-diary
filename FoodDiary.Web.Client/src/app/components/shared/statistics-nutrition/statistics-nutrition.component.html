<fd-ui-card class="stats-nutrition-card fd-stack fd-gap-md" [title]="'STATISTICS.NUTRITION_CHARTS_TITLE' | translate">
    <fd-ui-tabs
        class="stats-nutrition-card__tabs"
        appearance="wrap-compact"
        [tabs]="tabs()"
        [selectedValue]="selectedTab()"
        (selectedValueChange)="onTabChange($event)"
    />

    <fd-ui-section-state
        appearance="compact"
        emptyIcon="monitoring"
        [state]="hasData() ? 'content' : 'empty'"
        [emptyMessage]="'STATISTICS.NO_DATA' | translate"
    >
        <div class="stats-nutrition-card__chart-area" [hidden]="selectedTab() !== 'calories'">
            <canvas
                baseChart
                type="line"
                [data]="caloriesLineChartData() ?? emptyLineChartData"
                [options]="caloriesLineChartOptions() || {}"
                [legend]="false"
            ></canvas>
        </div>

        <div class="stats-nutrition-card__chart-area" [hidden]="selectedTab() !== 'macros'">
            <canvas
                baseChart
                type="line"
                [data]="nutrientsLineChartData() ?? emptyLineChartData"
                [options]="nutrientsLineChartOptions() || {}"
            ></canvas>
        </div>

        <div class="stats-nutrition-card__distribution-grid fd-grid fd-gap-md" [hidden]="selectedTab() !== 'distribution'">
            <div class="stats-nutrition-card__chart-card fd-stack fd-gap-sm">
                <h4 class="fd-ui-card-title">{{ 'STATISTICS.NUTRITION_DISTRIBUTION.PIE' | translate }}</h4>
                <canvas
                    baseChart
                    type="pie"
                    [data]="nutrientsPieChartData() ?? emptyPieChartData"
                    [options]="pieChartOptions() || {}"
                    [legend]="false"
                ></canvas>
            </div>
            <div class="stats-nutrition-card__chart-card fd-stack fd-gap-sm">
                <h4 class="fd-ui-card-title">{{ 'STATISTICS.NUTRITION_DISTRIBUTION.RADAR' | translate }}</h4>
                <canvas
                    baseChart
                    type="radar"
                    [data]="nutrientsRadarChartData() ?? emptyRadarChartData"
                    [options]="radarChartOptions() || {}"
                    [legend]="false"
                ></canvas>
            </div>
            <div class="stats-nutrition-card__chart-card fd-stack fd-gap-sm">
                <h4 class="fd-ui-card-title">{{ 'STATISTICS.NUTRITION_DISTRIBUTION.BAR' | translate }}</h4>
                <canvas
                    baseChart
                    type="bar"
                    [data]="nutrientsBarChartData() ?? emptyBarChartData"
                    [options]="barChartOptions() || {}"
                    [legend]="false"
                ></canvas>
            </div>
        </div>
    </fd-ui-section-state>
</fd-ui-card>
