<fd-ui-dialog class="ai-consent-dialog" [title]="'AI_CONSENT.TITLE' | translate">
    <div class="ai-consent-dialog__body">
        <div class="ai-consent-dialog__text fd-ui-body-sm" [innerHTML]="'AI_CONSENT.TEXT' | translate"></div>
        <div class="ai-consent-dialog__checkbox fd-row fd-align-start fd-gap-xs">
            <input id="ai-consent-agree" type="checkbox" [checked]="isAgreed()" (change)="onCheckboxChange($event)" />
            <label class="fd-ui-body-sm" for="ai-consent-agree">{{ 'AI_CONSENT.AGREE_LABEL' | translate }}</label>
        </div>
    </div>
    <div fdUiDialogFooter class="ai-consent-dialog__footer fd-row fd-justify-end fd-gap-sm">
        <fd-ui-button type="button" fill="ghost" variant="secondary" (click)="onCancel()">
            {{ 'AI_CONSENT.CANCEL' | translate }}
        </fd-ui-button>
        <fd-ui-button
            type="button"
            [disabled]="!isAgreed()"
            [attr.title]="!isAgreed() ? ('DISABLED_HINTS.CHECK_AGREEMENT' | translate) : null"
            (click)="onAccept()"
        >
            {{ 'AI_CONSENT.ACCEPT' | translate }}
        </fd-ui-button>
    </div>
</fd-ui-dialog>
