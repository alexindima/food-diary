@switch (state()) {
    @case ('loading') {
        <div class="fd-ui-section-state__surface fd-ui-section-state__surface--loading" role="status" aria-live="polite">
            <fd-ui-loader />

            @if (loadingLabel()) {
                <div class="fd-ui-section-state__loading-label">{{ loadingLabel() }}</div>
            }
        </div>
    }

    @case ('empty') {
        <div class="fd-ui-section-state__surface">
            <fd-ui-empty-state [title]="emptyTitle()" [message]="emptyMessage()" [icon]="emptyIcon()" [appearance]="emptyAppearance()" />
        </div>
    }

    @case ('error') {
        <div class="fd-ui-section-state__surface fd-ui-section-state__surface--error" role="alert">
            <fd-ui-icon class="fd-ui-section-state__error-icon" [name]="errorIcon()"></fd-ui-icon>
            <div class="fd-ui-section-state__error-title">{{ errorTitle() }}</div>
            <div class="fd-ui-section-state__error-message">{{ errorMessage() }}</div>

            @if (retryLabel()) {
                <fd-ui-button size="sm" (click)="onRetry()">
                    {{ retryLabel() }}
                </fd-ui-button>
            }
        </div>
    }

    @default {
        <ng-content />
    }
}
