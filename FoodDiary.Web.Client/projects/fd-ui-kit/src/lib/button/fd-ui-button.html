<button
    [attr.type]="type()"
    [disabled]="disabled() || loading()"
    [class]="classes()"
    [attr.aria-label]="ariaLabel() || null"
    [attr.aria-busy]="loading() ? 'true' : null"
>
    <span class="fd-ui-button__content">
        @if (icon(); as iconName) {
            <fd-ui-icon class="fd-ui-button__icon" [name]="iconName" />
        }
        <span class="fd-ui-button__label">
            <ng-content />
        </span>
    </span>
    @if (loading()) {
        <span class="fd-ui-button__spinner" aria-hidden="true"></span>
    }
</button>
