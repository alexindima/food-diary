<button [attr.type]="type()" [disabled]="disabled()" [ngClass]="classes()" [attr.aria-label]="ariaLabel() || null">
    @if (icon()) {
        <fd-ui-icon class="fd-ui-button__icon" [name]="icon()!"></fd-ui-icon>
    }
    <span class="fd-ui-button__label">
        <ng-content />
    </span>
</button>
