<div [class]="hostClass()">
    <div
        #controlWrap
        #origin="cdkOverlayOrigin"
        cdkOverlayOrigin
        class="fd-ui-select__control-wrap"
        role="presentation"
        [style.background]="fillColor() || null"
        (click)="onControlWrapClick($event)"
    >
        @if (label()) {
            <label class="fd-ui-select__label" [attr.for]="id()">
                <span class="fd-ui-select__label-text">{{ label() }}</span>
                @if (required()) {
                    <span class="fd-ui-select__required">*</span>
                }
            </label>
        }

        <button
            #control
            class="fd-ui-select__control"
            type="button"
            [id]="id()"
            [disabled]="disabled()"
            [class.fd-ui-select__control--placeholder]="!hasValue()"
            [attr.aria-describedby]="error() ? id() + '-error' : null"
            [attr.aria-invalid]="error() ? 'true' : null"
            [attr.aria-expanded]="isOpen()"
            [attr.aria-haspopup]="'listbox'"
            [attr.aria-controls]="id() + '-listbox'"
            [attr.aria-activedescendant]="activeOptionId()"
            (focus)="onFocus()"
            (blur)="onBlur()"
            (click)="toggleMenu($event)"
            (keydown)="onControlKeydown($event)"
        >
            {{ selectedLabel() }}
        </button>

        <ng-template
            cdkConnectedOverlay
            [cdkConnectedOverlayOrigin]="origin"
            [cdkConnectedOverlayOpen]="isOpen()"
            [cdkConnectedOverlayHasBackdrop]="true"
            [cdkConnectedOverlayBackdropClass]="'cdk-overlay-transparent-backdrop'"
            [cdkConnectedOverlayMinWidth]="overlayMinWidth()"
            [cdkConnectedOverlayPositions]="[
                { originX: 'start', originY: 'bottom', overlayX: 'start', overlayY: 'top', offsetY: 8 },
                { originX: 'start', originY: 'top', overlayX: 'start', overlayY: 'bottom', offsetY: -8 },
            ]"
            (attach)="onMenuAttached()"
            (backdropClick)="closeMenu()"
            (detach)="closeMenu()"
        >
            <div
                #listbox
                class="fd-ui-select__menu"
                role="listbox"
                tabindex="-1"
                [id]="id() + '-listbox'"
                (keydown)="onListboxKeydown($event)"
            >
                @for (option of options(); track option.value) {
                    <button
                        type="button"
                        class="fd-ui-select__menu-item"
                        role="option"
                        tabindex="-1"
                        [id]="getOptionId($index)"
                        [class.fd-ui-select__menu-item--selected]="isEqual(option.value, internalValue())"
                        [class.fd-ui-select__menu-item--active]="$index === activeIndex()"
                        [attr.aria-selected]="isEqual(option.value, internalValue())"
                        (click)="onOptionSelect(option)"
                    >
                        <span>{{ option.label }}</span>
                    </button>
                }
            </div>
        </ng-template>

        <span class="fd-ui-select__suffix" aria-hidden="true" [class.fd-ui-select__suffix--open]="isOpen()">
            <fd-ui-icon name="expand_more" />
        </span>
    </div>

    @if (error()) {
        <div class="fd-ui-select__error" role="alert" [id]="id() + '-error'">{{ error() }}</div>
    }
</div>
