<div role="group" [class]="classes()" [attr.aria-label]="ariaLabel() || null">
    @for (option of options(); track option.value) {
        <button
            type="button"
            class="fd-ui-chip-select__item"
            [class.is-selected]="isSelected(option.value)"
            [disabled]="option.disabled"
            [attr.aria-label]="option.ariaLabel || null"
            [attr.aria-pressed]="isSelected(option.value)"
            [fdUiHint]="option.hint || null"
            (click)="toggle(option.value)"
        >
            {{ option.label }}
        </button>
    }
</div>
