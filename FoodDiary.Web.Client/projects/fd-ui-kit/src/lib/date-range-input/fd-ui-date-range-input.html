<div class="fd-ui-date-range-input">
    <fd-ui-date-input
        [formField]="rangeForm.start"
        [label]="startLabel()"
        [size]="size()"
        [placeholder]="startPlaceholder()"
        (blur)="touchRange()"
    />
    <span class="fd-ui-date-range-input__divider" aria-hidden="true">&mdash;</span>
    <fd-ui-date-input
        [formField]="rangeForm.end"
        [label]="endLabel()"
        [size]="size()"
        [placeholder]="endPlaceholder()"
        (blur)="touchRange()"
    />
</div>
