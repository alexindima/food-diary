<div
    [class]="hostClass"
    [style.--fd-nutrient-tint]="tintColor() || null"
    [style.--fd-nutrient-text-color]="textColor() || null"
    (pointerdown)="focusControl($event)"
>
    @if (label()) {
        <div class="fd-ui-nutrient-input__label" [class.fd-ui-nutrient-input__label--uppercase]="labelUppercase()">
            @if (icon(); as iconName) {
                <fd-ui-icon class="fd-ui-nutrient-input__icon" [name]="iconName" />
            }
            <span class="fd-ui-nutrient-input__label-text">
                <span>{{ label() }}</span>
                @if (unitLabel()) {
                    <span class="fd-ui-nutrient-input__label-unit">, {{ unitLabel() }}</span>
                }
                @if (required()) {
                    <span class="fd-ui-nutrient-input__required">*</span>
                }
            </span>
        </div>
    }

    <div class="fd-ui-nutrient-input__value-row">
        <input
            #control
            class="fd-ui-nutrient-input__control"
            [attr.name]="name() || null"
            [attr.type]="type() === 'number' ? 'text' : type()"
            [attr.inputmode]="type() === 'number' ? 'decimal' : null"
            [attr.placeholder]="visiblePlaceholder()"
            [required]="required()"
            [readonly]="isReadonly()"
            [attr.step]="step() ?? null"
            [attr.min]="min() ?? null"
            [attr.max]="maximum() ?? max() ?? null"
            [attr.size]="inputSize"
            [style.width]="inputWidth"
            [disabled]="disabled()"
            [value]="displayValue"
            (focus)="onFocus()"
            (input)="onInput($event)"
            (blur)="onBlur()"
        />
    </div>

    @if (error()) {
        <div class="fd-ui-nutrient-input__error">{{ error() }}</div>
    }
</div>
