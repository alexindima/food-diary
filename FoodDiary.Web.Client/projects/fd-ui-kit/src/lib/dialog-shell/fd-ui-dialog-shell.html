<fd-ui-dialog
    class="fd-ui-dialog-shell"
    [class.fd-ui-dialog-shell--flush]="flush()"
    [title]="title()"
    [subtitle]="subtitle()"
    [size]="size()"
    [bodyScrollInset]="bodyScrollInset()"
    [dismissible]="dismissible()"
>
    <ng-content select="[fdUiDialogHeader]" />
    <ng-content select="[fdUiDialogFooter]" />
    <ng-content />
</fd-ui-dialog>
