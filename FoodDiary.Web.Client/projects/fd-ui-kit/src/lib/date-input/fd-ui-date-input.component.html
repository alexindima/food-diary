<div
    class="fd-ui-date-input"
    [ngClass]="[sizeClass(), error() ? 'fd-ui-date-input--has-error' : '', shouldFloatLabel() ? 'fd-ui-date-input--floating' : '']"
>
    <div class="fd-ui-date-input__control-wrap" (focusin)="onFocusIn()" (focusout)="onFocusOut()">
        @if (label()) {
            <label class="fd-ui-date-input__label" [attr.for]="id()">
                <span class="fd-ui-date-input__label-text">{{ label() }}</span>
                @if (required()) {
                    <span class="fd-ui-date-input__required">*</span>
                }
            </label>
        }
        <div class="fd-ui-date-input__segment">
            <input
                cdkOverlayOrigin
                #origin="cdkOverlayOrigin"
                class="fd-ui-date-input__control"
                [id]="id()"
                [value]="displayValue()"
                [disabled]="disabled()"
                [readOnly]="true"
                [attr.placeholder]="shouldShowPlaceholder() ? (placeholder() ?? null) : null"
                [attr.aria-describedby]="error() ? id() + '-error' : null"
                [attr.aria-invalid]="error() ? 'true' : null"
                [attr.aria-expanded]="isOpen()"
                [attr.aria-haspopup]="'dialog'"
                (click)="openDatePicker()"
                (keydown)="onInputKeydown($event)"
            />
            <button type="button" class="fd-ui-date-input__suffix" [disabled]="disabled()" (click)="openDatePicker()">
                <fd-ui-icon name="calendar_today"></fd-ui-icon>
            </button>

            <ng-template
                cdkConnectedOverlay
                [cdkConnectedOverlayOrigin]="origin"
                [cdkConnectedOverlayOpen]="isOpen()"
                [cdkConnectedOverlayHasBackdrop]="true"
                [cdkConnectedOverlayBackdropClass]="'cdk-overlay-transparent-backdrop'"
                [cdkConnectedOverlayPositions]="[
                    { originX: 'start', originY: 'bottom', overlayX: 'start', overlayY: 'top', offsetY: 8 },
                    { originX: 'start', originY: 'top', overlayX: 'start', overlayY: 'bottom', offsetY: -8 },
                ]"
                (backdropClick)="closeDatePicker()"
                (detach)="closeDatePicker()"
                (overlayKeydown)="onOverlayKeydown($event)"
            >
                <div class="fd-ui-date-input__panel" tabindex="-1">
                    <fd-ui-calendar
                        [value]="value()"
                        [displayMonth]="displayMonth()"
                        [min]="minDate"
                        [max]="maxDate"
                        (valueChange)="onDateSelect($event)"
                        (displayMonthChange)="onDisplayMonthChange($event)"
                    />
                </div>
            </ng-template>
        </div>
    </div>

    @if (error()) {
        <div class="fd-ui-date-input__error" [id]="id() + '-error'" role="alert">{{ error() }}</div>
    }
</div>
