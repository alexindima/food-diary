@if (show()) {
    <div class="fd-ui-line-chart__x-axis fd-ui-line-chart__x-axis--angled" aria-hidden="true">
        @for (label of labels(); track label.xPercent) {
            <span
                [class.fd-ui-line-chart__x-axis-label--start]="label.position === 'start'"
                [class.fd-ui-line-chart__x-axis-label--end]="label.position === 'end'"
                [style.left]="label.xPercent"
            >
                {{ label.label }}
            </span>
        }
    </div>
}
