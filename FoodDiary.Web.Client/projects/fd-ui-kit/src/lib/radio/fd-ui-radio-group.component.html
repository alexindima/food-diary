<div class="fd-ui-radio-group" [class.fd-ui-radio-group--horizontal]="orientation() === 'horizontal'">
    @if (label()) {
        <p class="fd-ui-radio-group__label">
            {{ label() }}
            @if (required()) {
                <span aria-hidden="true">*</span>
            }
        </p>
    }

    <div
        class="fd-ui-radio-group__control"
        role="radiogroup"
        [attr.aria-describedby]="error() ? `${id()}-error` : null"
        [attr.aria-invalid]="error() ? 'true' : null"
    >
        @for (option of options(); track trackByValue($index, option)) {
            <label class="fd-ui-radio" [class.fd-ui-radio--disabled]="disabled()">
                <input
                    class="fd-ui-radio__input"
                    type="radio"
                    [name]="id()"
                    [value]="$index"
                    [checked]="isEqual(internalValue, option.value)"
                    [disabled]="disabled()"
                    (change)="selectOption(option)"
                    (blur)="handleBlur()"
                    (keydown)="handleKeydown($index, $event)"
                />
                <span class="fd-ui-radio__control" aria-hidden="true">
                    <span class="fd-ui-radio__dot"></span>
                </span>
                <span class="fd-ui-radio__text">
                    {{ option.label }}
                    @if (option.description) {
                        <small class="fd-ui-radio__description">
                            {{ option.description }}
                        </small>
                    }
                </span>
            </label>
        }
    </div>

    @if (hint() && !error()) {
        <p class="fd-ui-radio-group__hint">{{ hint() }}</p>
    }
    @if (error()) {
        <p class="fd-ui-radio-group__error" role="alert" [id]="`${id()}-error`">{{ error() }}</p>
    }
</div>
