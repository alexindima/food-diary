<div class="fd-ui-checkbox">
    <label class="fd-ui-checkbox__label" [class.fd-ui-checkbox__label--disabled]="disabled()">
        <input
            class="fd-ui-checkbox__input"
            type="checkbox"
            [id]="id()"
            [checked]="checked"
            [disabled]="disabled()"
            (change)="handleChange($event)"
            (blur)="handleBlur()"
        />
        <span class="fd-ui-checkbox__control" aria-hidden="true">
            <span class="fd-ui-checkbox__checkmark"></span>
        </span>
        <span class="fd-ui-checkbox__label-text fd-ui-action-text">{{ label() }}</span>
    </label>
    @if (hint()) {
        <div class="fd-ui-checkbox__hint fd-ui-helper-text">{{ hint() }}</div>
    }
</div>
