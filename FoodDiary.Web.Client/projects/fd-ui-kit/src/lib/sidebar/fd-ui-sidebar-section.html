<div class="fd-ui-sidebar__section" [class.fd-ui-sidebar__section--plain]="section().title === undefined">
    @if (section().title !== undefined) { @if (section().collapsible === true) {
    <button
        class="fd-ui-sidebar__section-header fd-row fd-gap-xs fd-justify-between"
        type="button"
        [attr.aria-expanded]="section().expanded === true"
        (click)="sectionToggled.emit({ section: section() })"
    >
        <span class="fd-ui-action-text">{{ section().title }}</span>
        <fd-ui-icon name="expand_more" [class.is-open]="section().expanded === true" />
    </button>
    } @else {
    <div class="fd-ui-sidebar__section-header fd-row fd-gap-xs fd-justify-between">
        <span class="fd-ui-action-text">{{ section().title }}</span>
    </div>
    } } @if (section().collapsible !== true || section().expanded === true) {
    <nav class="fd-ui-sidebar__nav fd-grid fd-gap-xxs" [class.fd-ui-sidebar__nav--secondary]="section().secondary === true">
        @for (item of section().items; track item.id) {
        <fd-ui-sidebar-item
            [item]="item"
            [secondary]="section().secondary === true"
            [isPending]="isPending(item)"
            (routeSelected)="routeSelected.emit($event)"
            (actionSelected)="actionSelected.emit($event)"
        />
        }
    </nav>
    }
</div>
