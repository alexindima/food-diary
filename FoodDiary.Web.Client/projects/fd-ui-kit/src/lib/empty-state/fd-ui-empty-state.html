<div class="fd-ui-empty-state__icon-wrap">
    <fd-ui-icon class="fd-ui-empty-state__icon" [name]="icon()" />
</div>

<div class="fd-ui-empty-state__content">
    @if (title()) {
        <div class="fd-ui-empty-state__title fd-ui-card-title">{{ title() }}</div>
    }

    <div class="fd-ui-empty-state__message fd-ui-body-sm">{{ message() }}</div>
</div>
