@if (isLoading()) {
    <p>Loading AI usage...</p>
} @else if (usage(); as data) {
    <div class="admin-ai-usage fd-grid fd-gap-md">
        <fd-ui-card>
            <div class="stat fd-grid fd-gap-xxs">
                <div class="fd-ui-body-xs fd-ui-text-muted">Total tokens</div>
                <div class="stat__value fd-ui-metric-md">{{ data.totalTokens }}</div>
            </div>
        </fd-ui-card>

        <fd-ui-card>
            <div class="stat fd-grid fd-gap-xxs">
                <div class="fd-ui-body-xs fd-ui-text-muted">Input tokens</div>
                <div class="stat__value fd-ui-metric-md">{{ data.inputTokens }}</div>
            </div>
        </fd-ui-card>

        <fd-ui-card>
            <div class="stat fd-grid fd-gap-xxs">
                <div class="fd-ui-body-xs fd-ui-text-muted">Output tokens</div>
                <div class="stat__value fd-ui-metric-md">{{ data.outputTokens }}</div>
            </div>
        </fd-ui-card>
    </div>
} @else {
    <p>No AI usage data available.</p>
}
