<div class="lesson-edit-dialog fd-grid fd-gap-md">
    <div class="form-row">
        <fd-ui-input label="Title" [formField]="form.title" />
    </div>

    <div class="form-row form-row--inline fd-row fd-gap-md">
        <fd-ui-select label="Locale" [formField]="form.locale" [options]="localeOptions" />
        <fd-ui-select label="Category" [formField]="form.category" [options]="categoryOptions" />
        <fd-ui-select label="Difficulty" [formField]="form.difficulty" [options]="difficultyOptions" />
    </div>

    <div class="form-row form-row--inline fd-row fd-gap-md">
        <fd-ui-input label="Read minutes" type="number" [formField]="form.estimatedReadMinutes" />
        <fd-ui-input label="Sort order" type="number" [formField]="form.sortOrder" />
    </div>

    <div class="form-row">
        <fd-ui-textarea label="Summary" [formField]="form.summary" />
    </div>

    <div class="form-row">
        <fd-ui-textarea label="HTML Content" [formField]="form.content" />
        <div
            class="content-counter"
            [class.content-counter--warning]="contentRemaining() < 1000"
            [class.content-counter--danger]="contentRemaining() < 0"
        >
            {{ contentLength() | number }} / {{ contentMaxLength | number }} ({{ contentRemaining() | number }} remaining)
        </div>
    </div>

    <div class="preview-toggle fd-row fd-gap-sm">
        <fd-ui-button type="button" variant="secondary" (click)="togglePreview()">
            {{ showPreview() ? 'Hide preview' : 'Show preview' }}
        </fd-ui-button>
    </div>

    @if (showPreview()) {
    <div class="preview" [innerHTML]="previewHtml()"></div>
    }

    <div class="dialog-actions fd-row fd-gap-sm">
        <fd-ui-button type="button" variant="secondary" (click)="onCancel()">Cancel</fd-ui-button>
        <fd-ui-button type="button" [disabled]="form().invalid() || isSaving()" (click)="onSave()">
            {{ isNew ? 'Create' : 'Save' }}
        </fd-ui-button>
    </div>
</div>
