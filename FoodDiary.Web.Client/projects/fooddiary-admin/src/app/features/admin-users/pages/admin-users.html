<div class="admin-users fd-grid fd-gap-md">
    <div class="toolbar fd-row fd-gap-sm">
        <fd-ui-input placeholder="Search by email or username" [value]="search()" (valueChange)="onSearchChange($event)" />

        <fd-ui-select placeholder="User status" [options]="statusOptions" [value]="status()" (valueChange)="onStatusChange($event)" />
    </div>

    @if (isLoading()) {
        <p>Loading users...</p>
    } @else {
        <fd-admin-users-table
            [users]="users()"
            [totalItems]="totalItems()"
            [page]="page()"
            [pageSize]="limit"
            [totalPages]="totalPages()"
            (details)="openDetails($event)"
            (pageChange)="goToPage($event)"
        />
    }
</div>
