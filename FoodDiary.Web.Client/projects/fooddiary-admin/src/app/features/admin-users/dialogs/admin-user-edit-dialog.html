<fd-ui-dialog title="Edit user">
    <div class="admin-user-edit-dialog fd-grid fd-gap-md">
        <div>
            <input id="admin-user-edit-is-active" type="checkbox" [formField]="form.isActive" />
            <label for="admin-user-edit-is-active">Active</label>
        </div>

        <div>
            <input id="admin-user-edit-is-email-confirmed" type="checkbox" [formField]="form.isEmailConfirmed" />
            <label for="admin-user-edit-is-email-confirmed">Email confirmed</label>
        </div>

        <div class="roles fd-grid fd-gap-xs">
            <div class="roles__title">Roles</div>
            @for (role of roles; track role) {
                <div>
                    <input type="checkbox" [id]="`admin-user-edit-role-${role}`" [checked]="hasRole(role)" (change)="toggleRole(role)" />
                    <label [attr.for]="`admin-user-edit-role-${role}`">{{ role }}</label>
                </div>
            }
        </div>

        <div class="fd-grid fd-gap-xxs">
            <label for="admin-user-edit-language">Language</label>
            <select id="admin-user-edit-language" [formField]="form.language">
                @for (language of languages; track language.value) {
                    <option [value]="language.value">{{ language.label }}</option>
                }
            </select>
        </div>
    </div>

    <div fdUiDialogFooter>
        <fd-ui-button type="button" variant="secondary" [disabled]="isSaving()" (click)="close()">Cancel</fd-ui-button>
        <fd-ui-button type="button" [disabled]="isSaving()" (click)="save()">Save</fd-ui-button>
    </div>
</fd-ui-dialog>
