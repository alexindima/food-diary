<fd-ui-dialog title="Start impersonation" size="sm">
    <form class="admin-user-impersonation-dialog fd-grid fd-gap-md" [formRoot]="form">
        <p>Target user: {{ targetEmail }}</p>

        <fd-ui-textarea
            label="Reason"
            placeholder="Describe why support needs access..."
            [formField]="form.reason"
            [rows]="4"
            [error]="reasonError()"
        />

        @if (submitError()) {
            <p class="admin-user-impersonation-dialog__error">{{ submitError() }}</p>
        }

        <div fdUiDialogFooter>
            <fd-ui-button
                type="button"
                variant="secondary"
                disabledReason="Impersonation is already in progress."
                [disabled]="isSubmitting()"
                (click)="close()"
            >
                Cancel
            </fd-ui-button>
            <fd-ui-button type="submit" disabledReason="Impersonation is already in progress." [disabled]="isSubmitting()">
                {{ submitLabel() }}
            </fd-ui-button>
        </div>
    </form>
</fd-ui-dialog>
