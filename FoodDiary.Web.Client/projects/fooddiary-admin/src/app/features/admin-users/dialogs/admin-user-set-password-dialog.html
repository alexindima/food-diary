<fd-ui-dialog title="Set user password" size="sm" [dismissible]="false">
    <form class="admin-user-set-password-dialog fd-grid fd-gap-md" [formRoot]="form">
        <p>Target user: {{ targetEmail }}</p>

        <fd-ui-input
            type="password"
            floatLabel="always"
            label="New password"
            placeholder="Enter new password"
            [formField]="form.newPassword"
        />
        @if (newPasswordError(); as error) {
            <p class="admin-user-set-password-dialog__error" role="alert">{{ error }}</p>
        }

        <fd-ui-input
            type="password"
            floatLabel="always"
            label="Confirm password"
            placeholder="Repeat new password"
            [formField]="form.confirmPassword"
        />
        @if (confirmPasswordError(); as error) {
            <p class="admin-user-set-password-dialog__error" role="alert">{{ error }}</p>
        }

        @if (submitError()) {
            <p class="admin-user-set-password-dialog__error" role="alert">{{ submitError() }}</p>
        }

        <div fdUiDialogFooter class="fd-row fd-justify-end fd-gap-sm">
            <fd-ui-button
                type="button"
                variant="secondary"
                disabledReason="Save is already in progress."
                [disabled]="isSubmitting()"
                (click)="close()"
            >
                Cancel
            </fd-ui-button>
            <fd-ui-button type="submit" disabledReason="Save is already in progress." [disabled]="isSubmitting()">
                {{ submitLabel() }}
            </fd-ui-button>
        </div>
    </form>
</fd-ui-dialog>
