<section class="unauthorized fd-grid fd-gap-md">
    <h1>Access denied</h1>
    <p>
        @if (reason === 'unauthenticated') {
            Your admin session is missing or expired.
        } @else {
            You do not have permission to access this area.
        }
    </p>
    <fd-ui-button type="button" (click)="goToLogin()">Go to login</fd-ui-button>
</section>
