server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /sitemap.xml {
        if ($host ~* ^(xn--b1adbcbrouc8l\.xn--p1ai|www\.xn--b1adbcbrouc8l\.xn--p1ai)$) {
            rewrite ^ /sitemap-ru.xml break;
        }

        try_files $uri =404;
    }

    location = /robots.txt {
        if ($host ~* ^(xn--b1adbcbrouc8l\.xn--p1ai|www\.xn--b1adbcbrouc8l\.xn--p1ai)$) {
            rewrite ^ /robots-ru.txt break;
        }

        try_files $uri =404;
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        try_files $uri =404;
    }

    location = /index.csr.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        try_files $uri =404;
    }

    location = /ngsw.json {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        try_files $uri =404;
    }

    location = /ngsw-worker.js {
        expires -1;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /safety-worker.js {
        expires -1;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location = /worker-basic.min.js {
        expires -1;
        add_header Cache-Control "no-cache" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;
}
