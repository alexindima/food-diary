server:
  http_listen_port: 9080

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: journal
    journal:
      max_age: 12h
      labels:
        job: systemd-journal
    relabel_configs:
      - source_labels: ['__journal__systemd_unit']
        target_label: unit
      - source_labels: ['__journal_syslog_identifier']
        target_label: service

  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    pipeline_stages:
      - docker: {}
      - static_labels:
          log_source: backend
      - match:
          selector: '{log_source="backend"} |~ "(Client telemetry event|FoodDiary\\.Presentation\\.Api\\.Features\\.Logs\\.LogsController)"'
          stages:
            - regex:
                expression: '.*Client telemetry event (?P<client_telemetry_category>[^/]+)/(?P<client_telemetry_name>[^:]+):'
            - template:
                source: log_source
                template: 'frontend'
            - labels:
                log_source:
                client_telemetry_category:
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_id']
        target_label: container_id
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: logstream
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: compose_project
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
      - source_labels: ['__meta_docker_container_id']
        regex: '(.*)'
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/$1-json.log
