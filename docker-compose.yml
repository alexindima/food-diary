services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fooddiary}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fooddiary"]
      interval: 180s
      timeout: 10s
      retries: 5

  db-init:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/initializer:${INITIALIZER_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: FoodDiary.Initializer/Dockerfile
    command: ["dotnet", "FoodDiary.Initializer.dll", "update"]
    env_file:
      - .env
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-fooddiary};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-change-me-local-password}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full
      - backend

  mailrelay-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MAIL_RELAY_POSTGRES_DB:-fooddiary_mailrelay}
      POSTGRES_USER: ${MAIL_RELAY_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${MAIL_RELAY_POSTGRES_PASSWORD:-change-me-local-password}
    ports:
      - "${MAIL_RELAY_POSTGRES_PORT:-5433}:5432"
    volumes:
      - mailrelay-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MAIL_RELAY_POSTGRES_USER:-postgres} -d ${MAIL_RELAY_POSTGRES_DB:-fooddiary_mailrelay}"]
      interval: 180s
      timeout: 10s
      retries: 5
    profiles:
      - full
      - backend

  mailrelay-db-init:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/mailrelay-initializer:${MAIL_RELAY_INITIALIZER_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: FoodDiary.MailRelay.Initializer/Dockerfile
    command: ["dotnet", "FoodDiary.MailRelay.Initializer.dll", "update"]
    env_file:
      - .env
    environment:
      ConnectionStrings__DefaultConnection: Host=mailrelay-postgres;Port=5432;Database=${MAIL_RELAY_POSTGRES_DB:-fooddiary_mailrelay};Username=${MAIL_RELAY_POSTGRES_USER:-postgres};Password=${MAIL_RELAY_POSTGRES_PASSWORD:-change-me-local-password}
    depends_on:
      mailrelay-postgres:
        condition: service_healthy
    profiles:
      - full
      - backend

  mailinbox-postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MAIL_INBOX_POSTGRES_DB:-fooddiary_mailinbox}
      POSTGRES_USER: ${MAIL_INBOX_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${MAIL_INBOX_POSTGRES_PASSWORD:-change-me-local-password}
    ports:
      - "${MAIL_INBOX_POSTGRES_PORT:-5434}:5432"
    volumes:
      - mailinbox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MAIL_INBOX_POSTGRES_USER:-postgres} -d ${MAIL_INBOX_POSTGRES_DB:-fooddiary_mailinbox}"]
      interval: 180s
      timeout: 10s
      retries: 5
    profiles:
      - mail-inbox

  mailinbox-db-init:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/mailinbox-initializer:${MAIL_INBOX_INITIALIZER_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: FoodDiary.MailInbox.Initializer/Dockerfile
    command: ["dotnet", "FoodDiary.MailInbox.Initializer.dll", "update"]
    env_file:
      - .env
    environment:
      ConnectionStrings__DefaultConnection: Host=mailinbox-postgres;Port=5432;Database=${MAIL_INBOX_POSTGRES_DB:-fooddiary_mailinbox};Username=${MAIL_INBOX_POSTGRES_USER:-postgres};Password=${MAIL_INBOX_POSTGRES_PASSWORD:-change-me-local-password}
    depends_on:
      mailinbox-postgres:
        condition: service_healthy
    profiles:
      - mail-inbox

  rabbitmq:
    image: rabbitmq:4-management
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${MailRelayBroker__UserName:-guest}
      RABBITMQ_DEFAULT_PASS: ${MailRelayBroker__Password:-guest}
      RABBITMQ_DEFAULT_VHOST: ${MailRelayBroker__VirtualHost:-/}
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 180s
      timeout: 20s
      retries: 10
      start_period: 60s
    profiles:
      - full
      - backend

  api:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/api:${API_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: FoodDiary.Web.Api/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-fooddiary};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-change-me-local-password}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      BuildInfo__CommitSha: ${DEPLOY_COMMIT_SHA:-unknown}
      BuildInfo__ImageTag: ${API_IMAGE_TAG:-unknown}
      MailRelayClient__BaseUrl: http://mail-relay:5088
      MailInboxClient__BaseUrl: http://mail-inbox:5098
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/health/ready >/dev/null || exit 1"]
      interval: 180s
      timeout: 10s
      retries: 6
      start_period: 30s
    depends_on:
      db-init:
        condition: service_completed_successfully
      mail-relay:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    profiles:
      - full
      - backend

  mail-relay:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/mail-relay:${MAIL_RELAY_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: FoodDiary.MailRelay.WebApi/Dockerfile
    restart: unless-stopped
    ports:
      - "${MAIL_RELAY_PORT:-5088}:5088"
    environment:
      ConnectionStrings__DefaultConnection: Host=mailrelay-postgres;Port=5432;Database=${MAIL_RELAY_POSTGRES_DB:-fooddiary_mailrelay};Username=${MAIL_RELAY_POSTGRES_USER:-postgres};Password=${MAIL_RELAY_POSTGRES_PASSWORD:-change-me-local-password}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      MailRelayBroker__HostName: rabbitmq
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5088/health/ready >/dev/null || exit 1"]
      interval: 180s
      timeout: 10s
      retries: 6
      start_period: 30s
    depends_on:
      mailrelay-db-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    profiles:
      - full
      - backend

  mail-inbox:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/mail-inbox:${MAIL_INBOX_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: FoodDiary.MailInbox.WebApi/Dockerfile
    restart: unless-stopped
    ports:
      - "${MAIL_INBOX_PORT:-5098}:5098"
      - "${MAIL_INBOX_SMTP_PORT:-2525}:2525"
    environment:
      ConnectionStrings__DefaultConnection: Host=mailinbox-postgres;Port=5432;Database=${MAIL_INBOX_POSTGRES_DB:-fooddiary_mailinbox};Username=${MAIL_INBOX_POSTGRES_USER:-postgres};Password=${MAIL_INBOX_POSTGRES_PASSWORD:-change-me-local-password}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5098/health/ready >/dev/null || exit 1"]
      interval: 180s
      timeout: 10s
      retries: 6
      start_period: 30s
    depends_on:
      mailinbox-db-init:
        condition: service_completed_successfully
    profiles:
      - mail-inbox

  telegram-bot:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/telegram-bot:${TELEGRAM_BOT_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: FoodDiary.Telegram.Bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - full

  job-manager:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/job-manager:${JOB_MANAGER_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: FoodDiary.JobManager/Dockerfile
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-fooddiary};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-change-me-local-password}
    env_file:
      - .env
    depends_on:
      db-init:
        condition: service_completed_successfully
    profiles:
      - full
      - jobs

  client:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/client:${CLIENT_IMAGE_TAG:-latest}
    build:
      context: FoodDiary.Web.Client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-4200}:80"
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - full

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/fooddiary.club:/var/www/fooddiary.club:ro
      - /var/www/admin.fooddiary.club:/var/www/admin.fooddiary.club:ro
      - /var/www/storybook.fooddiary.club:/var/www/storybook.fooddiary.club:ro
      - /var/log/nginx:/var/log/nginx
    profiles:
      - full

volumes:
  postgres-data:
  mailrelay-postgres-data:
  mailinbox-postgres-data:
