services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fooddiary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fooddiary"]
      interval: 5s
      timeout: 3s
      retries: 5

  db-init:
    build:
      context: .
      dockerfile: FoodDiary.Initializer/Dockerfile
    command: ["dotnet", "FoodDiary.Initializer.dll", "update"]
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=fooddiary;Username=postgres;Password=${POSTGRES_PASSWORD:-change-me-local-password}"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full
      - backend

  api:
    build:
      context: .
      dockerfile: FoodDiary.Web.Api/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=fooddiary;Username=postgres;Password=${POSTGRES_PASSWORD:-change-me-local-password}"
      ASPNETCORE_ENVIRONMENT: Development
    env_file:
      - .env
    depends_on:
      db-init:
        condition: service_completed_successfully
    profiles:
      - full
      - backend

  telegram-bot:
    build:
      context: .
      dockerfile: FoodDiary.Telegram.Bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      api:
        condition: service_started
    profiles:
      - full

  job-manager:
    build:
      context: .
      dockerfile: FoodDiary.JobManager/Dockerfile
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=fooddiary;Username=postgres;Password=${POSTGRES_PASSWORD:-change-me-local-password}"
    env_file:
      - .env
    depends_on:
      db-init:
        condition: service_completed_successfully
    profiles:
      - full

  client:
    build:
      context: FoodDiary.Web.Client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-4200}:80"
    depends_on:
      api:
        condition: service_started
    profiles:
      - full

volumes:
  postgres-data:
