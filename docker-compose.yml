services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fooddiary}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fooddiary"]
      interval: 5s
      timeout: 3s
      retries: 5

  db-init:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/initializer:latest
    build:
      context: .
      dockerfile: FoodDiary.Initializer/Dockerfile
    command: ["dotnet", "FoodDiary.Initializer.dll", "update"]
    env_file:
      - .env
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-fooddiary};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-change-me-local-password}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full
      - backend

  api:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/api:latest
    build:
      context: .
      dockerfile: FoodDiary.Web.Api/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_PORT:-5000}:5000"
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-fooddiary};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-change-me-local-password}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5000/health/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    depends_on:
      db-init:
        condition: service_completed_successfully
    profiles:
      - full
      - backend

  telegram-bot:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/telegram-bot:latest
    build:
      context: .
      dockerfile: FoodDiary.Telegram.Bot/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - full

  job-manager:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/job-manager:latest
    build:
      context: .
      dockerfile: FoodDiary.JobManager/Dockerfile
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-fooddiary};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-change-me-local-password}
    env_file:
      - .env
    depends_on:
      db-init:
        condition: service_completed_successfully
    profiles:
      - full
      - jobs

  client:
    image: ${IMAGE_PREFIX:-ghcr.io/alexindima/food-diary}/client:latest
    build:
      context: FoodDiary.Web.Client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-4200}:80"
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - full

volumes:
  postgres-data:
